<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; }
        #score { font-size: 60px; color: orange; margin: 20px; }
        #coin { width: 180px; height: 180px; background: orange; border-radius: 50%; font-size: 80px; display: flex; align-items: center; justify-content: center; border: 5px solid #fff; cursor: pointer; user-select: none; }
        #coin:active { transform: scale(0.9); }
        #btn { margin-top: 30px; padding: 15px 30px; background: #007bff; color: #fff; border: none; border-radius: 10px; font-weight: bold; font-size: 20px; }
        #btn:disabled { background: #333; }
    </style>
</head>
<body>
    <div id="score">0</div>
    <div id="coin">🚀</div>
    <button id="btn">Улучшить (50)</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let score = Number(localStorage.getItem('s')) || 0;
        let pwr = Number(localStorage.getItem('p')) || 1;
        let cost = Number(localStorage.getItem('c')) || 50;

        function update() {
            document.getElementById('score').innerText = score;
            document.getElementById('btn').innerText = "Upgrade +" + (pwr+1) + " (Cost: " + cost + ")";
            document.getElementById('btn').disabled = score < cost;
            localStorage.setItem('s', score);
            localStorage.setItem('p', pwr);
            localStorage.setItem('c', cost);
        }

        document.getElementById('coin').onclick = () => {
            score += pwr;
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            update();
        };

        document.getElementById('btn').onclick = () => {
            if(score >= cost) {
                score -= cost;
                pwr += 1;
                cost = Math.floor(cost * 1.5);
                update();
            }
        };

        update();
    </script>
</body>
</html>
