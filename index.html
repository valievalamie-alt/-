<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { 
            --bg: #000000; 
            --orange: #f5a623; 
            --blue: #0a84ff; 
            --purple: #bf5af2; 
            --gray: #1c1c1e; 
            --red: #ff453a; 
            --border: #333333;
        }

        body { 
            background: var(--bg); 
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            margin: 0; 
            padding: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            -webkit-user-select: none; 
        }

        /* HEADER */
        #header { 
            padding-top: env(safe-area-inset-top); 
            height: 140px; 
            text-align: center; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
        }
        #score { 
            font-size: 58px; 
            font-weight: 900; 
            color: var(--orange); 
            letter-spacing: -2px; 
        }
        #stats { 
            font-size: 13px; 
            color: #8e8e93; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            margin-top: -5px;
        }

        /* GAME AREA */
        #game-area { 
            flex-grow: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: relative; 
        }
        #rocket-circle {
            width: 220px;
            height: 220px;
            background: radial-gradient(circle, rgba(245,166,35,0.3) 0%, rgba(0,0,0,0) 70%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #rocket { 
            width: 170px; 
            height: 170px; 
            background: radial-gradient(circle at 30% 30%, #ffcc00, #f5a623); 
            border-radius: 50%; 
            font-size: 70px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 0 0 40px rgba(245,166,35,0.4); 
            transition: transform 0.1s; 
            touch-action: manipulation; 
            cursor: pointer;
        }
        #rocket:active { transform: scale(0.92); }

        /* FOOTER GRID (2x3) */
        #footer { 
            padding: 10px 15px calc(25px + env(safe-area-inset-bottom)); 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            grid-template-rows: repeat(3, 56px);
            gap: 10px; 
        }

        .btn { 
            background: var(--gray);
            border: 1px solid var(--border);
            border-radius: 16px; 
            color: white; 
            font-weight: 700; 
            font-size: 14px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px;
            transition: all 0.1s ease;
            -webkit-tap-highlight-color: transparent;
        }

        /* Анимация нажатия */
        .btn:active { 
            transform: scale(0.95); 
            background: #2c2c2e;
            border-color: #555;
        }

        .btn span { font-size: 10px; opacity: 0.6; display: block; font-weight: 400; }
        .btn-content { text-align: left; }

        /* Цвета из скриншота */
        #btn-upd { color: #888; } /* Неактивный серый, если нет денег */
        #btn-upd.active { color: #fff; }
        #btn-case { border-color: var(--purple); color: var(--purple); }
        #btn-friends { border-color: #f5a623; color: #f5a623; }
        #btn-top { border-color: #fff; color: #fff; }

        /* MODALS */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { width: 100%; max-width: 340px; background: #1c1c1e; border-radius: 25px; padding: 25px; border: 1px solid #333; text-align: center; }

        /* Animations */
        .pop { position: absolute; font-size: 32px; font-weight: 900; color: white; pointer-events: none; animation: fly 0.6s ease-out forwards; z-index: 100; }
        @keyframes fly { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-120px); opacity: 0; } }

        #roll-wrap { width: 100%; height: 80px; border: 1px solid #333; margin: 20px 0; overflow: hidden; position: relative; background: #000; border-radius: 12px; }
        #roll-track { display: flex; position: absolute; left: 0; height: 100%; transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); }
        .item { min-width: 80px; width: 80px; height: 100%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 20px; border-right: 1px solid #111; }
    </style>
</head>
<body onclick="startAudio()">

    <audio id="bg-music" loop><source src="https://www.bensound.com/bensound-music/bensound-slowmotion.mp3" type="audio/mpeg"></audio>

    <div id="header">
        <div id="score">0</div>
        <div id="stats">ПРИБЫЛЬ ЗА ТАП: <b id="val-pwr">+1</b></div>
    </div>

    <div id="game-area">
        <div id="rocket-circle">
            <div id="rocket">🚀</div>
        </div>
    </div>

    <div id="footer">
        <button id="btn-upd" class="btn">
            <span>⚡</span>
            <div class="btn-content">УЛУЧШИТЬ<span id="cost-upd">50</span></div>
        </button>
        <button id="btn-case" class="btn">
            <span>💎</span>
            <div class="btn-content">КЕЙС<span>350</span></div>
        </button>
        <button id="btn-friends" class="btn">
            <span>👥</span>
            <div class="btn-content">ДРУЗЬЯ</div>
        </button>
        <button id="btn-top" class="btn">
            <span>🏆</span>
            <div class="btn-content">РЕЙТИНГ</div>
        </button>
        <button id="btn-gift" class="btn">
            <div class="btn-content" id="gift-text">ВЗЯТО ✅</div>
        </button>
        <button id="btn-sets" class="btn">
            <span>⚙️</span>
        </button>
    </div>

    <div id="modal-case" class="modal">
        <div class="modal-box">
            <h2 id="case-title" style="color:var(--purple); margin:0;">КЕЙС УДАЧИ</h2>
            <div id="roll-wrap"><div id="roll-track"></div></div>
            <button id="btn-claim" class="btn" style="width:100%; background:var(--blue); display:none;">ЗАБРАТЬ</button>
            <button onclick="closeModal('modal-case')" class="btn" style="width:100%; margin-top:10px; background:transparent;">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div id="modal-top" class="modal">
        <div class="modal-box">
            <h2>🏆 ТОП ПИЛОТОВ</h2>
            <div id="top-list" style="margin-bottom:20px;">Загрузка...</div>
            <button onclick="closeModal('modal-top')" class="btn" style="width:100%;">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div id="modal-sets" class="modal">
        <div class="modal-box">
            <h2>НАСТРОЙКИ</h2>
            <button id="toggle-mu" class="btn" style="width:100%; background:var(--blue); margin-bottom:10px;">МУЗЫКА: ВКЛ</button>
            <button onclick="closeModal('modal-sets')" class="btn" style="width:100%;">ЗАКРЫТЬ</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAhFyYz8tC0VZqNKQweM1VH7A9rzcLQ7L4", authDomain: "rockettap-22e98.firebaseapp.com", databaseURL: "https://rockettap-22e98-default-rtdb.firebaseio.com", projectId: "rockettap-22e98", storageBucket: "rockettap-22e98.firebasestorage.app", messagingSenderId: "800263373343", appId: "1:800263373343:web:ed6db2e822f61d8257cb2a" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const tg = window.Telegram.WebApp;
        tg.expand();

        let score = Number(localStorage.getItem('rk_sc')) || 0;
        let pwr = Number(localStorage.getItem('rk_pw')) || 1;
        let cost = Number(localStorage.getItem('rk_ct')) || 50;
        let musicOn = true;
        let audioStarted = false;
        const uid = tg.initDataUnsafe?.user?.id || "player_1";

        function save() {
            localStorage.setItem('rk_sc', score);
            localStorage.setItem('rk_pw', pwr);
            localStorage.setItem('rk_ct', cost);
            updateUI();
            db.ref('leaderboard/' + uid).set({ name: tg.initDataUnsafe?.user?.first_name || "Пилот", score: Math.floor(score) });
        }

        function updateUI() {
            document.getElementById('score').innerText = Math.floor(score).toLocaleString();
            document.getElementById('val-pwr').innerText = "+" + pwr;
            document.getElementById('cost-upd').innerText = cost;
            
            const upBtn = document.getElementById('btn-upd');
            if(score >= cost) { upBtn.style.color = "#fff"; upBtn.style.borderColor = "var(--blue)"; } 
            else { upBtn.style.color = "#555"; upBtn.style.borderColor = "#333"; }
        }

        // Анимация тапа
        function handleTap(e) {
            score += pwr;
            const x = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
            const y = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
            
            const p = document.createElement('div');
            p.className = 'pop'; p.innerText = `+${pwr}`;
            p.style.left = (x - 20) + 'px'; p.style.top = (y - 40) + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 600);
            
            tg.HapticFeedback.impactOccurred('medium');
            save();
        }

        document.getElementById('rocket').addEventListener('touchstart', (e) => { e.preventDefault(); handleTap(e); });

        // Функции кнопок
        document.getElementById('btn-upd').onclick = () => {
            if(score >= cost) { score -= cost; pwr++; cost = Math.round(cost * 1.6); save(); }
        };

        document.getElementById('btn-friends').onclick = () => {
            tg.openTelegramLink(`https://t.me/share/url?url=https://t.me/ТВОЙ_БОТ&text=Лети со мной на луну!`);
        };

        document.getElementById('btn-top').onclick = () => {
            openModal('modal-top');
            db.ref('leaderboard').orderByChild('score').limitToLast(10).once('value', snap => {
                const list = document.getElementById('top-list');
                list.innerHTML = "";
                snap.forEach(p => {
                    const d = p.val();
                    list.innerHTML = `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #333"><span>${d.name}</span><b>${d.score}</b></div>` + list.innerHTML;
                });
            });
        };

        document.getElementById('btn-case').onclick = () => {
            if(score < 350) { tg.showAlert("Мало монет!"); return; }
            score -= 350; save();
            openModal('modal-case');
            const track = document.getElementById('roll-track');
            track.style.transition = 'none'; track.style.transform = 'translateX(0)'; track.innerHTML = '';
            const winIdx = 30;
            const prizes = [50, 100, 500, 1000, 5000];
            let win = prizes[Math.floor(Math.random() * prizes.length)];
            for(let i=0; i<40; i++) {
                let v = i === winIdx ? win : prizes[Math.floor(Math.random() * prizes.length)];
                track.innerHTML += `<div class="item">${v}</div>`;
            }
            setTimeout(() => {
                track.style.transition = 'transform 4s cubic-bezier(0.1, 0, 0.1, 1)';
                track.style.transform = `translateX(-${winIdx * 80 - 110}px)`;
                setTimeout(() => {
                    score += win; save();
                    document.getElementById('btn-claim').style.display = 'block';
                    document.getElementById('btn-claim').onclick = () => { score += 0; closeModal('modal-case'); };
                }, 4100);
            }, 50);
        };

        document.getElementById('btn-sets').onclick = () => openModal('modal-sets');
        document.getElementById('toggle-mu').onclick = function() {
            musicOn = !musicOn;
            const audio = document.getElementById('bg-music');
            if(musicOn) audio.play(); else audio.pause();
            this.innerText = `МУЗЫКА: ${musicOn ? 'ВКЛ' : 'ВЫКЛ'}`;
        };

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function startAudio() { if(!audioStarted && musicOn) { document.getElementById('bg-music').play().then(()=>audioStarted=true); } }

        updateUI();
    </script>
</body>
</html>
