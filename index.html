<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --bg: #0b0b0d; --orange: #ff9f0a; --blue: #0a84ff; --purple: #bf5af2; --gray: #2c2c2e; --red: #ff453a; --glass: rgba(255, 255, 255, 0.08); }
        body { background: var(--bg); color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; -webkit-user-select: none; }

        /* МЕНЮ */
        #main-menu { position: fixed; inset: 0; background: radial-gradient(circle at center, #1c1c1e 0%, #000 100%); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .menu-logo { font-size: 100px; margin-bottom: 20px; filter: drop-shadow(0 0 20px var(--orange)); }
        .btn-menu { width: 240px; height: 60px; font-size: 18px; background: var(--orange); color: black; margin-bottom: 15px; border-radius: 20px; font-weight: 800; border: none; cursor: pointer; transition: 0.1s; }
        .btn-menu:active { transform: scale(0.95); }

        /* ИГРА */
        #game-ui { display: none; flex-direction: column; height: 100vh; }
        #header { padding-top: env(safe-area-inset-top); height: 120px; text-align: center; display: flex; flex-direction: column; justify-content: center; background: linear-gradient(to bottom, rgba(255,159,10,0.1), transparent); }
        #score { font-size: 54px; font-weight: 900; color: var(--orange); text-shadow: 0 0 30px rgba(255,159,10,0.4); letter-spacing: -1px; }
        #stats { font-size: 14px; color: #8e8e93; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; }

        #game-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        #rocket { width: 190px; height: 190px; background: radial-gradient(circle at 30% 30%, #ffcc00, #ff9f0a); border-radius: 50%; border: 8px solid rgba(255,255,255,0.2); font-size: 85px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 60px rgba(255,159,10,0.3), inset 0 0 20px rgba(0,0,0,0.2); transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275); touch-action: manipulation; }
        #rocket:active { transform: scale(0.9); }

        /* КНОПКИ ФУТЕРА */
        #footer { background: rgba(28, 28, 30, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 20px 15px calc(25px + env(safe-area-inset-bottom)); border-radius: 35px 35px 0 0; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; border-top: 1px solid rgba(255,255,255,0.1); }
        .btn { height: 56px; border: none; border-radius: 18px; font-weight: 700; font-size: 14px; color: white; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: background 0.2s, transform 0.1s; -webkit-tap-highlight-color: transparent; line-height: 1.2; }
        .btn span { font-size: 10px; opacity: 0.7; font-weight: 400; margin-top: 2px; }
        .btn:active { transform: scale(0.96); }

        #btn-upd { background: var(--glass); border: 1px solid var(--blue); color: var(--blue); }
        #btn-case { background: var(--glass); border: 1px solid var(--purple); color: var(--purple); }
        #btn-friends { background: var(--glass); border: 1px solid var(--orange); color: var(--orange); }
        #btn-top { background: var(--glass); border: 1px solid #fff; color: #fff; }
        #btn-gift { background: #1c1c1e; border: 1px solid #333; }
        #btn-sets { background: #1c1c1e; border: 1px solid #333; font-size: 20px; }

        /* МОДАЛКИ */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 3000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { width: 100%; max-width: 360px; background: #1c1c1e; border-radius: 30px; padding: 30px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }

        #wheel-canvas { border-radius: 50%; border: 5px solid #333; transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); }
        
        /* АНИМАЦИЯ ТАПА */
        .pop { position: absolute; font-size: 38px; font-weight: 900; color: white; pointer-events: none; animation: fly 0.7s ease-out forwards; z-index: 20; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        @keyframes fly { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-180px) scale(1.3); opacity: 0; } }

        /* КЕЙС */
        #roll-wrap { width: 100%; height: 100px; border: 1px solid #333; margin: 25px 0; overflow: hidden; position: relative; background: #000; border-radius: 15px; }
        #roll-track { display: flex; position: absolute; left: 0; height: 100%; }
        .item { min-width: 100px; width: 100px; height: 100%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 26px; border-right: 1px solid #111; }
        #hitbox { position: absolute; left: 50%; top: 0; bottom: 0; width: 3px; background: var(--red); transform: translateX(-50%); z-index: 50; box-shadow: 0 0 15px var(--red); }
    </style>
</head>
<body onclick="startAudio()">

    <audio id="bg-music" loop><source src="https://www.bensound.com/bensound-music/bensound-slowmotion.mp3" type="audio/mpeg"></audio>

    <div id="main-menu">
        <div class="menu-logo">🚀</div>
        <h1 style="letter-spacing: 2px; margin-bottom: 40px;">ROCKET TAP</h1>
        <button class="btn-menu" onclick="startGame()">ИГРАТЬ</button>
        <button class="btn-menu" style="background:var(--purple); color:white" onclick="openModal('modal-wheel')">🎡 КОЛЕСО</button>
        <button class="btn-menu" style="background:var(--gray); color:white" onclick="openModal('modal-top')">🏆 РЕЙТИНГ</button>
    </div>

    <div id="game-ui">
        <div id="header">
            <div id="score">0</div>
            <div id="stats">Прибыль за тап: <b id="val-pwr">+1</b></div>
        </div>

        <div id="game-area"><div id="rocket">🚀</div></div>

        <div id="footer">
            <button id="btn-upd" class="btn">⚡ УЛУЧШИТЬ<span id="cost-upd">50</span></button>
            <button id="btn-case" class="btn">💎 КЕЙС<span>900</span></button>
            <button id="btn-friends" class="btn">👥 ДРУЗЬЯ</button>
            <button id="btn-top" class="btn">🏆 РЕЙТИНГ</button>
            <button id="btn-gift" class="btn">🎁 ПОДАРОК</button>
            <button id="btn-sets" class="btn">⚙️</button>
        </div>
    </div>

    <div id="modal-wheel" class="modal">
        <div style="position:relative; margin-bottom:20px;">
            <div style="position:absolute; top:-10px; left:50%; transform:translateX(-50%); width:4px; height:40px; background:var(--red); z-index:100; box-shadow:0 0 10px var(--red);"></div>
            <canvas id="wheel-canvas" width="300" height="300"></canvas>
        </div>
        <button id="spin-btn" class="btn-menu" onclick="spinWheel()">КРУТИТЬ</button>
        <button class="btn" style="width:240px; background:var(--gray)" onclick="closeModal('modal-wheel')">НАЗАД</button>
    </div>

    <div id="modal-case" class="modal">
        <div class="modal-box">
            <h2 id="case-title" style="color:var(--purple); margin:0;">УДАЧИ, ПИЛОТ!</h2>
            <div id="roll-wrap">
                <div id="hitbox"></div>
                <div id="roll-track"></div>
            </div>
            <button id="btn-claim" class="btn" style="display:none; width:100%; background:var(--blue); height: 50px;">ЗАБРАТЬ ВЫИГРЫШ</button>
            <button id="btn-close-case" class="btn" style="width:100%; margin-top:10px; background:transparent" onclick="closeModal('modal-case')">ВЫЙТИ</button>
        </div>
    </div>

    <div id="modal-top" class="modal">
        <div class="modal-box">
            <h2 style="margin:0;">🏆 Топ Пилотов</h2>
            <div id="top-list" style="margin: 20px 0; max-height: 280px; overflow-y: auto;"></div>
            <button onclick="closeModal('modal-top')" class="btn" style="width:100%; background:var(--gray); height: 50px;">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div id="modal-friends" class="modal">
        <div class="modal-box">
            <h1>👥</h1>
            <h2>Пригласи друзей</h2>
            <p style="color: #888;">+5,000 за каждого пилота!</p>
            <button id="btn-invite-act" class="btn" style="width:100%; background:var(--orange); height: 50px;">ОТПРАВИТЬ ССЫЛКУ</button>
            <button onclick="closeModal('modal-friends')" class="btn" style="width:100%; background:transparent; margin-top:10px;">ПОЗЖЕ</button>
        </div>
    </div>

    <div id="modal-sets" class="modal">
        <div class="modal-box">
            <h2>Настройки</h2>
            <button id="toggle-mu" class="btn" style="width:100%; background:var(--blue); margin-bottom:15px; height: 50px;">МУЗЫКА: ВКЛ</button>
            <button class="btn" style="width:100%; background:var(--red); margin-bottom:15px;" onclick="location.reload()">ВЫЙТИ В МЕНЮ</button>
            <button onclick="closeModal('modal-sets')" class="btn" style="width:100%; background:var(--gray); height: 50px;">ЗАКРЫТЬ</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAhFyYz8tC0VZqNKQweM1VH7A9rzcLQ7L4", authDomain: "rockettap-22e98.firebaseapp.com", databaseURL: "https://rockettap-22e98-default-rtdb.firebaseio.com", projectId: "rockettap-22e98", storageBucket: "rockettap-22e98.firebasestorage.app", messagingSenderId: "800263373343", appId: "1:800263373343:web:ed6db2e822f61d8257cb2a" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const tg = window.Telegram.WebApp;
        tg.expand();

        let score = Number(localStorage.getItem('rk_sc')) || 0;
        let pwr = Number(localStorage.getItem('rk_pw')) || 1;
        let cost = Number(localStorage.getItem('rk_ct')) || 50;
        let lastGift = localStorage.getItem('rk_gift') || "";
        let lastWheel = Number(localStorage.getItem('rk_lw')) || 0;
        let musicOn = true;
        let audioStarted = false;
        const uid = tg.initDataUnsafe?.user?.id || "local_player";

        function startGame() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('game-ui').style.display = 'flex';
            updateUI();
        }

        function save() {
            localStorage.setItem('rk_sc', score); localStorage.setItem('rk_pw', pwr);
            localStorage.setItem('rk_ct', cost); localStorage.setItem('rk_gift', lastGift);
            db.ref('leaderboard/' + uid).update({ name: tg.initDataUnsafe?.user?.first_name || "Пилот", score: Math.floor(score) });
            updateUI();
        }

        function updateUI() {
            document.getElementById('score').innerText = Math.floor(score).toLocaleString('ru-RU');
            document.getElementById('val-pwr').innerText = "+" + pwr;
            document.getElementById('cost-upd').innerText = cost;
            const today = new Date().toDateString();
            document.getElementById('btn-gift').innerText = (lastGift === today) ? "ВЗЯТО ✅" : "🎁 ПОДАРОК";
        }

        // КОЛЕСО ФОРТУНЫ
        const canvas = document.getElementById('wheel-canvas');
        const ctx = canvas.getContext('2d');
        const sectors = [
            {v: 500, c: "#ff9f0a"}, {v: 0, c: "#2c2c2e"}, 
            {v: 5000, c: "#bf5af2"}, {v: 100, c: "#0a84ff"},
            {v: 1000, c: "#32d74b"}, {v: 250, c: "#ff453a"}
        ];
        const arc = (Math.PI * 2) / sectors.length;

        function drawWheel() {
            sectors.forEach((s, i) => {
                ctx.beginPath(); ctx.fillStyle = s.c; ctx.moveTo(150, 150);
                ctx.arc(150, 150, 150, i * arc, (i + 1) * arc); ctx.fill();
                ctx.save(); ctx.translate(150, 150); ctx.rotate(i * arc + arc/2);
                ctx.fillStyle = "white"; ctx.font = "bold 18px Arial"; ctx.fillText(s.v, 80, 10); ctx.restore();
            });
        }
        drawWheel();

        function spinWheel() {
            const now = Date.now();
            if(now - lastWheel < 3600000) { tg.showAlert("Можно раз в час!"); return; }
            const deg = Math.floor(3000 + Math.random() * 5000);
            canvas.style.transform = `rotate(${deg}deg)`;
            setTimeout(() => {
                const actualDeg = deg % 360;
                const idx = sectors.length - 1 - Math.floor(actualDeg / (360 / sectors.length));
                const win = sectors[idx].v;
                score += win; lastWheel = Date.now();
                localStorage.setItem('rk_lw', lastWheel);
                tg.showAlert(`Выпало: ${win}!`); save();
            }, 4000);
        }

        // ТАПЫ
        function handleTap(x, y) {
            score += pwr;
            const p = document.createElement('div');
            p.className = 'pop'; p.innerText = `+${pwr}`;
            p.style.left = (x - 20) + 'px'; p.style.top = (y - 50) + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 700);
            tg.HapticFeedback.impactOccurred('light');
            save();
        }
        document.getElementById('rocket').addEventListener('touchstart', (e) => { e.preventDefault(); handleTap(e.touches[0].clientX, e.touches[0].clientY); });

        // КЕЙС
        document.getElementById('btn-case').onclick = () => {
            if(score < 900) return;
            score -= 900; save();
            const track = document.getElementById('roll-track');
            openModal('modal-case');
            document.getElementById('btn-claim').style.display = 'none';
            track.style.transition = 'none'; track.style.transform = 'translateX(0)'; track.innerHTML = '';
            const winIdx = 35; let winVal = Math.random() > 0.8 ? 5000 : 100;
            for(let i = 0; i < 45; i++) {
                let v = (i === winIdx) ? winVal : (Math.random() > 0.5 ? 50 : 500);
                track.innerHTML += `<div class="item">${v}</div>`;
            }
            setTimeout(() => {
                track.style.transition = 'transform 4s cubic-bezier(0.1, 0, 0.1, 1)';
                track.style.transform = `translateX(-${(winIdx * 100) - 130}px)`;
                setTimeout(() => { score += winVal; save(); document.getElementById('btn-claim').style.display = 'block'; }, 4100);
            }, 50);
        };

        // ДРУГИЕ ФУНКЦИИ
        document.getElementById('btn-upd').onclick = () => { if(score >= cost) { score -= cost; pwr++; cost = Math.round(cost * 1.6); save(); } };
        document.getElementById('btn-gift').onclick = () => {
            const today = new Date().toDateString();
            if(lastGift !== today) { score += 2500; lastGift = today; save(); tg.showAlert("Бонус +2500!"); }
        };
        document.getElementById('btn-top').onclick = () => { openModal('modal-top'); loadTop(); };
        document.getElementById('btn-friends').onclick = () => openModal('modal-friends');
        document.getElementById('btn-sets').onclick = () => openModal('modal-sets');

        function loadTop() {
            const list = document.getElementById('top-list'); list.innerHTML = "Загрузка...";
            db.ref('leaderboard').orderByChild('score').limitToLast(10).once('value').then(snap => {
                list.innerHTML = ""; let arr = []; snap.forEach(c => arr.push(c.val()));
                arr.reverse().forEach((p, i) => { list.innerHTML += `<div style="display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #222"><span>${i+1}. ${p.name}</span><b>${p.score}</b></div>`; });
            });
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        document.getElementById('btn-claim').onclick = () => closeModal('modal-case');
        function startAudio() { if(!audioStarted) { document.getElementById('bg-music').play().then(()=>audioStarted=true).catch(()=>{}); } }
        
        updateUI();
    </script>
</body>
</html>
