<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --bg: #0b0b0d; --holy-gold: #ffcf40; --blue: #0a84ff; --purple: #bf5af2; --gray: #2c2c2e; --red: #ff453a; --glass: rgba(255, 255, 255, 0.08); }
        body { 
            background: var(--bg); color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; -webkit-user-select: none; 
        }

        /* Сияющий фон */
        body::before {
            content: ""; position: fixed; inset: 0;
            background: radial-gradient(circle at top center, rgba(255, 207, 64, 0.2), transparent 70%);
            pointer-events: none; z-index: -1;
        }

        /* ГЛАВНОЕ МЕНЮ */
        #main-menu { 
            position: fixed; inset: 0; z-index: 2000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background: radial-gradient(circle at center, #1a1a1c 0%, #000 100%);
            backdrop-filter: blur(10px);
        }
        .menu-title { font-size: 36px; font-weight: 900; color: var(--holy-gold); text-shadow: 0 0 20px rgba(255,207,64,0.5); margin-bottom: 30px; text-transform: uppercase; }

        /* ИГРОВОЙ ИНТЕРФЕЙС */
        #game-ui { display: none; flex-direction: column; height: 100vh; width: 100%; }
        #header { padding-top: env(safe-area-inset-top); height: 120px; text-align: center; display: flex; flex-direction: column; justify-content: center; }
        #score { font-size: 54px; font-weight: 900; color: var(--holy-gold); text-shadow: 0 0 30px rgba(255,207,64,0.4); }
        #stats { font-size: 14px; color: #8e8e93; font-weight: 500; text-transform: uppercase; }

        #game-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        #halo { 
            width: 200px; height: 200px; background: radial-gradient(circle at 30% 30%, #fff, #ffcf40); 
            border-radius: 50%; border: 10px solid rgba(255,255,255,0.4); font-size: 100px; 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 0 80px rgba(255,207,64,0.5); transition: transform 0.05s; touch-action: manipulation; 
        }
        #halo:active { transform: scale(0.92); }

        .pop { position: absolute; font-size: 38px; font-weight: 900; color: white; pointer-events: none; animation: fly 0.6s ease-out forwards; z-index: 20; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        @keyframes fly { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-150px) scale(1.4); opacity: 0; } }

        /* КНОПКИ */
        #footer { background: rgba(28, 28, 30, 0.8); backdrop-filter: blur(20px); padding: 20px 15px calc(25px + env(safe-area-inset-bottom)); border-radius: 35px 35px 0 0; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; border-top: 1px solid rgba(255,255,255,0.1); }
        .btn { height: 56px; border: none; border-radius: 18px; font-weight: 700; font-size: 14px; color: white; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: background 0.2s; -webkit-tap-highlight-color: transparent; }
        .btn:active { transform: scale(0.96); }
        
        .btn-menu { width: 260px; height: 60px; margin-bottom: 15px; font-size: 18px; border: 1px solid rgba(255,207,64,0.3); background: rgba(255,255,255,0.05); }
        .btn-play { background: var(--holy-gold); color: black; border: none; }

        /* МОДАЛКИ */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 3000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { width: 100%; max-width: 360px; background: #1c1c1e; border-radius: 30px; padding: 30px; border: 1px solid var(--holy-gold); text-align: center; }
        
        #wheel-canvas { border-radius: 50%; border: 8px solid #333; transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); box-shadow: 0 0 30px rgba(255,207,64,0.2); }
        .pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid var(--red); z-index: 10; }
    </style>
</head>
<body onclick="startAudio()">

    <audio id="bg-music" loop>
        <source src="https://cdn.pixabay.com/download/audio/2022/01/18/audio_88c7885b7e.mp3" type="audio/mpeg">
    </audio>

    <div id="main-menu">
        <div style="font-size: 100px; margin-bottom: 10px;">☁️</div>
        <div class="menu-title">Holy Tap</div>
        <button class="btn btn-menu btn-play" onclick="startGame()">ИГРАТЬ</button>
        <button id="menu-bless" class="btn btn-menu" onclick="bless()">БЛАГОСЛОВЕНИЕ</button>
        <button class="btn btn-menu" onclick="openWheel()">КОЛЕСО СУДЬБЫ</button>
        <p style="color: #555; font-size: 12px; margin-top: 20px;">Версия 1.3.0: Обновление «Явление»</p>
    </div>

    <div id="game-ui">
        <div id="header">
            <div id="score">0</div>
            <div id="stats">Сила молитвы: <b id="val-pwr">+1</b></div>
        </div>
        <div id="game-area"><div id="halo">😇</div></div>
        <div id="footer">
            <button id="btn-upd" class="btn" style="background: var(--glass); border: 1px solid var(--blue); color: var(--blue);">⚡ УЛУЧШИТЬ <span id="cost-upd">50</span></button>
            <button id="btn-top" class="btn" style="background: var(--glass); border: 1px solid #fff;">🏆 РЕЙТИНГ</button>
            <button onclick="location.reload()" class="btn" style="background: #1c1c1e; grid-column: span 2; border: 1px solid #333;">ВЕРНУТЬСЯ В МЕНЮ</button>
        </div>
    </div>

    <div id="modal-wheel" class="modal">
        <div class="modal-box">
            <h2 style="color:var(--holy-gold); margin:0 0 10px 0;">СВЯТОЕ КОЛЕСО</h2>
            <p style="font-size: 14px; color: #888; margin-bottom: 20px;">Цена вращения: <b style="color:white">900$</b></p>
            <div style="position: relative; width: 260px; height: 260px; margin: 0 auto;">
                <div class="pointer"></div>
                <canvas id="wheel-canvas" width="260" height="260"></canvas>
            </div>
            <button id="spin-btn" class="btn" style="width: 100%; background: var(--holy-gold); color: black; margin-top: 25px; height: 50px;" onclick="spinWheel()">КРУТИТЬ</button>
            <button onclick="closeModal('modal-wheel')" class="btn" style="width: 100%; background: transparent; border: 1px solid #555; margin-top: 10px; height: 45px;">ЗАКРЫТЬ</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let score = Number(localStorage.getItem('h_sc')) || 0;
        let pwr = Number(localStorage.getItem('h_pw')) || 1;
        let cost = Number(localStorage.getItem('h_ct')) || 50;
        let lastBless = localStorage.getItem('h_bless') || "";
        let audioStarted = false;

        // ЛОГИКА МЕНЮ
        function startGame() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('game-ui').style.display = 'flex';
        }

        function bless() {
            const today = new Date().toDateString();
            if(lastBless === today) {
                tg.showAlert("Вы уже получили благословение сегодня. Приходите завтра!");
                return;
            }
            score += 5000;
            lastBless = today;
            localStorage.setItem('h_bless', today);
            save();
            tg.showAlert("Иисус благословил вас! +5,000$ зачислено.");
        }

        function openWheel() {
            document.getElementById('modal-wheel').style.display = 'flex';
            drawWheel();
        }

        // КОЛЕСО (Платное 900)
        const canvas = document.getElementById('wheel-canvas');
        const ctx = canvas.getContext('2d');
        const sectors = [100, 500, 1000, 50, 2000, 0, 1500, 300];
        const colors = ["#ffcf40", "#2c2c2e", "#bf5af2", "#0a84ff", "#32d74b", "#1c1c1e", "#ff453a", "#8e8e93"];

        function drawWheel() {
            const arc = (Math.PI * 2) / sectors.length;
            sectors.forEach((s, i) => {
                ctx.beginPath(); ctx.fillStyle = colors[i]; ctx.moveTo(130, 130);
                ctx.arc(130, 130, 130, i * arc, (i + 1) * arc); ctx.fill();
                ctx.save(); ctx.translate(130, 130); ctx.rotate(i * arc + arc/2);
                ctx.fillStyle = "white"; ctx.font = "bold 16px Arial"; ctx.fillText(s + "$", 65, 5); ctx.restore();
            });
        }

        function spinWheel() {
            if(score < 900) {
                tg.showAlert("Недостаточно средств. Нужно 900$!");
                return;
            }
            score -= 900;
            save();
            
            const deg = 2000 + Math.random() * 2000;
            canvas.style.transform = `rotate(${deg}deg)`;
            document.getElementById('spin-btn').disabled = true;

            setTimeout(() => {
                const actualDeg = deg % 360;
                const idx = sectors.length - 1 - Math.floor(actualDeg / (360 / sectors.length));
                const win = sectors[idx];
                score += win;
                save();
                tg.showAlert(win > 0 ? `Божественная удача! Вы выиграли ${win}$` : "Пусто... Помолитесь еще раз!");
                document.getElementById('spin-btn').disabled = false;
            }, 4000);
        }

        // ТАПЫ (С поддержкой мульти-тача)
        document.getElementById('halo').addEventListener('touchstart', (e) => {
            e.preventDefault();
            for(let i=0; i < e.touches.length; i++) {
                handleTap(e.touches[i].clientX, e.touches[i].clientY);
            }
        });

        function handleTap(x, y) {
            score += pwr;
            const p = document.createElement('div');
            p.className = 'pop'; p.innerText = `+${pwr}`;
            p.style.left = (x - 20) + 'px'; p.style.top = (y - 20) + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 600);
            tg.HapticFeedback.impactOccurred('medium');
            save();
        }

        function save() {
            localStorage.setItem('h_sc', score);
            localStorage.setItem('h_pw', pwr);
            localStorage.setItem('h_ct', cost);
            updateUI();
        }

        function updateUI() {
            document.getElementById('score').innerText = Math.floor(score).toLocaleString('ru-RU');
            document.getElementById('val-pwr').innerText = "+" + pwr;
            document.getElementById('cost-upd').innerText = cost;
            document.getElementById('btn-upd').disabled = score < cost;
        }

        document.getElementById('btn-upd').onclick = () => {
            if(score >= cost) {
                score -= cost; pwr++; cost = Math.round(cost * 1.7); save();
            }
        };

        function startAudio() {
            if(!audioStarted) {
                const music = document.getElementById('bg-music');
                music.volume = 0.4;
                music.play().then(() => audioStarted = true).catch(() => {});
            }
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        updateUI();
    </script>
</body>
</html>
