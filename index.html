<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --bg: #0b0b0d; --orange: #ff9f0a; --blue: #0a84ff; --purple: #bf5af2; --gray: #2c2c2e; --red: #ff453a; --glass: rgba(255, 255, 255, 0.08); --holy: #ffcf40; }
        body { background: var(--bg); color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; -webkit-user-select: none; }

        #header { padding-top: env(safe-area-inset-top); height: 120px; text-align: center; display: flex; flex-direction: column; justify-content: center; }
        #score { font-size: 54px; font-weight: 900; color: var(--holy); text-shadow: 0 0 30px rgba(255,207,64,0.4); transition: transform 0.1s; }
        #stats { font-size: 14px; color: #8e8e93; font-weight: 500; text-transform: uppercase; }

        #game-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; position: relative; }
        
        /* НИМБ С УЛУЧШЕННОЙ АНИМАЦИЕЙ */
        #halo { 
            width: 190px; height: 190px; 
            background: radial-gradient(circle, #fff, var(--holy)); 
            border-radius: 50%; font-size: 90px; 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 0 60px rgba(255,207,64,0.5); 
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            touch-action: manipulation; cursor: pointer; 
            border: 5px solid rgba(255,255,255,0.3);
            animation: float 3s ease-in-out infinite;
            position: relative;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-10px) scale(1.02); }
        }
        #halo:active { transform: scale(0.9) rotate(3deg); }

        .pop { position: absolute; font-size: 40px; font-weight: 900; color: white; pointer-events: none; animation: fly 0.6s ease-out forwards; z-index: 20; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        @keyframes fly { 
            0% { transform: translateY(0) scale(0.5); opacity: 0; } 
            20% { opacity: 1; transform: translateY(-20px) scale(1.2); }
            100% { transform: translateY(-120px) scale(1.5); opacity: 0; } 
        }

        /* ФУТЕР */
        #footer { background: rgba(28, 28, 30, 0.9); backdrop-filter: blur(20px); padding: 15px 15px calc(20px + env(safe-area-inset-bottom)); border-radius: 30px 30px 0 0; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; border-top: 1px solid rgba(255,255,255,0.1); }
        .btn { height: 50px; border: none; border-radius: 15px; font-weight: 700; color: white; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn span { font-size: 10px; opacity: 0.6; }

        #btn-upd { background: var(--blue); }
        #btn-top { background: var(--gray); border: 1px solid #444; }
        #btn-gift { background: var(--purple); }

        /* МОДАЛКИ */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 6000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); }
        .modal-box { width: 90%; max-width: 350px; background: #1c1c1e; border-radius: 25px; padding: 20px; border: 1px solid #333; text-align: center; }
        
        #top-list { margin-top: 15px; max-height: 300px; overflow-y: auto; background: #111; border-radius: 15px; }
        .top-item { display: flex; justify-content: space-between; padding: 12px 15px; border-bottom: 1px solid #222; }
        .top-item:last-child { border: none; }
        .top-item b { color: var(--holy); }

        #main-menu { position: fixed; inset: 0; background: #000; z-index: 7000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="main-menu">
        <h1 style="color:var(--holy); font-size: 42px;">HOLY TAP</h1>
        <button class="btn" style="width:200px; height:60px; background:var(--orange); font-size:20px;" onclick="closeMenu()">ИГРАТЬ</button>
    </div>

    <div id="header">
        <div id="score">0</div>
        <div id="stats">Сила тапа: <b id="val-pwr">1</b></div>
    </div>

    <div id="game-area">
        <div id="halo" onclick="tap(event)">😇</div>
    </div>

    <div id="footer">
        <button id="btn-upd" class="btn" onclick="upgrade()">⚡ УЛУЧШИТЬ <span id="cost-upd">50</span></button>
        <button id="btn-top" class="btn" onclick="loadTop()">🏆 РЕЙТИНГ</button>
        <button id="btn-gift" class="btn" onclick="claimGift()">🎁 ПОДАРОК</button>
        <button class="btn" style="background:#333" onclick="openMenu()">⚙️ МЕНЮ</button>
    </div>

    <div id="modal-top" class="modal">
        <div class="modal-box">
            <h2 style="margin:0">🏆 ТОП ИГРОКОВ</h2>
            <div id="top-list">Загрузка...</div>
            <button onclick="closeModal('modal-top')" class="btn" style="width:100%; margin-top:15px; background:var(--gray)">ЗАКРЫТЬ</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAhFyYz8tC0VZqNKQweM1VH7A9rzcLQ7L4", authDomain: "rockettap-22e98.firebaseapp.com", databaseURL: "https://rockettap-22e98-default-rtdb.firebaseio.com", projectId: "rockettap-22e98", storageBucket: "rockettap-22e98.firebasestorage.app", messagingSenderId: "800263373343", appId: "1:800263373343:web:ed6db2e822f61d8257cb2a" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const tg = window.Telegram.WebApp;
        tg.expand();

        let score = Number(localStorage.getItem('rk_sc')) || 0;
        let pwr = Number(localStorage.getItem('rk_pw')) || 1;
        let cost = Number(localStorage.getItem('rk_ct')) || 50;
        const uid = tg.initDataUnsafe?.user?.id || "anon_" + Math.floor(Math.random()*10000);
        const userName = tg.initDataUnsafe?.user?.first_name || "Игрок";

        function save() {
            localStorage.setItem('rk_sc', score);
            localStorage.setItem('rk_pw', pwr);
            localStorage.setItem('rk_ct', cost);
            // Сохранение в базу
            db.ref('leaderboard/' + uid).set({
                name: userName,
                score: Math.floor(score)
            });
            updateUI();
        }

        function updateUI() {
            document.getElementById('score').innerText = Math.floor(score).toLocaleString();
            document.getElementById('val-pwr').innerText = pwr;
            document.getElementById('cost-upd').innerText = cost;
            document.getElementById('btn-upd').disabled = score < cost;
        }

        function tap(e) {
            score += pwr;
            
            // Анимация текста
            const x = e.clientX || e.touches[0].clientX;
            const y = e.clientY || e.touches[0].clientY;
            const p = document.createElement('div');
            p.className = 'pop';
            p.innerText = `+${pwr}`;
            p.style.left = (x - 20) + 'px';
            p.style.top = (y - 40) + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 600);

            // Мини-прыжок счета
            const sElem = document.getElementById('score');
            sElem.style.transform = "scale(1.1)";
            setTimeout(() => sElem.style.transform = "scale(1)", 100);

            tg.HapticFeedback.impactOccurred('medium');
            save();
        }

        function upgrade() {
            if(score >= cost) {
                score -= cost;
                pwr++;
                cost = Math.round(cost * 1.5);
                save();
            }
        }

        function loadTop() {
            openModal('modal-top');
            const list = document.getElementById('top-list');
            list.innerHTML = "<div style='padding:20px'>Загрузка...</div>";
            
            db.ref('leaderboard').orderByChild('score').limitToLast(10).once('value', (snapshot) => {
                let items = [];
                snapshot.forEach(child => {
                    items.push(child.val());
                });
                items.sort((a, b) => b.score - a.score);
                
                list.innerHTML = items.map((user, i) => `
                    <div class="top-item">
                        <span>${i+1}. ${user.name}</span>
                        <b>${user.score.toLocaleString()}</b>
                    </div>
                `).join('');
            }).catch(err => {
                list.innerHTML = "Ошибка загрузки :(";
            });
        }

        function claimGift() {
            const today = new Date().toDateString();
            if(localStorage.getItem('last_gift') !== today) {
                score += 1000;
                localStorage.setItem('last_gift', today);
                save();
                tg.showAlert("Вы получили ежедневный бонус 1000 монет!");
            } else {
                tg.showAlert("Подарок уже получен сегодня!");
            }
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function openMenu() { document.getElementById('main-menu').style.display = 'flex'; }
        function closeMenu() { document.getElementById('main-menu').style.display = 'none'; }

        updateUI();
    </script>
</body>
</html>
