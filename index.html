<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Rocket Tap Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #0d0d0d;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        #header { margin-top: 20px; text-align: center; }
        #username { color: #888; font-size: 14px; margin-bottom: 5px; }
        #score { font-size: 3.2rem; font-weight: bold; color: #ff9f00; margin: 0; }
        
        #coin-section { flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; }
        #coin {
            width: 160px; height: 160px; 
            background: radial-gradient(circle, #ffb300, #ff8c00);
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 70px;
            box-shadow: 0 0 30px rgba(255, 165, 0, 0.3);
            cursor: pointer; transition: transform 0.05s;
            border: 5px solid rgba(255, 255, 255, 0.1);
        }
        #coin:active { transform: scale(0.92); }

        #controls {
            width: 100%; padding: 20px;
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 12px; background: #1a1a1a;
            border-radius: 24px 24px 0 0;
            box-sizing: border-box;
        }
        .btn {
            padding: 15px; border: none; border-radius: 14px;
            font-weight: bold; font-size: 14px; cursor: pointer; color: white;
        }
        #upgrade-btn { background: #3498db; }
        #leaderboard-btn { background: #444; }
        .btn:disabled { opacity: 0.3; cursor: default; }

        /* Лидерборд */
        #overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.95);
            z-index: 1000; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box;
        }
        #leaderboard-card {
            background: #222; width: 100%; max-width: 400px;
            border-radius: 20px; padding: 15px; box-sizing: border-box;
            margin-top: 20px;
        }
        .leader-item {
            display: flex; justify-content: space-between;
            padding: 12px 10px; border-bottom: 1px solid #333;
        }
        .leader-item.me { color: #ff9f00; background: rgba(255,159,0,0.1); border-radius: 8px; }
        #close-btn { margin-top: auto; width: 100%; max-width: 200px; background: #ff4444; padding: 15px; border-radius: 12px; border: none; color: white; font-weight: bold; }

        .tap-effect { position: absolute; color: white; font-weight: bold; font-size: 26px; pointer-events: none; animation: moveUp 0.8s forwards; z-index: 50; }
        @keyframes moveUp { to { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>

    <div id="header">
        <div id="username">Загрузка...</div>
        <div id="score">0</div>
    </div>
    
    <div id="coin-section">
        <div id="coin">🚀</div>
    </div>

    <div id="controls">
        <button id="upgrade-btn" class="btn">Апгрейд (50)</button>
        <button id="leaderboard-btn" class="btn">🏆 Топ-10</button>
    </div>

    <div id="overlay">
        <h2 style="margin-top:40px">Рейтинг Пилотов</h2>
        <div id="leaderboard-card"></div>
        <button id="close-btn">Назад в полет</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // 1. Получаем имя пользователя правильно
        let myName = "Игрок";
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            myName = tg.initDataUnsafe.user.first_name || tg.initDataUnsafe.user.username || "Пилот";
        }
        document.getElementById('username').innerText = "Пилот: " + myName;

        // 2. Данные
        let score = Number(localStorage.getItem('score_v2')) || 0;
        let pwr = Number(localStorage.getItem('pwr_v2')) || 1;
        let cost = Number(localStorage.getItem('cost_v2')) || 50;

        const scoreEl = document.getElementById('score');
        const upgradeBtn = document.getElementById('upgrade-btn');
        const coin = document.getElementById('coin');

        function updateUI() {
            scoreEl.innerText = Math.floor(score);
            upgradeBtn.innerText = `Прокачка (+1) • ${cost}`;
            upgradeBtn.disabled = score < cost;
            localStorage.setItem('score_v2', score);
            localStorage.setItem('pwr_v2', pwr);
            localStorage.setItem('cost_v2', cost);
        }

        // Клик с поддержкой тач-событий
        function handleTap(e) {
            score += pwr;
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            
            // Определяем координаты (мышь или тач)
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            
            if(clientX && clientY) {
                const effect = document.createElement('div');
                effect.className = 'tap-effect';
                effect.innerText = '+' + pwr;
                effect.style.left = clientX + 'px';
                effect.style.top = clientY + 'px';
                document.body.appendChild(effect);
                setTimeout(() => effect.remove(), 700);
            }
            updateUI();
        }

        coin.onclick = handleTap;

        upgradeBtn.onclick = () => {
            if (score >= cost) {
                score -= cost;
                pwr += 1;
                cost = Math.floor(cost * 1.8);
                updateUI();
            }
        };

        // Лидерборд
        const fakeLeaders = [
            {n: "CryptoLord", s: 250000}, {n: "StarVoyager", s: 180000},
            {n: "MarsOne", s: 145000}, {n: "TapperGPT", s: 90000},
            {n: "SkyWalker", s: 65000}, {n: "MoonBase", s: 40000},
            {n: "SonicTap", s: 20000}, {n: "ZeroG", s: 10000},
            {n: "Alpha", s: 5000}
        ];

        document.getElementById('leaderboard-btn').onclick = () => {
            const card = document.getElementById('leaderboard-card');
            card.innerHTML = "";
            let fullList = [...fakeLeaders, {n: myName, s: score, me: true}];
            fullList.sort((a, b) => b.s - a.s);
            
            fullList.slice(0, 10).forEach((item, i) => {
                const row = document.createElement('div');
                row.className = `leader-item ${item.me ? 'me' : ''}`;
                row.innerHTML = `<span>${i+1}. ${item.n}</span><span>${item.s.toLocaleString()}</span>`;
                card.appendChild(row);
            });
            document.getElementById('overlay').style.display = 'flex';
        };

        document.getElementById('close-btn').onclick = () => {
            document.getElementById('overlay').style.display = 'none';
        };

        updateUI();
    </script>
</body>
</html>
