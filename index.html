<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Rocket Tap Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --main-color: #ff9f00;
            --text-color: #ffffff;
            --accent-color: #3498db;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        #header {
            margin-top: 30px;
            text-align: center;
        }
        #score {
            font-size: 3.5rem;
            font-weight: 800;
            text-shadow: 0 0 20px var(--main-color);
            margin: 0;
        }
        #click-power {
            color: var(--accent-color);
            font-size: 1rem;
            margin-top: 5px;
        }
        .coin-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        #coin {
            width: 220px;
            height: 220px;
            background: linear-gradient(145deg, #ffb300, #ff8c00);
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(255, 159, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
            border: 8px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.05s;
            cursor: pointer;
        }
        #coin:active { transform: scale(0.9); }

        /* Магазин */
        #shop {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 25px 25px 0 0;
            box-sizing: border-box;
            text-align: center;
        }
        .upgrade-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            max-width: 300px;
        }
        .upgrade-btn:disabled {
            background: #444;
            opacity: 0.6;
        }

        .tap-effect {
            position: absolute;
            color: white;
            font-weight: bold;
            font-size: 28px;
            pointer-events: none;
            animation: moveUp 0.8s ease-out forwards;
        }
        @keyframes moveUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-100px); }
        }
    </style>
</head>
<body>

    <div id="header">
        <p id="score">0</p>
        <p id="click-power">Сила клика: x1</p>
    </div>
    
    <div class="coin-container">
        <div id="coin">🚀</div>
    </div>

    <div id="shop">
        <button id="upgrade-btn" class="upgrade-btn">Улучшить клик (Цена: 50)</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Данные игры
        let score = parseInt(localStorage.getItem('score')) || 0;
        let clickPower = parseInt(localStorage.getItem('clickPower')) || 1;
        let upgradeCost = parseInt(localStorage.getItem('upgradeCost')) || 50;

        const scoreDisplay = document.getElementById('score');
        const powerDisplay = document.getElementById('click-power');
        const upgradeBtn = document.getElementById('upgrade-btn');
        const coin = document.getElementById('coin');

        // Обновление экрана
        function updateUI() {
            scoreDisplay.innerText = Math.floor(score);
            powerDisplay.innerText = `Сила клика: x${clickPower}`;
            upgradeBtn.innerText = `Улучшить клик (Цена: ${upgradeCost})`;
            upgradeBtn.disabled = score < upgradeCost;
            
            localStorage.setItem('score', score);
            localStorage.setItem('clickPower', clickPower);
            localStorage.setItem('upgradeCost', upgradeCost);
        }

        // Клик по монете
        coin.addEventListener('click', (e) => {
            score += clickPower;
            updateUI();
            tg.HapticFeedback.impactOccurred('medium');
            createEffect(e.clientX, e.clientY, `+${clickPower}`);
        });

        // Покупка апгрейда
        upgradeBtn.addEventListener('click', () => {
            if (score >= upgradeCost) {
                score -= upgradeCost;
                clickPower += 1;
                upgradeCost = Math.floor(upgradeCost * 1.5); // Цена растет в 1.5 раза
                updateUI();
                tg.HapticFeedback.notificationOccurred('success');
            }
        });

        function createEffect(x, y, text) {
            const el = document.createElement('div');
            el.className = 'tap-effect';
            el.innerText = text;
            el.style.left = `${x}px`;
            el.style.top = `${y}px`;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        updateUI(); // Запуск при старте
    </script>
</body>
</html>
