<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --bg: #000; --orange: #ff9f00; --blue: #007aff; --purple: #af52de; --gray: #2c2c2e; --red: #ff3b30; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; -webkit-user-select: none; }

        /* Верхняя панель */
        #header { padding-top: env(safe-area-inset-top); height: 110px; text-align: center; display: flex; flex-direction: column; justify-content: center; background: linear-gradient(180deg, #111 0%, #000 100%); }
        #score { font-size: 50px; font-weight: 900; color: var(--orange); text-shadow: 0 0 15px rgba(255,159,0,0.4); }
        #stats { font-size: 14px; color: #888; margin-top: 4px; }

        /* Игровая зона */
        #game-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        #rocket { width: 180px; height: 180px; background: radial-gradient(circle, #ffb300, #ff8c00); border-radius: 50%; border: 6px solid #fff; font-size: 80px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 40px rgba(255,159,0,0.5); transition: transform 0.05s; z-index: 10; touch-action: manipulation; }
        #rocket:active { transform: scale(0.9); }

        .pop { position: absolute; font-size: 32px; font-weight: 900; color: white; pointer-events: none; animation: fly 0.6s ease-out forwards; z-index: 20; }
        @keyframes fly { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-150px) scale(1.5); opacity: 0; } }

        /* Меню */
        #footer { background: #1c1c1e; padding: 15px 15px calc(20px + env(safe-area-inset-bottom)); border-radius: 30px 30px 0 0; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; border-top: 1px solid #333; }
        .btn { height: 52px; border: none; border-radius: 16px; font-weight: bold; font-size: 14px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; }
        
        #btn-upd { background: var(--blue); }
        #btn-case { background: var(--purple); }
        #btn-gift { background: #fff; color: #000; }
        #btn-top { background: var(--gray); }
        #btn-sets { background: #3a3a3c; grid-column: span 2; margin-top: 5px; }
        .btn:disabled { opacity: 0.3; pointer-events: none; }

        /* Модалки */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { width: 100%; max-width: 380px; background: #1c1c1e; border-radius: 25px; padding: 25px; box-sizing: border-box; text-align: center; border: 1px solid #333; }

        /* РУЛЕТКА */
        #roll-wrap { width: 100%; height: 100px; border: 2px solid #444; margin: 25px 0; overflow: hidden; position: relative; background: #000; border-radius: 15px; }
        #roll-track { display: flex; position: absolute; left: 0; height: 100%; transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); }
        .item { min-width: 100px; height: 100%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 24px; border-right: 1px solid #222; }
        
        /* ЛИНИЯ УДАЧИ (ХИТБОКС) */
        #hitbox { position: absolute; left: 50%; top: 0; bottom: 0; width: 4px; background: var(--red); transform: translateX(-50%); z-index: 50; box-shadow: 0 0 15px var(--red); }
        #hitbox::before { content: '▼'; position: absolute; top: -15px; left: -7px; color: var(--red); font-size: 18px; }
        #hitbox::after { content: '▲'; position: absolute; bottom: -15px; left: -7px; color: var(--red); font-size: 18px; }

        #top-list { margin: 20px 0; max-height: 250px; overflow-y: auto; text-align: left; }
        .row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #2c2c2e; font-size: 15px; }
    </style>
</head>
<body onclick="startAudio()">

    <audio id="bg-music" loop>
        <source src="https://www.bensound.com/bensound-music/bensound-slowmotion.mp3" type="audio/mpeg">
    </audio>

    <div id="header">
        <div id="score">0</div>
        <div id="stats">Прибыль за тап: <b id="val-pwr">+1</b></div>
    </div>

    <div id="game-area"><div id="rocket">🚀</div></div>

    <div id="footer">
        <button id="btn-upd" class="btn">Улучшить (50)</button>
        <button id="btn-case" class="btn">Кейс (350)</button>
        <button id="btn-gift" class="btn">🎁 Подарок</button>
        <button id="btn-top" class="btn">🏆 ТОП</button>
        <button id="btn-sets" class="btn">⚙️ НАСТРОЙКИ</button>
    </div>

    <div id="modal-case" class="modal">
        <div class="modal-box">
            <h2 id="case-title" style="margin:0;">ОТКРЫТИЕ</h2>
            <div id="roll-wrap">
                <div id="hitbox"></div>
                <div id="roll-track"></div>
            </div>
            <button id="btn-claim" class="btn" style="display:none; width:100%; background:var(--blue);">ЗАБРАТЬ</button>
        </div>
    </div>

    <div id="modal-top" class="modal">
        <div class="modal-box">
            <h2>Топ Игроков</h2>
            <div id="top-list">Загрузка данных...</div>
            <button onclick="closeModal('modal-top')" class="btn" style="width:100%; background:var(--gray);">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div id="modal-sets" class="modal">
        <div class="modal-box">
            <h2>Настройки</h2>
            <button id="toggle-mu" class="btn" style="width:100%; background:var(--blue); margin-bottom:15px;">МУЗЫКА: ВКЛ</button>
            <div style="color:#666; font-size:12px;">Версия: <b>1.2.0 обновление</b></div>
            <button onclick="closeModal('modal-sets')" class="btn" style="width:100%; background:var(--gray); margin-top:15px;">ЗАКРЫТЬ</button>
        </div>
    </div>

    <script>
        // ИНИЦИАЛИЗАЦИЯ
        const firebaseConfig = {
            apiKey: "AIzaSyAhFyYz8tC0VZqNKQweM1VH7A9rzcLQ7L4",
            authDomain: "rockettap-22e98.firebaseapp.com",
            databaseURL: "https://rockettap-22e98-default-rtdb.firebaseio.com",
            projectId: "rockettap-22e98",
            storageBucket: "rockettap-22e98.firebasestorage.app",
            messagingSenderId: "800263373343",
            appId: "1:800263373343:web:ed6db2e822f61d8257cb2a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const tg = window.Telegram.WebApp;
        tg.expand();

        let score = Number(localStorage.getItem('rk_sc')) || 0;
        let pwr = Number(localStorage.getItem('rk_pw')) || 1;
        let cost = Number(localStorage.getItem('rk_ct')) || 50;
        let lastGift = localStorage.getItem('rk_gift_v120') || "";
        
        const audio = document.getElementById('bg-music');
        let musicEnabled = true;
        let isAudioPlaying = false;

        function save() {
            localStorage.setItem('rk_sc', score);
            localStorage.setItem('rk_pw', pwr);
            localStorage.setItem('rk_ct', cost);
            localStorage.setItem('rk_gift_v120', lastGift);
            
            const uid = tg.initDataUnsafe?.user?.id || "unknown";
            const name = tg.initDataUnsafe?.user?.first_name || "Пилот";
            
            // Запись в базу с обработкой ошибок
            db.ref('leaderboard/' + uid).set({ name: name, score: Math.floor(score) })
              .catch(e => console.error("Firebase Error: ", e));
            
            updateUI();
        }

        function updateUI() {
            document.getElementById('score').innerText = Math.floor(score).toLocaleString();
            document.getElementById('val-pwr').innerText = "+" + pwr;
            document.getElementById('btn-upd').innerText = `Улучшить (${cost})`;
            document.getElementById('btn-upd').disabled = score < cost;
            document.getElementById('btn-case').disabled = score < 350;

            const today = new Date().toDateString();
            const gBtn = document.getElementById('btn-gift');
            if(lastGift === today) {
                gBtn.disabled = true;
                gBtn.innerText = "Взято ✅";
            } else {
                gBtn.disabled = false;
                gBtn.innerText = "🎁 Подарок";
            }
        }

        function startAudio() {
            if(!isAudioPlaying && musicEnabled) {
                audio.play().then(() => isAudioPlaying = true).catch(() => {});
            }
        }

        // КЛИК
        document.getElementById('rocket').onclick = (e) => {
            score += pwr;
            const p = document.createElement('div');
            p.className = 'pop'; p.innerText = `+${pwr}`;
            p.style.left = e.clientX + 'px'; p.style.top = e.clientY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 600);
            tg.HapticFeedback.impactOccurred('light');
            save();
        };

        // УЛУЧШЕНИЕ
        document.getElementById('btn-upd').onclick = () => {
            if(score >= cost) {
                score -= cost; pwr++; cost = Math.round(cost * 1.7);
                save();
            }
        };

        // КЕЙС
        const pool = [
            {v: 10000, w: 1}, {v: 5000, w: 4}, {v: 1000, w: 10}, 
            {v: 500, w: 15}, {v: 100, w: 30}, {v: 50, w: 40}
        ];

        function pick() {
            let total = pool.reduce((s, x) => s + x.w, 0);
            let r = Math.random() * total;
            for (let x of pool) { if(r < x.w) return x.v; r -= x.w; }
            return 50;
        }

        document.getElementById('btn-case').onclick = () => {
            if(score < 350) return;
            score -= 350; save();
            
            const modal = document.getElementById('modal-case');
            const track = document.getElementById('roll-track');
            const claim = document.getElementById('btn-claim');
            modal.style.display = 'flex';
            claim.style.display = 'none';
            document.getElementById('case-title').innerText = "КРУТИМ...";
            
            track.style.transition = 'none';
            track.style.transform = 'translateX(0)';
            track.innerHTML = '';
            
            let res = [];
            for(let i=0; i<60; i++) {
                let v = pick();
                res.push(v);
                let color = v >= 5000 ? '#ff9f00' : (v >= 1000 ? '#af52de' : '#007aff');
                track.innerHTML += `<div class="item" style="color:${color}">${v}</div>`;
            }

            setTimeout(() => {
                track.style.transition = 'transform 4s cubic-bezier(0.1, 0, 0.1, 1)';
                const itemW = 100;
                const winIdx = 50; 
                const shift = (winIdx * itemW) + (itemW / 2) - (document.getElementById('roll-wrap').offsetWidth / 2);
                track.style.transform = `translateX(-${shift}px)`;
                
                setTimeout(() => {
                    let win = res[winIdx];
                    score += win; save();
                    document.getElementById('case-title').innerText = `ВЫПАЛО: ${win}`;
                    claim.style.display = 'block';
                }, 4100);
            }, 50);
        };

        // ПОДАРОК
        document.getElementById('btn-gift').onclick = () => {
            const today = new Date().toDateString();
            if(lastGift !== today) {
                score += 2000;
                lastGift = today;
                save();
                tg.showAlert("Вы получили 2000 монет!");
            }
        };

        // ТОП
        document.getElementById('btn-top').onclick = () => {
            document.getElementById('modal-top').style.display = 'flex';
            const list = document.getElementById('top-list');
            list.innerHTML = "Загрузка...";
            
            // Используем .on() для живого обновления
            db.ref('leaderboard').orderByChild('score').limitToLast(15).on('value', (snap) => {
                list.innerHTML = "";
                let arr = [];
                snap.forEach(c => arr.push(c.val()));
                arr.reverse().forEach((p, i) => {
                    list.innerHTML += `<div class="row"><span>${i+1}. ${p.name}</span><b>${p.score.toLocaleString()}</b></div>`;
                });
            });
        };

        // НАСТРОЙКИ
        document.getElementById('btn-sets').onclick = () => document.getElementById('modal-sets').style.display = 'flex';
        document.getElementById('toggle-mu').onclick = function() {
            musicEnabled = !musicEnabled;
            if(!musicEnabled) audio.pause(); else audio.play();
            this.innerText = `МУЗЫКА: ${musicEnabled ? 'ВКЛ' : 'ВЫКЛ'}`;
            this.style.background = musicEnabled ? 'var(--blue)' : 'var(--red)';
        };

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        document.getElementById('btn-claim').onclick = () => closeModal('modal-case');

        updateUI();
    </script>
</body>
</html>
