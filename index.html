<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --bg: #0b0b0d; --orange: #ff9f0a; --blue: #0a84ff; --purple: #bf5af2; --gray: #2c2c2e; --red: #ff453a; --glass: rgba(255, 255, 255, 0.08); }
        body { background: var(--bg); color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; -webkit-user-select: none; }

        /* ГЛАВНОЕ МЕНЮ */
        #main-menu { position: fixed; inset: 0; background: radial-gradient(circle at center, #1c1c1e 0%, #000 100%); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; transition: opacity 0.3s ease; }
        .menu-logo { font-size: 100px; filter: drop-shadow(0 0 20px var(--orange)); margin-bottom: 20px; }
        .btn-main { width: 260px; height: 65px; border: none; border-radius: 22px; font-weight: 900; font-size: 18px; color: white; cursor: pointer; transition: transform 0.1s; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn-main:active { transform: scale(0.95); }
        #play-act { background: linear-gradient(135deg, var(--orange), #ffcc00); color: black; }
        #wheel-act { background: linear-gradient(135deg, var(--purple), #8e5af2); }
        #sets-act { background: var(--gray); }

        /* ИГРОВОЙ ИНТЕРФЕЙС */
        #game-ui { display: none; flex-direction: column; height: 100vh; }
        #header { padding-top: env(safe-area-inset-top); height: 120px; text-align: center; display: flex; flex-direction: column; justify-content: center; background: linear-gradient(to bottom, rgba(255,159,10,0.1), transparent); }
        #score { font-size: 54px; font-weight: 900; color: var(--orange); text-shadow: 0 0 30px rgba(255,159,10,0.4); letter-spacing: -1px; }
        #stats { font-size: 14px; color: #8e8e93; font-weight: 500; text-transform: uppercase; }

        #game-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        #rocket { width: 190px; height: 190px; background: radial-gradient(circle at 30% 30%, #ffcc00, #ff9f0a); border-radius: 50%; border: 8px solid rgba(255,255,255,0.2); font-size: 85px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 60px rgba(255,159,10,0.3); transition: transform 0.1s; touch-action: manipulation; }
        #rocket:active { transform: scale(0.9); }

        /* ФУТЕР И КНОПКИ */
        #footer { background: rgba(28, 28, 30, 0.8); backdrop-filter: blur(20px); padding: 20px 15px calc(25px + env(safe-area-inset-bottom)); border-radius: 35px 35px 0 0; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; border-top: 1px solid rgba(255,255,255,0.1); }
        .btn { height: 56px; border: none; border-radius: 18px; font-weight: 700; font-size: 14px; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.1s; }
        .btn:active { transform: scale(0.95); }
        .btn span { font-size: 10px; opacity: 0.7; margin-top: 2px; }

        #btn-upd { background: var(--glass); border: 1px solid var(--blue); color: var(--blue); }
        #btn-case { background: var(--glass); border: 1px solid var(--purple); color: var(--purple); }
        #btn-friends { background: var(--glass); border: 1px solid var(--orange); color: var(--orange); }
        #btn-top { background: var(--glass); border: 1px solid #fff; color: #fff; }
        #btn-gift { background: #1c1c1e; border: 1px solid #333; }
        #btn-sets { background: #1c1c1e; border: 1px solid #333; font-size: 20px; }

        /* МОДАЛКИ */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 3000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { width: 100%; max-width: 360px; background: #1c1c1e; border-radius: 30px; padding: 30px; border: 1px solid #333; text-align: center; }

        /* КОЛЕСО */
        #wheel-container { position: relative; width: 280px; height: 280px; margin-bottom: 30px; }
        #wheel-canvas { border-radius: 50%; border: 8px solid #333; box-shadow: 0 0 40px rgba(0,0,0,0.5); transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); }
        #luck-line { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 4px; height: 40px; background: var(--red); z-index: 10; border-radius: 2px; box-shadow: 0 0 10px var(--red); }

        /* РЕЙТИНГ */
        #top-list { margin: 20px 0; max-height: 300px; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 20px; }
        .row { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #2c2c2e; font-size: 16px; }

        /* АНИМАЦИЯ ПОПАПА */
        .pop { position: absolute; font-size: 38px; font-weight: 900; color: white; pointer-events: none; animation: fly 0.7s ease-out forwards; }
        @keyframes fly { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-150px); opacity: 0; } }
    </style>
</head>
<body onclick="startAudio()">

    <audio id="bg-music" loop><source src="https://www.bensound.com/bensound-music/bensound-slowmotion.mp3" type="audio/mpeg"></audio>

    <div id="main-menu">
        <div class="menu-logo">🚀</div>
        <button id="play-act" class="btn-main" onclick="startGame()">ИГРАТЬ</button>
        <button id="wheel-act" class="btn-main" onclick="openModal('modal-wheel')">КОЛЕСО ФОРТУНЫ</button>
        <button id="sets-act" class="btn-main" onclick="openModal('modal-sets')">НАСТРОЙКИ</button>
    </div>

    <div id="game-ui">
        <div id="header">
            <div id="score">0</div>
            <div id="stats">Прибыль за тап: <b id="val-pwr">+1</b></div>
        </div>
        <div id="game-area"><div id="rocket">🚀</div></div>
        <div id="footer">
            <button id="btn-upd" class="btn">⚡ УЛУЧШИТЬ<span id="cost-upd">50</span></button>
            <button id="btn-case" class="btn">💎 КЕЙС<span>900</span></button>
            <button id="btn-friends" class="btn">👥 ДРУЗЬЯ</button>
            <button id="btn-top" class="btn">🏆 РЕЙТИНГ</button>
            <button id="btn-gift" class="btn">🎁 ПОДАРОК</button>
            <button id="btn-sets" class="btn" onclick="openModal('modal-sets')">⚙️</button>
        </div>
    </div>

    <div id="modal-wheel" class="modal">
        <div class="modal-box">
            <h2 style="margin-top:0">УДАЧИ, ПИЛОТ!</h2>
            <div id="wheel-container">
                <div id="luck-line"></div>
                <canvas id="wheel-canvas" width="280" height="280"></canvas>
            </div>
            <button id="spin-btn" class="btn-main" style="width:100%; background:var(--orange); color:black" onclick="spinWheel()">КРУТИТЬ</button>
            <button onclick="closeModal('modal-wheel')" class="btn" style="width:100%; background:transparent; margin-top:15px; border:1px solid #444">НАЗАД</button>
        </div>
    </div>

    <div id="modal-top" class="modal">
        <div class="modal-box">
            <h2 style="margin:0;">🏆 ТОП ПИЛОТОВ</h2>
            <div id="top-list">Загрузка...</div>
            <button onclick="closeModal('modal-top')" class="btn" style="width:100%; background:var(--gray); height: 50px;">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div id="modal-sets" class="modal">
        <div class="modal-box">
            <h2 style="margin:0 0 20px 0;">НАСТРОЙКИ</h2>
            <button id="toggle-mu" class="btn" style="width:100%; background:var(--blue); margin-bottom:15px; height: 50px;">МУЗЫКА: ВКЛ</button>
            <button onclick="location.reload()" class="btn" style="width:100%; background:var(--red); height: 50px; margin-bottom:15px;">ВЫЙТИ В МЕНЮ</button>
            <button onclick="closeModal('modal-sets')" class="btn" style="width:100%; background:var(--gray); height: 50px;">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div id="modal-case" class="modal"> <div class="modal-box"> <h2 id="case-title">КЕЙС</h2> <div id="roll-wrap" style="width:100%; height:80px; overflow:hidden; position:relative; background:#000; border-radius:10px; margin:20px 0;"> <div id="hitbox" style="position:absolute; left:50%; width:2px; height:100%; background:red; z-index:10;"></div> <div id="roll-track" style="display:flex; position:absolute; transition:4s cubic-bezier(0.1,0,0.1,1);"></div> </div> <button id="btn-claim" class="btn" style="display:none; width:100%; background:var(--blue)">ЗАБРАТЬ</button> </div> </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAhFyYz8tC0VZqNKQweM1VH7A9rzcLQ7L4", authDomain: "rockettap-22e98.firebaseapp.com", databaseURL: "https://rockettap-22e98-default-rtdb.firebaseio.com", projectId: "rockettap-22e98", storageBucket: "rockettap-22e98.firebasestorage.app", messagingSenderId: "800263373343", appId: "1:800263373343:web:ed6db2e822f61d8257cb2a" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const tg = window.Telegram.WebApp;
        tg.expand();

        let score = Number(localStorage.getItem('rk_sc')) || 0;
        let pwr = Number(localStorage.getItem('rk_pw')) || 1;
        let cost = Number(localStorage.getItem('rk_ct')) || 50;
        let lastGift = localStorage.getItem('rk_gift') || "";
        let lastWheel = Number(localStorage.getItem('rk_lw')) || 0;
        let musicOn = true;
        let audioStarted = false;
        const uid = tg.initDataUnsafe?.user?.id || "player_local";

        function startGame() { document.getElementById('main-menu').style.opacity = '0'; setTimeout(() => { document.getElementById('main-menu').style.display = 'none'; document.getElementById('game-ui').style.display = 'flex'; }, 300); updateUI(); }

        function save() {
            localStorage.setItem('rk_sc', score); localStorage.setItem('rk_pw', pwr); localStorage.setItem('rk_ct', cost);
            db.ref('leaderboard/' + uid).update({ name: tg.initDataUnsafe?.user?.first_name || "Пилот", score: Math.floor(score) });
            updateUI();
        }

        function updateUI() {
            document.getElementById('score').innerText = Math.floor(score).toLocaleString('ru-RU');
            document.getElementById('val-pwr').innerText = "+" + pwr;
            document.getElementById('cost-upd').innerText = cost;
            const today = new Date().toDateString();
            document.getElementById('btn-gift').innerText = (lastGift === today) ? "ВЗЯТО ✅" : "🎁 ПОДАРОК";
        }

        // РЕЙТИНГ (ИСПРАВЛЕННЫЙ)
        function loadTop() {
            const list = document.getElementById('top-list');
            list.innerHTML = "Загрузка...";
            db.ref('leaderboard').orderByChild('score').limitToLast(10).once('value').then(snap => {
                let players = [];
                snap.forEach(c => { players.push(c.val()); });
                players.sort((a, b) => b.score - a.score); // Сортировка от большего к меньшему
                list.innerHTML = "";
                players.forEach((p, i) => {
                    list.innerHTML += `<div class="row"><span>${i+1}. ${p.name}</span><b>${p.score.toLocaleString()}</b></div>`;
                });
            });
        }

        // КОЛЕСО ФОРТУНЫ
        const canvas = document.getElementById('wheel-canvas');
        const ctx = canvas.getContext('2d');
        const sectors = [
            {v: 1000, c: "#ff9f0a"}, {v: 0, c: "#2c2c2e"}, 
            {v: 5000, c: "#bf5af2"}, {v: 100, c: "#0a84ff"},
            {v: 2500, c: "#32d74b"}, {v: 250, c: "#ff453a"}
        ];
        const arc = (Math.PI * 2) / sectors.length;

        function drawWheel() {
            sectors.forEach((s, i) => {
                ctx.beginPath(); ctx.fillStyle = s.c; ctx.moveTo(140, 140);
                ctx.arc(140, 140, 140, i * arc, (i + 1) * arc); ctx.fill();
                ctx.save(); ctx.translate(140, 140); ctx.rotate(i * arc + arc/2);
                ctx.fillStyle = "white"; ctx.font = "bold 18px Arial"; ctx.fillText(s.v, 70, 10); ctx.restore();
            });
        }
        drawWheel();

        function spinWheel() {
            const now = Date.now();
            if(now - lastWheel < 3600000) { tg.showAlert("Колесо доступно раз в час!"); return; }
            const deg = 3000 + Math.random() * 5000;
            canvas.style.transform = `rotate(${deg}deg)`;
            document.getElementById('spin-btn').disabled = true;

            setTimeout(() => {
                const actualDeg = deg % 360;
                const idx = sectors.length - 1 - Math.floor(actualDeg / (360 / sectors.length));
                const win = sectors[idx].v;
                score += win; lastWheel = now;
                localStorage.setItem('rk_lw', lastWheel);
                tg.showAlert(win > 0 ? `Вы выиграли ${win}!` : "Повезет в следующий раз!");
                save(); document.getElementById('spin-btn').disabled = false;
            }, 4000);
        }

        // ТАПЫ
        function handleTap(x, y) {
            score += pwr;
            const p = document.createElement('div'); p.className = 'pop'; p.innerText = `+${pwr}`;
            p.style.left = (x - 20) + 'px'; p.style.top = (y - 20) + 'px';
            document.body.appendChild(p); setTimeout(() => p.remove(), 700);
            tg.HapticFeedback.impactOccurred('light'); save();
        }
        document.getElementById('rocket').addEventListener('touchstart', (e) => { e.preventDefault(); handleTap(e.touches[0].clientX, e.touches[0].clientY); });

        // ФУНКЦИИ ФУТЕРА
        document.getElementById('btn-upd').onclick = () => { if(score >= cost) { score -= cost; pwr++; cost = Math.round(cost * 1.6); save(); } };
        document.getElementById('btn-top').onclick = () => { openModal('modal-top'); loadTop(); };
        document.getElementById('btn-gift').onclick = () => {
            const today = new Date().toDateString(); if(lastGift !== today) { score += 2500; lastGift = today; save(); tg.showAlert("Бонус +2500 получен!"); }
        };
        document.getElementById('btn-friends').onclick = () => {
            tg.openTelegramLink(`https://t.me/share/url?url=https://t.me/YOUR_BOT&text=Лети со мной!`);
        };

        // НАСТРОЙКИ
        document.getElementById('toggle-mu').onclick = function() {
            musicOn = !musicOn; const audio = document.getElementById('bg-music');
            if(musicOn) audio.play(); else audio.pause();
            this.innerText = `МУЗЫКА: ${musicOn ? 'ВКЛ' : 'ВЫКЛ'}`;
        };

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function startAudio() { if(!audioStarted) { document.getElementById('bg-music').play().then(()=>audioStarted=true); } }
        
        updateUI();
    </script>
</body>
</html>
