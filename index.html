<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mega Clicker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --main-color: #ff9f00; /* Золотой/Оранжевый */
            --text-color: #ffffff;
            --coin-shadow: rgba(255, 159, 0, 0.4);
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'SEGoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none; /* Запрещаем выделение текста */
        }
        #score {
            font-size: 3.5rem;
            margin-bottom: 25px;
            font-weight: 800;
            text-shadow: 0 0 30px var(--main-color);
        }
        .coin-container {
            position: relative;
            cursor: pointer;
            transition: transform 0.05s ease-out;
        }
        .coin-container:active {
            transform: scale(0.92); /* Эффект нажатия */
        }
        #coin {
            width: 240px;
            height: 240px;
            background: linear-gradient(145deg, #ffb300, #ff8c00);
            border-radius: 50%;
            box-shadow: 0 0 60px var(--coin-shadow);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 110px;
            border: 10px solid rgba(255, 255, 255, 0.15);
            animation: pulse 3s infinite; /* Легкая пульсация */
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 60px var(--coin-shadow); }
            50% { box-shadow: 0 0 80px rgba(255, 159, 0, 0.6); }
            100% { box-shadow: 0 0 60px var(--coin-shadow); }
        }
        .tap-effect {
            position: absolute;
            color: var(--text-color);
            font-weight: bold;
            font-size: 32px;
            pointer-events: none;
            animation: moveUp 0.9s ease-out forwards;
            text-shadow: 0 0 10px var(--main-color);
        }
        @keyframes moveUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-120px) scale(1.3); }
        }
    </style>
</head>
<body>

    <div id="score">0</div>
    
    <div class="coin-container" id="coin-btn">
        <div id="coin">💰</div> </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); // Сообщаем ТГ, что Mini App готово
        tg.expand(); // Разворачиваем игру на весь экран

        // 1. Загружаем очки из локального хранилища браузера
        let score = parseInt(localStorage.getItem('user_score')) || 0;
        const scoreElement = document.getElementById('score');
        const coinBtn = document.getElementById('coin-btn');

        scoreElement.innerText = score;

        coinBtn.addEventListener('click', (e) => {
            // 2. Увеличиваем счет
            score++;
            scoreElement.innerText = score;
            
            // 3. Сохраняем прогресс локально
            localStorage.setItem('user_score', score);

            // 4. Добавляем физический отклик (Haptic Feedback)
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }

            // 5. Создаем визуальный эффект "+1" в месте клика
            createTapEffect(e.clientX, e.clientY);
        });

        // Функция для создания красивого эффекта всплывающих цифр
        function createTapEffect(x, y) {
            const effect = document.createElement('div');
            effect.className = 'tap-effect';
            effect.innerText = '+1';
            effect.style.left = x + 'px';
            effect.style.top = y + 'px';
            document.body.appendChild(effect);
            // Удаляем элемент через 0.9 сек, когда анимация закончится
            setTimeout(() => effect.remove(), 900);
        }
    </script>
</body>
</html>
