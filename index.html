<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --bg: #000; --orange: #ff9f00; --blue: #007aff; --purple: #8e44ad; --gray: #2c2c2e; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        #header { padding-top: env(safe-area-inset-top); height: 100px; text-align: center; display: flex; flex-direction: column; justify-content: center; }
        #score { font-size: 48px; font-weight: 900; color: var(--orange); font-variant-numeric: tabular-nums; }
        #streak-info { font-size: 12px; color: #888; margin-top: 4px; }

        #game { flex-grow: 1; position: relative; display: flex; align-items: center; justify-content: center; touch-action: manipulation; }
        #coin { width: 200px; height: 200px; background: radial-gradient(circle, #ffb300, #ff8c00); border-radius: 50%; border: 5px solid #fff; font-size: 80px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 30px rgba(255,159,0,0.3); z-index: 10; transition: transform 0.05s; }
        #coin:active { transform: scale(0.95); }

        .pop-num { position: absolute; font-size: 26px; font-weight: 900; color: #fff; pointer-events: none; z-index: 999; animation: floatUp 0.7s ease-out forwards; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-100px); opacity: 0; } }

        #menu { background: #1c1c1e; padding: 15px 15px calc(20px + env(safe-area-inset-bottom)); border-radius: 25px 25px 0 0; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { height: 50px; border: none; border-radius: 14px; font-weight: bold; color: white; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn:active { opacity: 0.7; }
        #upd-btn { background: var(--blue); }
        #daily-btn { background: #34c759; }
        #case-btn { background: var(--purple); grid-column: span 2; height: 60px; font-size: 16px; }

        /* РУЛЕТКА В СТИЛЕ CS */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        #roulette-container { width: 300px; height: 100px; border: 2px solid #444; position: relative; overflow: hidden; background: #111; margin: 20px 0; border-radius: 10px; }
        #roulette-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: red; z-index: 5; transform: translateX(-50%); }
        #roulette-track { display: flex; position: absolute; left: 0; top: 0; height: 100%; transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); }
        .item { min-width: 80px; height: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-right: 1px solid #222; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

    <div id="header">
        <div id="score">0</div>
        <div id="streak-info">Загрузка...</div>
    </div>

    <div id="game">
        <div id="coin">🚀</div>
    </div>

    <div id="menu">
        <button id="upd-btn" class="btn">Улучшить (+1)</button>
        <button id="daily-btn" class="btn">🎁 Подарок</button>
        <button id="case-btn" class="btn">📦 ОТКРЫТЬ КЕЙС (350)</button>
    </div>

    <div id="case-modal" class="modal">
        <h2 id="case-status">Открытие кейса...</h2>
        <div id="roulette-container">
            <div id="roulette-line"></div>
            <div id="roulette-track"></div>
        </div>
        <button id="close-case" class="btn" style="background:#444; width:150px; display:none;">Закрыть</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAhFyYz8tC0VZqNKQweM1VH7A9rzcLQ7L4",
            authDomain: "rockettap-22e98.firebaseapp.com",
            databaseURL: "https://rockettap-22e98-default-rtdb.firebaseio.com",
            projectId: "rockettap-22e98",
            storageBucket: "rockettap-22e98.firebasestorage.app",
            messagingSenderId: "800263373343",
            appId: "1:800263373343:web:ed6db2e822f61d8257cb2a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const tg = window.Telegram.WebApp;
        tg.expand();

        const userId = tg.initDataUnsafe?.user?.id || "guest";
        let score = Number(localStorage.getItem('sc_v20')) || 0;
        let pwr = Number(localStorage.getItem('pw_v20')) || 1;
        let cost = Number(localStorage.getItem('ct_v20')) || 50;
        let streak = Number(localStorage.getItem('str_v20')) || 0;
        let lastDate = localStorage.getItem('ld_v20') || "";

        function refresh() {
            document.getElementById('score').innerText = Math.floor(score).toLocaleString();
            document.getElementById('upd-btn').innerText = `Up (+1) • ${cost}`;
            document.getElementById('streak-info').innerText = `Серия заходов: ${streak} дн.`;
            localStorage.setItem('sc_v20', score);
            localStorage.setItem('pw_v20', pwr);
            localStorage.setItem('ct_v20', cost);
            localStorage.setItem('str_v20', streak);
            localStorage.setItem('ld_v20', lastDate);
            db.ref('users/' + userId).set({ name: tg.initDataUnsafe?.user?.first_name || "Пилот", score: Math.floor(score) });
        }

        // Клик
        document.getElementById('game').onclick = (e) => {
            score += pwr;
            const pop = document.createElement('div');
            pop.className = 'pop-num';
            pop.innerText = `+${pwr}`;
            pop.style.left = e.clientX + 'px';
            pop.style.top = e.clientY + 'px';
            document.body.appendChild(pop);
            setTimeout(() => pop.remove(), 700);
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            refresh();
        };

        // Апгрейд
        document.getElementById('upd-btn').onclick = (e) => {
            e.stopPropagation();
            if(score >= cost) {
                score -= cost; pwr++; cost = Math.round(cost * 1.6); refresh();
            }
        };

        // ЕЖЕДНЕВНЫЙ ПОДАРОК
        document.getElementById('daily-btn').onclick = (e) => {
            e.stopPropagation();
            const today = new Date().toLocaleDateString();
            if (lastDate === today) {
                tg.showAlert("Ты уже забирал подарок сегодня!");
                return;
            }
            
            // Логика стрика
            const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
            if (lastDate === yesterday.toLocaleDateString()) {
                streak++;
            } else {
                streak = 1;
            }

            const reward = streak * 250; // С каждым днем на 250 больше
            score += reward;
            lastDate = today;
            refresh();
            tg.showPopup({ title: '🎁 Подарок!', message: `Твой бонус за ${streak}-й день: ${reward} тапов!`, buttons: [{type: 'ok'}] });
        };

        // РУЛЕТКА КЕЙСОВ
        const items = [
            {v: 50, c: '#888', p: 50},  {v: 100, c: '#888', p: 30},
            {v: 250, c: '#007aff', p: 15}, {v: 1000, c: '#8e44ad', p: 4},
            {v: 5000, c: '#ff9f00', p: 1} // Самый редкий
        ];

        document.getElementById('case-btn').onclick = (e) => {
            e.stopPropagation();
            if(score < 350) { tg.showAlert("Нужно 350 тапов!"); return; }
            score -= 350;
            refresh();

            const track = document.getElementById('roulette-track');
            const modal = document.getElementById('case-modal');
            const closeBtn = document.getElementById('close-case');
            const status = document.getElementById('case-status');
            
            modal.style.display = 'flex';
            closeBtn.style.display = 'none';
            status.innerText = "Крутим...";
            track.style.transition = 'none';
            track.style.transform = 'translateX(0)';

            // Генерируем ленту (30 элементов)
            track.innerHTML = '';
            let pool = [];
            for(let i=0; i<40; i++) {
                const rand = Math.random() * 100;
                let accum = 0;
                let selected = items[0];
                for(let it of items) {
                    accum += it.p;
                    if(rand <= accum) { selected = it; break; }
                }
                pool.push(selected);
                track.innerHTML += `<div class="item" style="background:${selected.c}">${selected.v}</div>`;
            }

            // Запуск анимации
            setTimeout(() => {
                track.style.transition = 'transform 4s cubic-bezier(0.1, 0, 0.1, 1)';
                const stopPos = (35 * 80) - 150 + Math.random()*50;
                track.style.transform = `translateX(-${stopPos}px)`;
            }, 50);

            setTimeout(() => {
                const finalItem = pool[35];
                score += finalItem.v;
                status.innerText = `Выпало: ${finalItem.v}!`;
                closeBtn.style.display = 'block';
                refresh();
            }, 4100);
        };

        document.getElementById('close-case').onclick = () => {
            document.getElementById('case-modal').style.display = 'none';
        };

        refresh();
    </script>
</body>
</html>
