<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --bg: #0b0b0d; --orange: #ff9f0a; --blue: #0a84ff; --purple: #bf5af2; --gray: #2c2c2e; --red: #ff453a; --glass: rgba(255, 255, 255, 0.08); --holy: #ffcf40; }
        body { background: var(--bg); color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; -webkit-user-select: none; }

        /* ГЛАВНОЕ МЕНЮ */
        #main-menu { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .menu-btn { width: 280px; height: 65px; margin: 12px; border-radius: 20px; border: 1px solid var(--orange); background: rgba(255,159,10,0.1); color: var(--orange); font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-play { background: var(--orange); color: black; font-size: 22px; border: none; }
        .menu-btn:disabled { opacity: 0.4; border-color: #444; color: #888; }

        #header { padding-top: env(safe-area-inset-top); height: 120px; text-align: center; display: flex; flex-direction: column; justify-content: center; background: linear-gradient(to bottom, rgba(255,159,10,0.1), transparent); }
        #score { font-size: 54px; font-weight: 900; color: var(--orange); text-shadow: 0 0 30px rgba(255,159,10,0.4); letter-spacing: -1px; }
        #stats { font-size: 14px; color: #8e8e93; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; }

        #game-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; flex-direction: column; }
        #rocket { width: 190px; height: 190px; background: radial-gradient(circle at 30% 30%, #ffcc00, #ff9f0a); border-radius: 50%; border: 8px solid rgba(255,255,255,0.2); font-size: 85px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 60px rgba(255,159,10,0.3), inset 0 0 20px rgba(0,0,0,0.2); transition: transform 0.1s; touch-action: manipulation; }
        #rocket:active { transform: scale(0.9); }

        .pop { position: absolute; font-size: 38px; font-weight: 900; color: white; pointer-events: none; animation: fly 0.7s ease-out forwards; z-index: 20; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        @keyframes fly { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-180px) scale(1.3); opacity: 0; } }

        /* КОЛЕСО */
        #wheel-container { position: relative; width: 280px; height: 280px; margin: 20px auto; border: 8px solid #333; border-radius: 50%; overflow: hidden; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); background: #222; box-shadow: 0 0 40px rgba(0,0,0,0.5); }
        #wheel-pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid var(--red); z-index: 100; filter: drop-shadow(0 0 5px rgba(255,0,0,0.5)); }
        .sector { position: absolute; width: 50%; height: 50%; transform-origin: 100% 100%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; color: white; }

        #footer { background: rgba(28, 28, 30, 0.8); backdrop-filter: blur(20px); padding: 20px 15px calc(25px + env(safe-area-inset-bottom)); border-radius: 35px 35px 0 0; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; border-top: 1px solid rgba(255,255,255,0.1); }
        .btn { height: 56px; border: none; border-radius: 18px; font-weight: 700; font-size: 14px; color: white; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn span { font-size: 10px; opacity: 0.7; margin-top: 2px; }

        #btn-upd { background: var(--glass); border: 1px solid var(--blue); color: var(--blue); }
        #btn-case { background: var(--glass); border: 1px solid var(--purple); color: var(--purple); }
        #btn-friends { background: var(--glass); border: 1px solid var(--orange); color: var(--orange); }
        #btn-top { background: var(--glass); border: 1px solid #fff; color: #fff; }
        #btn-gift { background: #1c1c1e; border: 1px solid #333; color: var(--orange); }
        #btn-sets { background: #1c1c1e; border: 1px solid #333; font-size: 20px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { width: 100%; max-width: 360px; background: #1c1c1e; border-radius: 30px; padding: 30px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        
        #roll-wrap { width: 100%; height: 100px; border: 1px solid #333; margin: 25px 0; overflow: hidden; position: relative; background: #000; border-radius: 15px; }
        #roll-track { display: flex; position: absolute; left: 0; height: 100%; transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); }
        .item { min-width: 100px; width: 100px; height: 100%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 26px; border-right: 1px solid #111; }
        #hitbox { position: absolute; left: 50%; top: 0; bottom: 0; width: 3px; background: var(--red); transform: translateX(-50%); z-index: 50; }
    </style>
</head>
<body>

    <div id="main-menu">
        <h1 style="color:var(--orange); font-size: 42px; margin-bottom: 30px;">HOLY TAP</h1>
        <button class="menu-btn btn-play" onclick="closeMenu()">ИГРАТЬ</button>
        <button id="menu-bless" class="menu-btn" onclick="applyBlessing()">БЛАГОСЛОВЕНИЕ (+5000)</button>
        <button class="menu-btn" onclick="openModal('modal-wheel')">КОЛЕСО ФОРТУНЫ</button>
    </div>

    <div id="header">
        <div id="score">0</div>
        <div id="stats">Прибыль за тап: <b id="val-pwr">+1</b></div>
    </div>

    <div id="game-area">
        <button onclick="openMenu()" style="background:none; border:1px solid #444; color:#666; padding:8px 15px; border-radius:10px; margin-bottom:20px; font-size:12px;">МЕНЮ</button>
        <div id="rocket">🚀</div>
    </div>

    <div id="footer">
        <button id="btn-upd" class="btn">⚡ УЛУЧШИТЬ<span id="cost-upd">50</span></button>
        <button id="btn-case" class="btn">💎 КЕЙС<span>900</span></button>
        <button id="btn-friends" class="btn">👥 ДРУЗЬЯ</button>
        <button id="btn-top" class="btn">🏆 РЕЙТИНГ</button>
        <button id="btn-gift" class="btn">🎁 ПОДАРОК</button>
        <button id="btn-sets" class="btn">⚙️</button>
    </div>

    <div id="modal-wheel" class="modal">
        <div class="modal-box" style="position:relative;">
            <div id="wheel-pointer"></div>
            <div id="wheel-container"></div>
            <h2 id="wheel-res" style="color:var(--orange)">УДАЧИ!</h2>
            <button id="spin-btn" class="menu-btn" style="width:100%; margin:10px 0;" onclick="spinWheel()">КРУТИТЬ (1000)</button>
            <button onclick="closeModal('modal-wheel')" class="btn" style="width:100%; background:var(--gray); height:50px;">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div id="modal-case" class="modal"><div class="modal-box"><h2 id="case-title" style="color:var(--purple); margin:0;">УДАЧИ, ПИЛОТ!</h2><div id="roll-wrap"><div id="hitbox"></div><div id="roll-track"></div></div><button id="btn-claim" class="btn" style="display:none; width:100%; background:var(--blue); height: 50px;">ЗАБРАТЬ ВЫИГРЫШ</button></div></div>
    <div id="modal-top" class="modal"><div class="modal-box"><h2 style="margin:0;">🏆 Топ Пилотов</h2><div id="top-list" style="margin:20px 0; max-height:280px; overflow-y:auto;"></div><button onclick="closeModal('modal-top')" class="btn" style="width:100%; background:var(--gray); height: 50px;">ЗАКРЫТЬ</button></div></div>
    <div id="modal-friends" class="modal"><div class="modal-box"><h1>👥</h1><h2>Пригласи друзей</h2><p>Приглашай друзей и получи <b style="color:var(--orange);">5000</b>!</p><button id="btn-invite-act" class="btn" style="width:100%; background:var(--orange); height: 50px;">ОТПРАВИТЬ ССЫЛКУ</button><button onclick="closeModal('modal-friends')" class="btn" style="width:100%; background:transparent; margin-top:10px; height: 40px;">ПОЗЖЕ</button></div></div>
    <div id="modal-sets" class="modal"><div class="modal-box"><h2>Настройки</h2><button onclick="location.reload()" class="btn" style="width:100%; background:var(--blue); margin-bottom:15px; height: 50px;">ПЕРЕЗАГРУЗИТЬ</button><button onclick="closeModal('modal-sets')" class="btn" style="width:100%; background:var(--gray); height: 50px;">ЗАКРЫТЬ</button></div></div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAhFyYz8tC0VZqNKQweM1VH7A9rzcLQ7L4", authDomain: "rockettap-22e98.firebaseapp.com", databaseURL: "https://rockettap-22e98-default-rtdb.firebaseio.com", projectId: "rockettap-22e98", storageBucket: "rockettap-22e98.firebasestorage.app", messagingSenderId: "800263373343", appId: "1:800263373343:web:ed6db2e822f61d8257cb2a" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const tg = window.Telegram.WebApp;

        let score = Number(localStorage.getItem('rk_sc')) || 0;
        let pwr = Number(localStorage.getItem('rk_pw')) || 1;
        let cost = Number(localStorage.getItem('rk_ct')) || 50;
        let blessTaken = localStorage.getItem('rk_bless') === 'true';
        let lastGift = localStorage.getItem('rk_gift') || "";
        const uid = tg.initDataUnsafe?.user?.id || "local_user";

        // Генерация колеса
        const prizes = [100, 500, 50, 2000, 100, 1000, 50, 5000];
        const wheel = document.getElementById('wheel-container');
        prizes.forEach((p, i) => {
            const s = document.createElement('div');
            s.className = 'sector';
            s.style.transform = `rotate(${i * 45}deg) skewY(-45deg)`;
            s.style.background = i % 2 === 0 ? '#2c2c2e' : '#3a3a3c';
            s.innerHTML = `<span style="transform: skewY(45deg) rotate(22.5deg); margin: 20px 0 0 20px;">${p}</span>`;
            wheel.appendChild(s);
        });

        function save() {
            localStorage.setItem('rk_sc', score); localStorage.setItem('rk_pw', pwr);
            localStorage.setItem('rk_ct', cost); localStorage.setItem('rk_bless', blessTaken);
            localStorage.setItem('rk_gift', lastGift);
            db.ref('leaderboard/' + uid).update({ name: tg.initDataUnsafe?.user?.first_name || "Пилот", score: Math.floor(score) });
            updateUI();
        }

        function updateUI() {
            document.getElementById('score').innerText = Math.floor(score).toLocaleString('ru-RU');
            document.getElementById('val-pwr').innerText = "+" + pwr;
            document.getElementById('cost-upd').innerText = cost;
            document.getElementById('btn-upd').disabled = score < cost;
            
            const blessBtn = document.getElementById('menu-bless');
            if(blessTaken) { blessBtn.disabled = true; blessBtn.innerText = "ВЗЯТО ✅"; }
            
            const today = new Date().toDateString();
            document.getElementById('btn-gift').disabled = (lastGift === today);
        }

        function tap(e) {
            let x = e.touches ? e.touches[0].clientX : e.clientX;
            let y = e.touches ? e.touches[0].clientY : e.clientY;
            score += pwr;
            const p = document.createElement('div');
            p.className = 'pop'; p.innerText = `+${pwr}`;
            p.style.left = (x - 20) + 'px'; p.style.top = (y - 50) + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 700);
            tg.HapticFeedback.impactOccurred('light');
            save();
        }
        document.getElementById('rocket').addEventListener('touchstart', (e) => { e.preventDefault(); tap(e); });

        document.getElementById('btn-upd').onclick = () => { if(score >= cost) { score -= cost; pwr++; cost = Math.round(cost * 1.6); save(); } };

        function applyBlessing() {
            if(!blessTaken) {
                score += 5000; blessTaken = true; save();
                tg.showAlert("Благословение получено! +5000");
                closeMenu();
            }
        }

        let isSpinning = false;
        function spinWheel() {
            if(isSpinning || score < 1000) return;
            score -= 1000; isSpinning = true;
            document.getElementById('spin-btn').disabled = true;
            const deg = Math.floor(3000 + Math.random() * 3000);
            wheel.style.transform = `rotate(${deg}deg)`;
            setTimeout(() => {
                isSpinning = false;
                const win = prizes[Math.floor(((360 - (deg % 360) + 22.5) % 360) / 45)];
                score += win; document.getElementById('wheel-res').innerText = `ВЫИГРЫШ: ${win}!`;
                document.getElementById('spin-btn').disabled = false;
                save();
            }, 4000);
        }

        // ТВОИ ФУНКЦИИ КЕЙСА, ТОПА И Т.Д.
        document.getElementById('btn-case').onclick = () => { /* Твой оригинальный код кейса */ };
        document.getElementById('btn-gift').onclick = () => { const today = new Date().toDateString(); if(lastGift !== today) { score += 2500; lastGift = today; save(); tg.showAlert("Бонус +2500 получен!"); } };
        document.getElementById('btn-invite-act').onclick = () => { tg.openTelegramLink(`https://t.me/share/url?url=https://t.me/bot?start=${uid}&text=Приглашаю в игру!`); };
        
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function openMenu() { document.getElementById('main-menu').style.display = 'flex'; }
        function closeMenu() { document.getElementById('main-menu').style.display = 'none'; }

        updateUI();
    </script>
</body>
</html>
