<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Rocket Tap Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --main-color: #ff9f00;
            --accent-color: #3498db;
            --card-bg: #1a1a1a;
        }
        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            overflow: hidden;
        }
        /* Шапка с именем */
        #user-info {
            margin-top: 15px;
            font-size: 14px;
            color: #888;
        }
        #score { font-size: 3rem; font-weight: bold; color: var(--main-color); margin: 5px 0; }
        
        /* Уменьшенная монета */
        #coin-section { flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        #coin {
            width: 170px; height: 170px; /* Уменьшено с 220px */
            background: linear-gradient(145deg, #ffb300, #ff8c00);
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 70px;
            box-shadow: 0 0 40px rgba(255, 165, 0, 0.3);
            cursor: pointer; transition: transform 0.1s;
            border: 6px solid rgba(255, 255, 255, 0.1);
        }
        #coin:active { transform: scale(0.92); }

        /* Кнопки управления */
        #controls {
            width: 100%;
            padding: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            background: var(--card-bg);
            border-radius: 20px 20px 0 0;
        }
        .btn {
            padding: 12px; border: none; border-radius: 12px;
            font-weight: bold; font-size: 14px; cursor: pointer;
        }
        #upgrade-btn { background: var(--accent-color); color: white; }
        #leaderboard-btn { background: #444; color: white; }
        .btn:disabled { opacity: 0.4; }

        /* Окно лидерборда */
        #overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            z-index: 100; flex-direction: column; align-items: center; padding: 20px;
            box-sizing: border-box;
        }
        #leaderboard-card {
            background: var(--card-bg); width: 100%; max-width: 350px;
            border-radius: 20px; padding: 20px; box-sizing: border-box;
        }
        .leader-item {
            display: flex; justify-content: space-between;
            padding: 10px 0; border-bottom: 1px solid #333;
        }
        .leader-item.me { color: var(--main-color); font-weight: bold; }
        #close-btn { margin-top: 20px; background: #ff4444; color: white; border: none; padding: 10px 20px; border-radius: 10px; }

        .tap-effect { position: absolute; color: white; font-weight: bold; pointer-events: none; animation: moveUp 0.8s forwards; }
        @keyframes moveUp { to { opacity: 0; transform: translateY(-80px); } }
    </style>
</head>
<body>

    <div id="user-info">Пилот: <span id="username">Player</span></div>
    <div id="score">0</div>
    
    <div id="coin-section">
        <div id="coin">🚀</div>
    </div>

    <div id="controls">
        <button id="upgrade-btn" class="btn">Улучшить (50)</button>
        <button id="leaderboard-btn" class="btn">🏆 Лидеры</button>
    </div>

    <div id="overlay">
        <h2>Топ-10 Пилотов</h2>
        <div id="leaderboard-card">
            </div>
        <button id="close-btn">Закрыть</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Данные пользователя из Telegram
        const user = tg.initDataUnsafe?.user;
        const username = user ? (user.username || user.first_name) : "Аноним";
        document.getElementById('username').innerText = username;

        let score = Number(localStorage.getItem('score')) || 0;
        let pwr = Number(localStorage.getItem('pwr')) || 1;
        let cost = Number(localStorage.getItem('cost')) || 50;

        function update() {
            document.getElementById('score').innerText = Math.floor(score);
            document.getElementById('upgrade-btn').innerText = `Прокачка (+1) - ${cost}`;
            document.getElementById('upgrade-btn').disabled = score < cost;
            localStorage.setItem('score', score);
            localStorage.setItem('pwr', pwr);
            localStorage.setItem('cost', cost);
        }

        document.getElementById('coin').onclick = (e) => {
            score += pwr;
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            const effect = document.createElement('div');
            effect.className = 'tap-effect';
            effect.innerText = '+' + pwr;
            effect.style.left = e.clientX + 'px';
            effect.style.top = e.clientY + 'px';
            document.body.appendChild(effect);
            setTimeout(() => effect.remove(), 800);
            update();
        };

        document.getElementById('upgrade-btn').onclick = () => {
            if (score >= cost) {
                score -= cost;
                pwr += 1;
                cost = Math.floor(cost * 1.7);
                update();
            }
        };

        // Лидерборд
        const leaders = [
            {n: "CryptoKing", s: 150000},
            {n: "MarsOne", s: 120000},
            {n: "ElonFan", s: 95000},
            {n: "StarWalker", s: 80000},
            {n: "Tapper_pro", s: 50000},
            {n: "SkyHigh", s: 30000},
            {n: "MoonGuy", s: 15000},
            {n: "ZeroG", s: 5000},
            {n: "Rocket_bot", s: 1000}
        ];

        document.getElementById('leaderboard-btn').onclick = () => {
            const card = document.getElementById('leaderboard-card');
            card.innerHTML = "";
            
            // Добавляем текущего игрока в список и сортируем
            let currentList = [...leaders, {n: username, s: score, me: true}];
            currentList.sort((a, b) => b.s - a.s);
            
            currentList.slice(0, 10).forEach((item, index) => {
                const div = document.createElement('div');
                div.className = `leader-item ${item.me ? 'me' : ''}`;
                div.innerHTML = `<span>${index + 1}. ${item.n}</span> <span>${item.s.toLocaleString()}</span>`;
                card.appendChild(div);
            });
            
            document.getElementById('overlay').style.display = 'flex';
        };

        document.getElementById('close-btn').onclick = () => {
            document.getElementById('overlay').style.display = 'none';
        };

        update();
    </script>
</body>
</html>
