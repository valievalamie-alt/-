<style>
    /* ... (предыдущие стили оставил без изменений, обновил только анимацию нимба) ... */
    
    /* Улучшенная анимация нимба */
    #halo { 
        width: 190px; height: 190px; 
        background: radial-gradient(circle, #fff, var(--holy)); 
        border-radius: 50%; font-size: 90px; 
        display: flex; align-items: center; justify-content: center; 
        box-shadow: 0 0 60px rgba(255,207,64,0.5); 
        transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        touch-action: manipulation; cursor: pointer; 
        border: 5px solid rgba(255,255,255,0.3);
        animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
        0%, 100% { transform: translateY(0) scale(1); }
        50% { transform: translateY(-10px) scale(1.02); }
    }
    /* Эффект нажатия */
    #halo:active { transform: scale(0.85) rotate(3deg); }

    /* Всплывающие цифры */
    @keyframes fly { 
        0% { transform: translateY(0) scale(0.5); opacity: 0; } 
        20% { opacity: 1; transform: translateY(-20px) scale(1.2); }
        100% { transform: translateY(-120px) scale(1.5); opacity: 0; } 
    }
</style>

<script>
    /* ... (конфиг firebase и переменные оставляем) ... */

    // Флаги для защиты от спама
    let isCaseSpinning = false;
    let isWheelSpinning = false;

    // ОБНОВЛЕННАЯ ФУНКЦИЯ КЕЙСА
    function startCase() {
        const caseBtn = document.getElementById('case-go');
        
        if (isCaseSpinning || score < 900) return;

        isCaseSpinning = true;
        caseBtn.disabled = true;
        caseBtn.innerText = "ОТКРЫВАЕМ...";

        score -= 900; 
        save();

        const track = document.getElementById('roll-track');
        track.style.transition = 'none'; 
        track.style.transform = 'translateX(0)'; 
        track.innerHTML = '';

        const win = [50, 100, 500, 1000, 5000][Math.floor(Math.random()*5)];
        
        for(let i=0; i<45; i++) {
            let v = (i === 40) ? win : [10, 50, 100][Math.floor(Math.random()*3)];
            track.innerHTML += `<div class="item">${v}</div>`;
        }

        setTimeout(() => {
            track.style.transition = 'transform 4s cubic-bezier(0.1, 0, 0.1, 1)';
            track.style.transform = `translateX(-${4000 - 150}px)`;
            
            setTimeout(() => { 
                score += win; 
                save(); 
                tg.showAlert(`💎 Выпало: ${win}!`); 
                
                // Снимаем блокировку
                isCaseSpinning = false;
                caseBtn.disabled = false;
                caseBtn.innerText = "ОТКРЫТЬ";
            }, 4100);
        }, 50);
    }

    // ОБНОВЛЕННАЯ ФУНКЦИЯ КОЛЕСА
    function spinWheel() {
        const spinBtn = document.getElementById('spin-btn');
        
        if (isWheelSpinning || score < 1000) return;
        
        isWheelSpinning = true;
        spinBtn.disabled = true;
        spinBtn.innerText = "КРУТИМ...";

        score -= 1000; 
        save();

        const deg = 3000 + Math.random() * 3000;
        wheel.style.transform = `rotate(${deg}deg)`;

        setTimeout(() => {
            isWheelSpinning = false;
            spinBtn.disabled = false;
            spinBtn.innerText = "КРУТИТЬ (1000)";
            
            const win = prizes[Math.floor(((360 - (deg % 360) + 22.5) % 360) / 45)];
            score += win; 
            save();
            document.getElementById('wheel-res').innerText = `ВЫИГРАНО: ${win}!`;
        }, 4000);
    }

    // Улучшенный TAP с анимацией счета
    function tap(e) {
        let add = isBonus ? pwr * 2 : pwr;
        score += add;
        
        // Визуальный прыжок самого текста счета
        const scoreDisplay = document.getElementById('score');
        scoreDisplay.style.transform = "scale(1.1)";
        setTimeout(() => scoreDisplay.style.transform = "scale(1)", 100);

        const x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
        const y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
        
        const p = document.createElement('div');
        p.className = 'pop'; 
        p.innerText = `+${add}`;
        if (isBonus) p.style.color = 'var(--blue)';
        p.style.left = (x - 20) + 'px'; 
        p.style.top = (y - 50) + 'px';
        
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 700);
        
        tg.HapticFeedback.impactOccurred('medium');
        save();
    }
    
    /* ... (остальные функции без изменений) ... */
</script>
