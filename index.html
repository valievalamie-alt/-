<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --bg: #000; --orange: #ff9f00; --blue: #007aff; --pulp: #8e44ad; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        #header { padding-top: env(safe-area-inset-top); height: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #score { font-size: 50px; font-weight: 900; color: var(--orange); margin: 0; font-variant-numeric: tabular-nums; }
        
        #game { flex-grow: 1; position: relative; display: flex; align-items: center; justify-content: center; touch-action: manipulation; }
        
        #coin { 
            width: 210px; height: 210px; 
            background: radial-gradient(circle, #ffb300, #ff8c00); 
            border-radius: 50%; border: 5px solid #fff; 
            font-size: 80px; display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 0 35px rgba(255,159,0,0.4); 
            transition: transform 0.05s; -webkit-tap-highlight-color: transparent; 
            z-index: 10;
        }
        #coin:active { transform: scale(0.95); }

        /* АНИМАЦИЯ ЧИСЕЛ (ФИКС) */
        .pop-num {
            position: absolute;
            font-size: 28px;
            font-weight: 900;
            color: #fff;
            pointer-events: none;
            z-index: 9999;
            animation: floatUp 0.8s ease-out forwards;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-120px); opacity: 0; }
        }

        #menu { background: #1c1c1e; padding: 15px 15px calc(20px + env(safe-area-inset-bottom)); border-radius: 25px 25px 0 0; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { height: 55px; border: none; border-radius: 16px; font-weight: bold; color: white; font-size: 14px; }
        #upd-btn { background: var(--blue); }
        #case-btn { background: var(--pulp); }
        #top-btn { background: #3a3a3c; grid-column: span 2; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; }
        #top-list { width: 90%; background: #1c1c1e; border-radius: 20px; max-height: 50vh; overflow-y: auto; margin: 15px 0; }
        .row { display: flex; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid #2c2c2e; font-size: 13px; }
    </style>
</head>
<body>

    <div id="header">
        <div id="score">0</div>
        <div id="nick">Загрузка...</div>
    </div>

    <div id="game">
        <div id="coin">🚀</div>
    </div>

    <div id="menu">
        <button id="upd-btn" class="btn">Up (+1) • 50</button>
        <button id="case-btn" class="btn">🎁 Case (200)</button>
        <button id="top-btn" class="btn">🏆 ЛИДЕРБОРД</button>
    </div>

    <div id="top-modal" class="modal">
        <h2>Топ Игроков</h2>
        <div id="top-list"></div>
        <button onclick="document.getElementById('top-modal').style.display='none'" class="btn" style="background:#444; width:120px;">Назад</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAhFyYz8tC0VZqNKQweM1VH7A9rzcLQ7L4",
            authDomain: "rockettap-22e98.firebaseapp.com",
            databaseURL: "https://rockettap-22e98-default-rtdb.firebaseio.com",
            projectId: "rockettap-22e98",
            storageBucket: "rockettap-22e98.firebasestorage.app",
            messagingSenderId: "800263373343",
            appId: "1:800263373343:web:ed6db2e822f61d8257cb2a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const userId = tg.initDataUnsafe?.user?.id || "g_" + Math.floor(Math.random()*1000);
        const userNick = tg.initDataUnsafe?.user?.first_name || "Пилот";
        document.getElementById('nick').innerText = "Пилот: " + userNick;

        let score = Number(localStorage.getItem('sc_v16')) || 0;
        let pwr = Number(localStorage.getItem('pw_v16')) || 1;
        let cost = Number(localStorage.getItem('ct_v16')) || 50;

        function refresh() {
            document.getElementById('score').innerText = Math.floor(score).toLocaleString();
            document.getElementById('upd-btn').innerText = `Up (+1) • ${cost}`;
            document.getElementById('upd-btn').style.opacity = score < cost ? "0.5" : "1";
            document.getElementById('case-btn').style.opacity = score < 200 ? "0.5" : "1";
            localStorage.setItem('sc_v16', score);
            localStorage.setItem('pw_v16', pwr);
            localStorage.setItem('ct_v16', cost);
            db.ref('users/' + userId).set({ name: userNick, score: Math.floor(score) });
        }

        // КЛИК С ЭФФЕКТОМ ЧИСЕЛ
        document.getElementById('game').onclick = (e) => {
            // Если кликнули именно по монете или области рядом
            if (e.target.id === 'coin' || e.target.id === 'game') {
                score += pwr;
                if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');

                // Создаем число в месте клика
                const pop = document.createElement('div');
                pop.className = 'pop-num';
                pop.innerText = `+${pwr}`;
                pop.style.left = e.clientX + 'px';
                pop.style.top = e.clientY + 'px';
                document.body.appendChild(pop);
                setTimeout(() => pop.remove(), 800);

                refresh();
            }
        };

        document.getElementById('upd-btn').onclick = (e) => {
            e.stopPropagation(); // Чтобы не засчитался клик по игре
            if(score >= cost) {
                score -= cost;
                pwr += 1;
                cost = Math.round(cost * 1.6);
                refresh();
            }
        };

        document.getElementById('case-btn').onclick = (e) => {
            e.stopPropagation();
            if(score >= 200) {
                score -= 200;
                const win = Math.floor(Math.random() * 800) + 200;
                score += win;
                tg.showPopup({ title: 'Кейс открыт!', message: `🎁 Тебе выпало: ${win} тапов!`, buttons: [{type: 'ok'}] });
                refresh();
            } else {
                tg.showAlert("Нужно 200 тапов!");
            }
        };

        document.getElementById('top-btn').onclick = (e) => {
            e.stopPropagation();
            const list = document.getElementById('top-list');
            list.innerHTML = "<div class='row'>...</div>";
            document.getElementById('top-modal').style.display = 'flex';
            db.ref('users').orderByChild('score').limitToLast(15).once('value', (snap) => {
                list.innerHTML = "";
                let players = [];
                snap.forEach(c => { players.push(c.val()); });
                players.reverse().forEach((p, i) => {
                    list.innerHTML += `<div class="row"><span>${i+1}. ${p.name}</span><b>${p.score.toLocaleString()}</b></div>`;
                });
            });
        };

        refresh();
    </script>
</body>
</html>
