<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --bg: #000; --orange: #ff9f00; --blue: #007aff; --purple: #8e44ad; --gray: #2c2c2e; --light-gray: #444; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        #header { padding-top: env(safe-area-inset-top); height: 100px; text-align: center; display: flex; flex-direction: column; justify-content: center; }
        #score { font-size: 50px; font-weight: 900; color: var(--orange); font-variant-numeric: tabular-nums; }
        #streak-info { font-size: 12px; color: #888; margin-top: 5px; }

        #game { flex-grow: 1; position: relative; display: flex; align-items: center; justify-content: center; touch-action: manipulation; }
        #coin { width: 210px; height: 210px; background: radial-gradient(circle, #ffb300, #ff8c00); border-radius: 50%; border: 5px solid #fff; font-size: 80px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 35px rgba(255,159,0,0.3); z-index: 10; transition: transform 0.05s; -webkit-tap-highlight-color: transparent; }
        #coin:active { transform: scale(0.95); }

        .pop-num { position: absolute; font-size: 28px; font-weight: 900; color: #fff; pointer-events: none; z-index: 999; animation: floatUp 0.7s ease-out forwards; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-120px); opacity: 0; } }

        /* Сетка меню на 4 кнопки */
        #menu { background: #1c1c1e; padding: 15px 15px calc(20px + env(safe-area-inset-bottom)); border-radius: 28px 28px 0 0; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { height: 55px; border: none; border-radius: 16px; font-weight: bold; color: white; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.1s; -webkit-tap-highlight-color: transparent; }
        
        #upd-btn { background: var(--blue); }
        #case-btn { background: var(--purple); }
        
        /* Кнопка подарка: серая, при нажатии белая */
        #daily-btn { background: var(--light-gray); color: #fff; }
        #daily-btn:active { background: #fff; color: #000; }
        
        #top-btn { background: var(--gray); color: #bbb; }

        /* Рулетка */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; }
        #roulette-container { width: 300px; height: 100px; border: 2px solid #333; position: relative; overflow: hidden; background: #111; margin: 20px 0; border-radius: 12px; }
        #roulette-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 3px; background: #ff3b30; z-index: 5; transform: translateX(-50%); box-shadow: 0 0 10px rgba(255,0,0,0.5); }
        #roulette-track { display: flex; position: absolute; left: 0; top: 0; height: 100%; }
        .item { min-width: 90px; height: 100px; display: flex; align-items: center; justify-content: center; border-right: 1px solid #222; font-weight: 900; font-size: 18px; }

        #top-list { width: 90%; background: #1c1c1e; border-radius: 20px; max-height: 50vh; overflow-y: auto; margin: 15px 0; }
        .row { display: flex; justify-content: space-between; padding: 12px 18px; border-bottom: 1px solid #2c2c2e; font-size: 13px; }
    </style>
</head>
<body>

    <div id="header">
        <div id="score">0</div>
        <div id="streak-info">Загрузка данных...</div>
    </div>

    <div id="game">
        <div id="coin">🚀</div>
    </div>

    <div id="menu">
        <button id="upd-btn" class="btn">Улучшить</button>
        <button id="case-btn" class="btn">Кейс 350</button>
        <button id="daily-btn" class="btn">🎁 Подарок</button>
        <button id="top-btn" class="btn">Лидерборд</button>
    </div>

    <div id="case-modal" class="modal">
        <h2 id="case-status" style="margin-bottom:10px;">Открытие...</h2>
        <div id="roulette-container">
            <div id="roulette-line"></div>
            <div id="roulette-track"></div>
        </div>
        <button id="close-case" class="btn" style="background:#444; width:140px; display:none;">ОК</button>
    </div>

    <div id="top-modal" class="modal">
        <h2>Топ Пилотов</h2>
        <div id="top-list"></div>
        <button onclick="document.getElementById('top-modal').style.display='none'" class="btn" style="background:#444; width:120px;">Назад</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAhFyYz8tC0VZqNKQweM1VH7A9rzcLQ7L4",
            authDomain: "rockettap-22e98.firebaseapp.com",
            databaseURL: "https://rockettap-22e98-default-rtdb.firebaseio.com",
            projectId: "rockettap-22e98",
            storageBucket: "rockettap-22e98.firebasestorage.app",
            messagingSenderId: "800263373343",
            appId: "1:800263373343:web:ed6db2e822f61d8257cb2a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const tg = window.Telegram.WebApp;
        tg.expand();

        const userId = tg.initDataUnsafe?.user?.id || "guest";
        let score = Number(localStorage.getItem('sc_v21')) || 0;
        let pwr = Number(localStorage.getItem('pw_v21')) || 1;
        let cost = Number(localStorage.getItem('ct_v21')) || 50;
        let streak = Number(localStorage.getItem('str_v21')) || 0;
        let lastDate = localStorage.getItem('ld_v21') || "";

        function refresh() {
            document.getElementById('score').innerText = Math.floor(score).toLocaleString();
            document.getElementById('upd-btn').innerText = `Up +1 (${cost})`;
            document.getElementById('streak-info').innerText = `Серия подарков: ${streak} дн.`;
            localStorage.setItem('sc_v21', score);
            localStorage.setItem('pw_v21', pwr);
            localStorage.setItem('ct_v21', cost);
            localStorage.setItem('str_v21', streak);
            localStorage.setItem('ld_v21', lastDate);
            db.ref('users/' + userId).set({ name: tg.initDataUnsafe?.user?.first_name || "Пилот", score: Math.floor(score) });
        }

        // Клик с числами из пальца
        document.getElementById('game').onclick = (e) => {
            score += pwr;
            const pop = document.createElement('div');
            pop.className = 'pop-num';
            pop.innerText = `+${pwr}`;
            pop.style.left = e.clientX + 'px';
            pop.style.top = (e.clientY - 20) + 'px';
            document.body.appendChild(pop);
            setTimeout(() => pop.remove(), 700);
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            refresh();
        };

        // Кнопки
        document.getElementById('upd-btn').onclick = (e) => {
            e.stopPropagation();
            if(score >= cost) { score -= cost; pwr++; cost = Math.round(cost * 1.6); refresh(); }
        };

        document.getElementById('daily-btn').onclick = (e) => {
            e.stopPropagation();
            const today = new Date().toLocaleDateString();
            if (lastDate === today) { tg.showAlert("Сегодня подарок уже взят!"); return; }
            
            const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
            if (lastDate === yesterday.toLocaleDateString()) streak++; else streak = 1;

            const reward = streak * 300; 
            score += reward;
            lastDate = today;
            refresh();
            tg.showPopup({ title: '🎁 Подарок!', message: `Твой бонус за ${streak} день: ${reward} тапов!`, buttons: [{type: 'ok'}] });
        };

        // Рулетка
        const items = [
            {v: 70, c: '#444', p: 60}, {v: 150, c: '#555', p: 25},
            {v: 500, c: '#007aff', p: 10}, {v: 2000, c: '#8e44ad', p: 4},
            {v: 10000, c: '#ff9f00', p: 1}
        ];

        document.getElementById('case-btn').onclick = (e) => {
            e.stopPropagation();
            if(score < 350) { tg.showAlert("Нужно 350 тапов!"); return; }
            score -= 350; refresh();

            const track = document.getElementById('roulette-track');
            const modal = document.getElementById('case-modal');
            const closeBtn = document.getElementById('close-case');
            modal.style.display = 'flex';
            closeBtn.style.display = 'none';
            track.style.transition = 'none';
            track.style.transform = 'translateX(0)';

            track.innerHTML = '';
            let pool = [];
            for(let i=0; i<45; i++) {
                const rand = Math.random() * 100;
                let accum = 0; let selected = items[0];
                for(let it of items) { accum += it.p; if(rand <= accum) { selected = it; break; } }
                pool.push(selected);
                track.innerHTML += `<div class="item" style="color:${selected.c}">${selected.v}</div>`;
            }

            setTimeout(() => {
                track.style.transition = 'transform 4s cubic-bezier(0.1, 0, 0.1, 1)';
                const stopPos = (40 * 90) - 105 + Math.random()*20;
                track.style.transform = `translateX(-${stopPos}px)`;
            }, 50);

            setTimeout(() => {
                const win = pool[40].v;
                score += win;
                document.getElementById('case-status').innerText = `Выпало: ${win}!`;
                closeBtn.style.display = 'block';
                refresh();
            }, 4200);
        };

        document.getElementById('close-case').onclick = () => {
            document.getElementById('case-modal').style.display = 'none';
            document.getElementById('case-status').innerText = "Открытие...";
        };

        document.getElementById('top-btn').onclick = (e) => {
            e.stopPropagation();
            const list = document.getElementById('top-list');
            list.innerHTML = "<div class='row'>Загрузка...</div>";
            document.getElementById('top-modal').style.display = 'flex';
            db.ref('users').orderByChild('score').limitToLast(15).once('value', (snap) => {
                list.innerHTML = "";
                let players = [];
                snap.forEach(c => { players.push(c.val()); });
                players.reverse().forEach((p, i) => {
                    list.innerHTML += `<div class="row"><span>${i+1}. ${p.name}</span><b>${p.score.toLocaleString()}</b></div>`;
                });
            });
        };

        refresh();
    </script>
</body>
</html>
