<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --bg: #0b0b0d; --orange: #ff9f0a; --holy: #ffcf40; --blue: #0a84ff; --purple: #bf5af2; --gray: #2c2c2e; --red: #ff453a; --glass: rgba(255, 255, 255, 0.08); }
        body { background: var(--bg); color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; -webkit-user-select: none; }

        /* ИНТЕРФЕЙС */
        #main-menu { position: fixed; inset: 0; background: #000; z-index: 3000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .menu-btn { width: 280px; height: 60px; margin: 10px; border-radius: 20px; border: 1px solid var(--holy); background: rgba(255,207,64,0.1); color: var(--holy); font-size: 18px; font-weight: bold; cursor: pointer; }
        .menu-btn:disabled { opacity: 0.3; color: #666; border-color: #333; }

        #header { padding-top: env(safe-area-inset-top); height: 100px; text-align: center; }
        #score { font-size: 50px; font-weight: 900; color: var(--holy); }

        #game-area { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        #halo { width: 180px; height: 180px; background: radial-gradient(circle, #fff, var(--holy)); border-radius: 50%; font-size: 80px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 50px rgba(255,207,64,0.3); }

        /* ПЛАВНЫЕ ЦИФРЫ */
        .pop { position: absolute; font-size: 32px; font-weight: 800; animation: float 0.7s ease-out forwards; pointer-events: none; }
        @keyframes float { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-120px); } }

        /* КОЛЕСО */
        #wheel-wrap { position: relative; width: 250px; height: 250px; border: 5px solid #333; border-radius: 50%; transition: 4s cubic-bezier(0.1, 0, 0.1, 1); background: #111; overflow: hidden; }
        .sct { position: absolute; width: 50%; height: 50%; transform-origin: 100% 100%; display: flex; align-items: center; justify-content: center; border: 1px solid #222; }

        /* ФУТЕР */
        #footer { background: #1c1c1e; padding: 20px 15px calc(20px + env(safe-area-inset-bottom)); display: grid; grid-template-columns: 1fr 1fr; gap: 10px; border-radius: 30px 30px 0 0; }
        .btn { height: 55px; border-radius: 15px; border: none; font-weight: bold; color: white; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--glass); }
        .btn:disabled { opacity: 0.4; }

        /* МОДАЛКИ */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 4000; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { width: 100%; max-width: 350px; background: #1c1c1e; border-radius: 25px; padding: 25px; text-align: center; border: 1px solid #333; }
        
        #roll-track { display: flex; position: absolute; left: 0; height: 100%; transition: 4s cubic-bezier(0.1, 0, 0.1, 1); }
        .item { min-width: 80px; display: flex; align-items: center; justify-content: center; font-weight: bold; border-right: 1px solid #222; }
    </style>
</head>
<body>

    <div id="main-menu">
        <h1 style="color:var(--holy)">HOLY TAP</h1>
        <button class="menu-btn" style="background:var(--holy); color:#000" onclick="closeMenu()">ИГРАТЬ</button>
        <button id="btn-bless" class="menu-btn" onclick="getBlessing()">БЛАГОСЛОВЕНИЕ (+5000)</button>
        <button class="menu-btn" onclick="openModal('modal-wheel')">КОЛЕСО ФОРТУНЫ</button>
        <button class="menu-btn" onclick="openModal('modal-sets')">НАСТРОЙКИ</button>
    </div>

    <div id="header"><div id="score">0</div></div>

    <div id="game-area">
        <button onclick="openMenu()" style="background:none; border:1px solid #444; color:#fff; padding:5px 15px; border-radius:10px; margin-bottom:20px;">МЕНЮ</button>
        <div id="halo" onclick="tap(event)">😇</div>
    </div>

    <div id="footer">
        <button id="btn-upd" class="btn" onclick="upgrade()">⚡ УЛУЧШИТЬ <span id="c-upd">50</span></button>
        <button id="btn-case-open" class="btn" onclick="openModal('modal-case')">💎 КЕЙС</button>
        <button class="btn" onclick="openModal('modal-friends')">👥 ДРУЗЬЯ</button>
        <button class="btn" onclick="loadTop()">🏆 РЕЙТИНГ</button>
        <button id="btn-gift" class="btn" style="grid-column: span 2; color:var(--orange)" onclick="claimGift()">🎁 ЕЖЕДНЕВНЫЙ ПОДАРОК</button>
    </div>

    <div id="modal-wheel" class="modal">
        <div class="modal-box">
            <div id="wheel-wrap"></div>
            <button id="spin-btn" class="menu-btn" style="width:100%" onclick="spin()">КРУТИТЬ (1000)</button>
            <button onclick="closeModal('modal-wheel')" class="btn" style="width:100%; margin-top:10px">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div id="modal-case" class="modal">
        <div class="modal-box">
            <h2 id="case-status">КЕЙС (900)</h2>
            <div style="width:100%; height:80px; background:#000; position:relative; overflow:hidden; margin:15px 0; border-radius:10px;">
                <div style="position:absolute; left:50%; top:0; bottom:0; width:2px; background:red; z-index:10;"></div>
                <div id="roll-track"></div>
            </div>
            <button id="case-go" class="menu-btn" style="width:100%" onclick="runCase()">ОТКРЫТЬ</button>
            <button onclick="closeModal('modal-case')" class="btn" style="width:100%; margin-top:10px">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div id="modal-friends" class="modal">
        <div class="modal-box">
            <h2>👥 Друзья</h2>
            <p>Приглашай друзей и получи <b style="color:var(--holy)">5000</b>!</p>
            <button class="menu-btn" style="width:100%" onclick="invite()">ПРИГЛАСИТЬ</button>
            <button onclick="closeModal('modal-friends')" class="btn" style="width:100%; margin-top:10px">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div id="modal-top" class="modal">
        <div class="modal-box">
            <h2>🏆 Топ Святых</h2>
            <div id="top-data" style="margin:15px 0"></div>
            <button onclick="closeModal('modal-top')" class="btn" style="width:100%">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div id="modal-sets" class="modal">
        <div class="modal-box">
            <h2>⚙️ Настройки</h2>
            <button class="btn" style="width:100%; margin-bottom:10px" onclick="location.reload()">ПЕРЕЗАГРУЗИТЬ</button>
            <button onclick="closeModal('modal-sets')" class="btn" style="width:100%">ЗАКРЫТЬ</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAhFyYz8tC0VZqNKQweM1VH7A9rzcLQ7L4", authDomain: "rockettap-22e98.firebaseapp.com", databaseURL: "https://rockettap-22e98-default-rtdb.firebaseio.com", projectId: "rockettap-22e98", storageBucket: "rockettap-22e98.firebasestorage.app", messagingSenderId: "800263373343", appId: "1:800263373343:web:ed6db2e822f61d8257cb2a" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const tg = window.Telegram.WebApp;

        let score = Number(localStorage.getItem('h_sc')) || 0;
        let pwr = Number(localStorage.getItem('h_pw')) || 1;
        let cost = Number(localStorage.getItem('h_ct')) || 50;
        let blessUsed = localStorage.getItem('h_bl') === 'true';
        let lastGift = localStorage.getItem('h_gf') || "";
        const uid = tg.initDataUnsafe?.user?.id || "dev";

        // Генерация колеса
        const prizes = [50, 500, 100, 2000, 50, 1000, 100, 5000];
        const w = document.getElementById('wheel-wrap');
        prizes.forEach((p,i) => {
            const s = document.createElement('div');
            s.className = 'sct';
            s.style.transform = `rotate(${i*45}deg) skewY(-45deg)`;
            s.style.background = i%2===0 ? '#222' : '#111';
            s.innerHTML = `<span style="transform:skewY(45deg) rotate(22.5deg); margin:15px">${p}</span>`;
            w.appendChild(s);
        });

        function update() {
            document.getElementById('score').innerText = Math.floor(score);
            document.getElementById('c-upd').innerText = cost;
            document.getElementById('btn-upd').disabled = score < cost;
            document.getElementById('btn-bless').disabled = blessUsed;
            if(blessUsed) document.getElementById('btn-bless').innerText = "БЛАГОСЛОВЕН ✅";
            
            const today = new Date().toDateString();
            document.getElementById('btn-gift').disabled = lastGift === today;
            
            localStorage.setItem('h_sc', score);
            localStorage.setItem('h_pw', pwr);
            localStorage.setItem('h_ct', cost);
            localStorage.setItem('h_bl', blessUsed);
            localStorage.setItem('h_gf', lastGift);
            db.ref('leaderboard/'+uid).set({name: tg.initDataUnsafe?.user?.first_name || "Святой", score: score});
        }

        function tap(e) {
            score += pwr;
            const p = document.createElement('div');
            p.className = 'pop'; p.innerText = `+${pwr}`;
            p.style.left = e.clientX + 'px'; p.style.top = e.clientY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 700);
            update();
        }

        function upgrade() { if(score >= cost) { score -= cost; pwr++; cost = Math.round(cost * 1.7); update(); } }

        function getBlessing() { if(!blessUsed) { score += 5000; blessUsed = true; update(); tg.showAlert("Благословение получено! +5000"); } }

        function claimGift() {
            const today = new Date().toDateString();
            if(lastGift !== today) { score += 2000; lastGift = today; update(); tg.showAlert("Ежедневный бонус +2000!"); }
        }

        function spin() {
            if(score < 1000) return;
            score -= 1000;
            const deg = 2000 + Math.random() * 2000;
            w.style.transform = `rotate(${deg}deg)`;
            document.getElementById('spin-btn').disabled = true;
            setTimeout(() => {
                const win = prizes[Math.floor(((360 - (deg % 360) + 22.5) % 360) / 45)];
                score += win; update();
                document.getElementById('spin-btn').disabled = false;
            }, 4000);
        }

        function runCase() {
            if(score < 900) return;
            score -= 900;
            const btn = document.getElementById('case-go');
            btn.disabled = true; // Защита от спама (Тот самый CD)
            
            const track = document.getElementById('roll-track');
            track.style.transition = 'none'; track.style.transform = 'translateX(0)';
            track.innerHTML = '';
            const win = [50, 100, 500, 1000, 10000][Math.floor(Math.random()*5)];
            for(let i=0; i<45; i++) {
                let v = (i === 40) ? win : [10, 50][Math.floor(Math.random()*2)];
                track.innerHTML += `<div class="item">${v}</div>`;
            }
            setTimeout(() => {
                track.style.transition = '4s cubic-bezier(0.1, 0, 0.1, 1)';
                track.style.transform = `translateX(-${40 * 80 - 140}px)`;
                setTimeout(() => {
                    score += win; update();
                    tg.showAlert(`Выпало: ${win}!`);
                    // Кулдаун 3 секунды после завершения анимации
                    setTimeout(() => { btn.disabled = false; }, 3000);
                }, 4100);
            }, 50);
        }

        function loadTop() {
            openModal('modal-top');
            db.ref('leaderboard').orderByChild('score').limitToLast(10).once('value', s => {
                let h = ""; let i = 1;
                s.forEach(c => { h = `<div style="display:flex;justify-content:space-between"><span>${i++}. ${c.val().name}</span><b>${Math.floor(c.val().score)}</b></div>` + h; });
                document.getElementById('top-data').innerHTML = h;
            });
        }

        function invite() { tg.openTelegramLink(`https://t.me/share/url?url=https://t.me/YOUR_BOT?start=${uid}&text=Получи 5000 молитв!`); }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function closeMenu() { document.getElementById('main-menu').style.display = 'none'; }
        function openMenu() { document.getElementById('main-menu').style.display = 'flex'; }

        update();
    </script>
</body>
</html>
