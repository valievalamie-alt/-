<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --bg: #000; --orange: #ff9f00; --blue: #007aff; --purple: #af52de; --gray: #2c2c2e; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; -webkit-user-select: none; }

        #header { padding-top: env(safe-area-inset-top); height: 110px; text-align: center; display: flex; flex-direction: column; justify-content: center; }
        #score { font-size: 54px; font-weight: 900; color: var(--orange); }
        #stats { font-size: 14px; color: #888; margin-top: 5px; }

        #game-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        #rocket { width: 180px; height: 180px; background: radial-gradient(circle, #ffb300, #ff8c00); border-radius: 50%; border: 5px solid #fff; font-size: 70px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 40px rgba(255,159,0,0.4); transition: transform 0.05s; z-index: 5; touch-action: manipulation; }
        #rocket:active { transform: scale(0.92); }

        .pop { position: absolute; font-size: 30px; font-weight: 900; color: #fff; pointer-events: none; animation: fly 0.6s ease-out forwards; }
        @keyframes fly { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-130px); opacity: 0; } }

        #footer { background: #1c1c1e; padding: 15px 15px calc(20px + env(safe-area-inset-bottom)); border-radius: 28px 28px 0 0; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { height: 50px; border: none; border-radius: 14px; font-weight: bold; font-size: 13px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; }
        
        #btn-upd { background: var(--blue); }
        #btn-case { background: var(--purple); }
        #btn-gift { background: #fff; color: #000; }
        #btn-top { background: var(--gray); }
        #btn-sets { background: #3a3a3c; grid-column: span 2; margin-top: 5px; }
        .btn:disabled { opacity: 0.3; pointer-events: none; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { width: 100%; max-width: 380px; background: #1c1c1e; border-radius: 24px; padding: 25px; box-sizing: border-box; text-align: center; }

        /* КЕЙС С ЛИНИЕЙ УДАЧИ */
        #roll-container { width: 100%; height: 90px; border: 2px solid #333; margin: 20px 0; overflow: hidden; position: relative; background: #000; border-radius: 12px; }
        #roll-track { display: flex; position: absolute; left: 0; height: 100%; transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); }
        .item { min-width: 90px; height: 100%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 22px; border-right: 1px solid #1a1a1a; box-sizing: border-box; }
        
        /* КРАСНАЯ ЛИНИЯ (ХИТБОКС) */
        #luck-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 3px; background: #ff3b30; transform: translateX(-50%); z-index: 10; box-shadow: 0 0 15px rgba(255, 59, 48, 0.8); }
        #luck-line::before { content: '▼'; position: absolute; top: -12px; left: -6px; color: #ff3b30; font-size: 14px; }
        #luck-line::after { content: '▲'; position: absolute; bottom: -12px; left: -6px; color: #ff3b30; font-size: 14px; }

        #top-list { margin: 15px 0; max-height: 250px; overflow-y: auto; }
        .row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #2c2c2e; font-size: 14px; }
    </style>
</head>
<body onclick="handleAudio()">

    <audio id="music" loop preload="auto">
        <source src="https://www.bensound.com/bensound-music/bensound-slowmotion.mp3" type="audio/mpeg">
    </audio>

    <div id="header">
        <div id="score">0</div>
        <div id="stats">За клик: <b id="val-pwr">+1</b></div>
    </div>

    <div id="game-area"><div id="rocket">🚀</div></div>

    <div id="footer">
        <button id="btn-upd" class="btn">Улучшить (50)</button>
        <button id="btn-case" class="btn">Кейс (350)</button>
        <button id="btn-gift" class="btn">🎁 Подарок</button>
        <button id="btn-top" class="btn">🏆 ТОП</button>
        <button id="btn-sets" class="btn">⚙️ НАСТРОЙКИ</button>
    </div>

    <div id="modal-case" class="modal">
        <div class="modal-box">
            <h2 id="case-status">КЕЙС</h2>
            <div id="roll-container">
                <div id="luck-line"></div>
                <div id="roll-track"></div>
            </div>
            <button id="btn-claim" class="btn" style="display:none; width:100%; background:var(--blue);">ЗАБРАТЬ</button>
        </div>
    </div>

    <div id="modal-top" class="modal">
        <div class="modal-box">
            <h2>Лидерборд</h2>
            <div id="top-list">Загрузка...</div>
            <button onclick="closeModal('modal-top')" class="btn" style="width:100%; background:var(--gray);">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div id="modal-sets" class="modal">
        <div class="modal-box">
            <h2>Настройки</h2>
            <button id="toggle-music" class="btn" style="width:100%; background:var(--blue); margin: 10px 0;">МУЗЫКА: ВКЛ</button>
            <div style="color:#555; font-size:12px; margin-top:15px;">Версия: <b>1.2.0 обновление</b></div>
            <button onclick="closeModal('modal-sets')" class="btn" style="width:100%; background:var(--gray); margin-top:15px;">ЗАКРЫТЬ</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAhFyYz8tC0VZqNKQweM1VH7A9rzcLQ7L4",
            authDomain: "rockettap-22e98.firebaseapp.com",
            databaseURL: "https://rockettap-22e98-default-rtdb.firebaseio.com",
            projectId: "rockettap-22e98",
            storageBucket: "rockettap-22e98.firebasestorage.app",
            messagingSenderId: "800263373343",
            appId: "1:800263373343:web:ed6db2e822f61d8257cb2a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const tg = window.Telegram.WebApp;
        tg.expand();

        let score = Number(localStorage.getItem('tap_sc')) || 0;
        let pwr = Number(localStorage.getItem('tap_pw')) || 1;
        let cost = Number(localStorage.getItem('tap_ct')) || 50;
        let lastGift = localStorage.getItem('tap_gift_date') || "";
        
        const audio = document.getElementById('music');
        let musicActive = true;
        let audioInit = false;

        function save() {
            localStorage.setItem('tap_sc', score);
            localStorage.setItem('tap_pw', pwr);
            localStorage.setItem('tap_ct', cost);
            localStorage.setItem('tap_gift_date', lastGift);
            
            const uid = tg.initDataUnsafe?.user?.id || "guest";
            const uname = tg.initDataUnsafe?.user?.first_name || "Пилот";
            db.ref('leaderboard/' + uid).set({ name: uname, score: Math.floor(score) });
            updateUI();
        }

        function updateUI() {
            document.getElementById('score').innerText = Math.floor(score).toLocaleString();
            document.getElementById('val-pwr').innerText = "+" + pwr;
            document.getElementById('btn-upd').innerText = `Улучшить (${cost})`;
            document.getElementById('btn-upd').disabled = score < cost;
            document.getElementById('btn-case').disabled = score < 350;

            const today = new Date().toDateString();
            const gBtn = document.getElementById('btn-gift');
            if (lastGift === today) {
                gBtn.disabled = true;
                gBtn.innerText = "Взято ✅";
            } else {
                gBtn.disabled = false;
                gBtn.innerText = "🎁 Подарок";
            }
        }

        function handleAudio() {
            if(!audioInit && musicActive) {
                audio.play().then(() => audioInit = true).catch(e => console.log("Audio block"));
            }
        }

        document.getElementById('rocket').onclick = (e) => {
            score += pwr;
            const p = document.createElement('div');
            p.className = 'pop'; p.innerText = `+${pwr}`;
            p.style.left = e.clientX + 'px'; p.style.top = (e.clientY - 20) + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 600);
            tg.HapticFeedback.impactOccurred('medium');
            save();
        };

        document.getElementById('btn-upd').onclick = () => {
            if(score >= cost) {
                score -= cost; pwr++; cost = Math.round(cost * 1.7);
                save();
            }
        };

        // ЛОГИКА КЕЙСА (10000, 5000, 1000, 500, 100, 50)
        const prizes = [
            {v: 10000, w: 1}, {v: 5000, w: 3}, {v: 1000, w: 10}, 
            {v: 500, w: 20}, {v: 100, w: 40}, {v: 50, w: 60}
        ];

        function getRandomPrize() {
            let totalW = prizes.reduce((s, p) => s + p.w, 0);
            let r = Math.random() * totalW;
            for (let p of prizes) { if (r < p.w) return p.v; r -= p.w; }
            return 50;
        }

        document.getElementById('btn-case').onclick = () => {
            if(score < 350) return;
            score -= 350; save();
            
            const modal = document.getElementById('modal-case');
            const track = document.getElementById('roll-track');
            const claim = document.getElementById('btn-claim');
            modal.style.display = 'flex';
            claim.style.display = 'none';
            document.getElementById('case-status').innerText = "КРУТИМ...";
            
            track.style.transition = 'none';
            track.style.transform = 'translateX(0)';
            track.innerHTML = '';
            
            let items = [];
            for(let i=0; i<60; i++) {
                let val = getRandomPrize();
                items.push(val);
                let color = val >= 5000 ? '#ff9f00' : (val >= 1000 ? '#af52de' : '#007aff');
                track.innerHTML += `<div class="item" style="color:${color}">${val}</div>`;
            }

            setTimeout(() => {
                track.style.transition = 'transform 4s cubic-bezier(0.1, 0, 0.1, 1)';
                const winIdx = 50; // На каком элементе остановимся
                const itemW = 90;
                const center = document.getElementById('roll-container').offsetWidth / 2;
                const finalPos = (winIdx * itemW) + (itemW / 2) - center;
                track.style.transform = `translateX(-${finalPos}px)`;
                
                setTimeout(() => {
                    let win = items[winIdx];
                    score += win; save();
                    document.getElementById('case-status').innerText = `ВЫПАЛО: ${win}`;
                    claim.style.display = 'block';
                }, 4100);
            }, 50);
        };

        // ПОДАРОК
        document.getElementById('btn-gift').onclick = () => {
            const today = new Date().toDateString();
            if (lastGift !== today) {
                score += 1500;
                lastGift = today;
                save();
                tg.showAlert("Вы получили ежедневный подарок: 1500 монет!");
            }
        };

        // ЛИДЕРБОРД
        document.getElementById('btn-top').onclick = () => {
            document.getElementById('modal-top').style.display = 'flex';
            const list = document.getElementById('top-list');
            list.innerHTML = "Загрузка...";
            db.ref('leaderboard').orderByChild('score').limitToLast(15).on('value', (s) => {
                list.innerHTML = "";
                let arr = [];
                s.forEach(c => arr.push(c.val()));
                arr.reverse().forEach((p, i) => {
                    list.innerHTML += `<div class="row"><span>${i+1}. ${p.name}</span><b>${p.score.toLocaleString()}</b></div>`;
                });
            });
        };

        document.getElementById('btn-sets').onclick = () => document.getElementById('modal-sets').style.display = 'flex';
        document.getElementById('toggle-music').onclick = function() {
            musicActive = !musicActive;
            if(!musicActive) audio.pause(); else audio.play();
            this.innerText = `МУЗЫКА: ${musicActive ? 'ВКЛ' : 'ВЫКЛ'}`;
            this.style.background = musicActive ? 'var(--blue)' : '#ff3b30';
        };

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        document.getElementById('btn-claim').onclick = () => closeModal('modal-case');

        updateUI();
    </script>
</body>
</html>
