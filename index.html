<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --bg: #000; --orange: #ff9f00; --blue: #007aff; --pulp: #8e44ad; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Идеальная центровка счета */
        #header { padding: 40px 10px 10px; text-align: center; width: 100%; box-sizing: border-box; }
        #score { font-size: 50px; font-weight: bold; color: var(--orange); margin: 0; display: block; width: 100%; }
        #nick { font-size: 13px; color: #888; margin-top: 5px; }

        #game { flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        #coin { width: 200px; height: 200px; background: radial-gradient(circle, #ffb300, #ff8c00); border-radius: 50%; border: 5px solid #fff; font-size: 80px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 35px rgba(255,159,0,0.4); cursor: pointer; transition: transform 0.05s; -webkit-tap-highlight-color: transparent; }
        #coin:active { transform: scale(0.95); }

        #menu { background: #1c1c1e; padding: 15px; border-radius: 25px 25px 0 0; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding-bottom: 45px; }
        .btn { height: 55px; border: none; border-radius: 16px; font-weight: bold; color: white; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        #upd-btn { background: var(--blue); }
        #case-btn { background: var(--pulp); }
        #top-btn { background: #3a3a3c; grid-column: span 2; font-size: 13px; letter-spacing: 0.5px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
        #top-list { width: 88%; background: #1c1c1e; border-radius: 18px; margin: 12px 0; max-height: 60vh; overflow-y: auto; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; border-bottom: 1px solid #2c2c2e; font-size: 12px; }
        .row b { color: var(--orange); font-family: monospace; }
        .row.me { background: rgba(0, 122, 255, 0.12); }
    </style>
</head>
<body>

    <div id="header">
        <div id="score">0</div>
        <div id="nick">Загрузка...</div>
    </div>

    <div id="game">
        <div id="coin">🚀</div>
    </div>

    <div id="menu">
        <button id="upd-btn" class="btn">Up (+1) • 50</button>
        <button id="case-btn" class="btn">🎁 Case (200)</button>
        <button id="top-btn" class="btn">🏆 ЛИДЕРБОРД ОНЛАЙН</button>
    </div>

    <div id="top-modal" class="modal">
        <h2 style="font-size: 20px;">Топ Игроков</h2>
        <div id="top-list"></div>
        <button onclick="document.getElementById('top-modal').style.display='none'" class="btn" style="background:#444; width:120px; height: 40px; margin-top: 10px;">Назад</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAhFyYz8tC0VZqNKQweM1VH7A9rzcLQ7L4",
            authDomain: "rockettap-22e98.firebaseapp.com",
            databaseURL: "https://rockettap-22e98-default-rtdb.firebaseio.com",
            projectId: "rockettap-22e98",
            storageBucket: "rockettap-22e98.firebasestorage.app",
            messagingSenderId: "800263373343",
            appId: "1:800263373343:web:ed6db2e822f61d8257cb2a"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const tg = window.Telegram.WebApp;
        if (tg) tg.expand();
        
        const userId = (tg?.initDataUnsafe?.user?.id) || "g_" + Math.floor(Math.random()*1000);
        const userNick = (tg?.initDataUnsafe?.user?.first_name) || "Пилот";
        document.getElementById('nick').innerText = "Пилот: " + userNick;

        let score = Number(localStorage.getItem('sc_v13')) || 0;
        let pwr = Number(localStorage.getItem('pw_v13')) || 1;
        let cost = Number(localStorage.getItem('ct_v13')) || 50;

        function refresh() {
            document.getElementById('score').innerText = Math.floor(score).toLocaleString();
            document.getElementById('upd-btn').innerText = `Up (+1) • ${cost}`;
            document.getElementById('upd-btn').style.opacity = score < cost ? "0.5" : "1";
            document.getElementById('case-btn').style.opacity = score < 200 ? "0.5" : "1";
            
            localStorage.setItem('sc_v13', score);
            localStorage.setItem('pw_v13', pwr);
            localStorage.setItem('ct_v13', cost);
            
            db.ref('users/' + userId).set({ name: userNick, score: Math.floor(score) });
        }

        // Клик по ракете
        document.getElementById('coin').onclick = () => {
            score += pwr;
            if(tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            refresh();
        };

        // Кнопка Апгрейда
        document.getElementById('upd-btn').onclick = () => {
            if(score >= cost) {
                score -= cost;
                pwr += 1;
                cost = Math.round(cost * 1.5);
                refresh();
            }
        };

        // Кнопка КЕЙСА (Теперь работает!)
        document.getElementById('case-btn').onclick = () => {
            if(score >= 200) {
                score -= 200;
                const win = Math.floor(Math.random() * (1000 - 100 + 1)) + 100;
                score += win;
                alert("🎁 Тебе выпало: " + win + " тапов!");
                refresh();
            } else {
                alert("Нужно 200 тапов для открытия!");
            }
        };

        // Лидерборд
        document.getElementById('top-btn').onclick = () => {
            const list = document.getElementById('top-list');
            list.innerHTML = "<div class='row'>Загрузка...</div>";
            document.getElementById('top-modal').style.display = 'flex';
            db.ref('users').orderByChild('score').limitToLast(15).once('value', (snapshot) => {
                list.innerHTML = "";
                let players = [];
                snapshot.forEach(child => { players.push(child.val()); });
                players.reverse().forEach((p, i) => {
                    const isMe = p.name === userNick ? "row me" : "row";
                    list.innerHTML += `<div class="${isMe}"><span>${i+1}. ${p.name}</span><b>${p.score.toLocaleString()}</b></div>`;
                });
            });
        };

        refresh();
    </script>
</body>
</html>
