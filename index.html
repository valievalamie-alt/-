<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #header { padding: 20px; }
        #score { font-size: 50px; color: orange; font-weight: bold; margin: 0; }
        #coin-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        #coin { width: 180px; height: 180px; background: orange; border-radius: 50%; font-size: 80px; display: flex; align-items: center; justify-content: center; border: 5px solid #fff; cursor: pointer; user-select: none; }
        #coin:active { transform: scale(0.9); }
        #footer { padding: 20px; background: #111; display: flex; flex-direction: column; gap: 10px; border-radius: 20px 20px 0 0; }
        .btn { padding: 15px; border: none; border-radius: 10px; color: #fff; font-weight: bold; font-size: 16px; cursor: pointer; }
        #upd-btn { background: #007bff; }
        #case-btn { background: #8e44ad; }
        .btn:disabled { background: #333; color: #666; }
        
        /* Окно кейса */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
        #loot { font-size: 24px; color: #ff9f00; margin: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="header">
        <div id="score">0</div>
        <div style="color:#888">Сила клика: <span id="pwr">1</span></div>
    </div>

    <div id="coin-area">
        <div id="coin">🚀</div>
    </div>

    <div id="footer">
        <button id="upd-btn" class="btn">Улучшить (+1) • 50</button>
        <button id="case-btn" class="btn">Открыть Кейс • 200</button>
    </div>

    <div id="modal">
        <h2>Распаковка...</h2>
        <div id="loot"></div>
        <button onclick="closeModal()" class="btn" style="background:#444; width:200px">Закрыть</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let score = Number(localStorage.getItem('sc_final')) || 0;
        let pwr = Number(localStorage.getItem('pw_final')) || 1;
        let cost = Number(localStorage.getItem('ct_final')) || 50;

        function refresh() {
            document.getElementById('score').innerText = Math.floor(score);
            document.getElementById('pwr').innerText = pwr;
            document.getElementById('upd-btn').innerText = "Улучшить (+1) • " + cost;
            document.getElementById('upd-btn').disabled = score < cost;
            document.getElementById('case-btn').disabled = score < 200;
            
            localStorage.setItem('sc_final', score);
            localStorage.setItem('pw_final', pwr);
            localStorage.setItem('ct_final', cost);
        }

        document.getElementById('coin').onclick = () => {
            score += pwr;
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            refresh();
        };

        document.getElementById('upd-btn').onclick = () => {
            if(score >= cost) {
                score -= cost;
                pwr += 1;
                cost = Math.round(cost * 1.6);
                refresh();
            }
        };

        // Логика кейса (простая и надежная)
        document.getElementById('case-btn').onclick = () => {
            if(score >= 200) {
                score -= 200;
                const modal = document.getElementById('modal');
                const loot = document.getElementById('loot');
                modal.style.display = 'flex';
                loot.innerText = "Крутим барабан...";
                
                setTimeout(() => {
                    const r = Math.random();
                    if(r < 0.1) { // 10% шанс на супер-приз
                        pwr += 10;
                        loot.innerText = "🔥 СУПЕР! +10 к силе клика!";
                    } else if(r < 0.4) { // 30% шанс на очки
                        score += 500;
                        loot.innerText = "💰 Удача! +500 очков!";
                    } else {
                        pwr += 2;
                        loot.innerText = "🔋 Неплохо! +2 к силе клика";
                    }
                    refresh();
                }, 1500);
            }
        };

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        refresh();
    </script>
</body>
</html>
