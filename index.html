<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --bg: #0b0b0d; --orange: #ff9f0a; --blue: #0a84ff; --purple: #bf5af2; --gray: #2c2c2e; --red: #ff453a; --glass: rgba(255, 255, 255, 0.08); }
        body { background: var(--bg); color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 0; height: 100vh; overflow: hidden; -webkit-user-select: none; }

        /* ЭКРАН МЕНЮ */
        #main-menu { position: fixed; inset: 0; background: radial-gradient(circle at center, #1c1c1e, #000); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .menu-logo { font-size: 100px; margin-bottom: 20px; filter: drop-shadow(0 0 20px var(--orange)); animation: float 3s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        /* ИГРА */
        #game-ui { display: none; height: 100vh; flex-direction: column; }
        #header { padding-top: env(safe-area-inset-top); text-align: center; background: linear-gradient(to bottom, rgba(255,159,10,0.1), transparent); padding-bottom: 20px; }
        #score { font-size: 50px; font-weight: 900; color: var(--orange); text-shadow: 0 0 20px rgba(255,159,10,0.3); }
        #rank-text { color: var(--blue); font-weight: bold; text-transform: uppercase; font-size: 14px; letter-spacing: 1px; }

        #game-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        #rocket { width: 190px; height: 190px; background: radial-gradient(circle at 30% 30%, #ffcc00, #ff9f0a); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 85px; box-shadow: 0 0 50px rgba(255,159,10,0.3); transition: transform 0.05s; touch-action: manipulation; }
        
        #combo-badge { position: absolute; top: -40px; background: var(--red); color: white; padding: 5px 15px; border-radius: 20px; font-weight: 900; display: none; animation: pulse 0.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* КОЛЕСО */
        #wheel-container { position: relative; width: 280px; height: 280px; border: 5px solid #444; border-radius: 50%; transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); margin-bottom: 20px; }
        .wheel-pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 30px; height: 30px; background: var(--red); clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 10; }

        #footer { background: rgba(28, 28, 30, 0.9); padding: 15px 10px calc(20px + env(safe-area-inset-bottom)); display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; border-radius: 30px 30px 0 0; }
        .btn { border: none; border-radius: 18px; font-weight: bold; color: white; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--glass); font-size: 12px; height: 55px; transition: transform 0.1s; }
        .btn:active { transform: scale(0.95); }
        .btn-big { width: 240px; height: 60px; font-size: 18px; background: var(--orange); color: black; margin-bottom: 15px; border-radius: 20px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { width: 90%; background: #1c1c1e; border-radius: 25px; padding: 25px; text-align: center; border: 1px solid #333; }
        .pop { position: absolute; font-size: 35px; font-weight: 900; pointer-events: none; animation: fly 0.6s forwards; z-index: 100; }
        @keyframes fly { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-130px); opacity: 0; } }

        .row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #333; }
    </style>
</head>
<body onclick="startAudio()">

    <audio id="bg-music" loop><source src="https://www.bensound.com/bensound-music/bensound-slowmotion.mp3" type="audio/mpeg"></audio>

    <div id="main-menu">
        <div class="menu-logo">🚀</div>
        <h1 style="margin-bottom: 30px; letter-spacing: 2px;">ROCKET TAP</h1>
        <button class="btn btn-big" onclick="startGame()">ИГРАТЬ</button>
        <button class="btn btn-big" style="background:var(--purple); color:white" onclick="openModal('modal-wheel')">🎡 КОЛЕСО</button>
        <button class="btn btn-big" style="background:var(--gray); color:white" onclick="openModal('modal-top')">🏆 РЕЙТИНГ</button>
    </div>

    <div id="game-ui">
        <div id="header">
            <div id="rank-text">КАДЕТ</div>
            <div id="score">0</div>
            <div style="font-size: 14px; color: #8e8e93;">ПРИБЫЛЬ: <b id="val-pwr">+1</b></div>
        </div>

        <div id="game-area">
            <div id="rocket" onpointerdown="handleTap(event)">
                <div id="combo-badge">X2 COMBO</div>
                🚀
            </div>
        </div>

        <div id="footer">
            <button class="btn" onclick="openModal('modal-upd')" style="color:var(--blue)">⚡ УЛУЧШИТЬ<br><small id="upd-cost">50</small></button>
            <button class="btn" onclick="openModal('modal-case')" style="color:var(--purple)">💎 КЕЙС</button>
            <button class="btn" onclick="location.reload()">🏠 МЕНЮ</button>
        </div>
    </div>

    <div id="modal-wheel" class="modal">
        <div class="wheel-pointer"></div>
        <div id="wheel-container"><canvas id="wheel-canvas" width="280" height="280"></canvas></div>
        <button id="spin-btn" class="btn btn-big" onclick="spinWheel()">КРУТИТЬ БЕСПЛАТНО</button>
        <button class="btn" onclick="closeModal('modal-wheel')">НАЗАД</button>
    </div>

    <div id="modal-case" class="modal">
        <div class="modal-box">
            <h2 id="case-title" style="color:var(--purple)">УДАЧИ, ПИЛОТ!</h2>
            <div id="roll-wrap"><div id="hitbox"></div><div id="roll-track"></div></div>
            <button id="btn-claim" class="btn" style="display:none; width:100%; background:var(--blue)">ЗАБРАТЬ</button>
            <button class="btn" style="width:100%; margin-top:10px" onclick="closeModal('modal-case')">ВЫЙТИ</button>
        </div>
    </div>

    <div id="modal-top" class="modal">
        <div class="modal-box">
            <h2>🏆 Топ Пилотов</h2>
            <div id="top-list" style="max-height: 300px; overflow-y: auto; margin-bottom: 15px;"></div>
            <button class="btn" style="width:100%" onclick="closeModal('modal-top')">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div id="modal-upd" class="modal">
        <div class="modal-box">
            <h2>УЛУЧШЕНИЕ</h2>
            <p>Добавить +1 к силе тапа?</p>
            <button class="btn btn-big" style="width:100%" onclick="buyUpgrade()">КУПИТЬ</button>
            <button class="btn" style="width:100%; margin-top:10px" onclick="closeModal('modal-upd')">ОТМЕНА</button>
        </div>
    </div>

    <script>
        // Инициализация Firebase
        const firebaseConfig = { apiKey: "AIzaSyAhFyYz8tC0VZqNKQweM1VH7A9rzcLQ7L4", authDomain: "rockettap-22e98.firebaseapp.com", databaseURL: "https://rockettap-22e98-default-rtdb.firebaseio.com", projectId: "rockettap-22e98", storageBucket: "rockettap-22e98.firebasestorage.app", messagingSenderId: "800263373343", appId: "1:800263373343:web:ed6db2e822f61d8257cb2a" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const tg = window.Telegram.WebApp;
        tg.expand();

        let score = Number(localStorage.getItem('rk_sc')) || 0;
        let pwr = Number(localStorage.getItem('rk_pw')) || 1;
        let cost = Number(localStorage.getItem('rk_ct')) || 50;
        let lastWheel = Number(localStorage.getItem('rk_last_wheel')) || 0;
        
        let lastTap = 0;
        let comboCount = 0;
        let musicOn = true;
        let audioStarted = false;

        const ranks = [
            { name: "КАДЕТ", min: 0 },
            { name: "ПИЛОТ", min: 10000 },
            { name: "КАПИТАН", min: 50000 },
            { name: "МАСТЕР", min: 150000 },
            { name: "ЛЕГЕНДА", min: 500000 }
        ];

        const uid = tg.initDataUnsafe?.user?.id || "player_local";

        function startGame() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('game-ui').style.display = 'flex';
            updateUI();
        }

        function updateUI() {
            document.getElementById('score').innerText = Math.floor(score).toLocaleString('ru-RU');
            document.getElementById('val-pwr').innerText = "+" + pwr;
            document.getElementById('upd-cost').innerText = cost;
            
            const rank = [...ranks].reverse().find(r => score >= r.min);
            document.getElementById('rank-text').innerText = rank.name;

            localStorage.setItem('rk_sc', score);
            localStorage.setItem('rk_pw', pwr);
            localStorage.setItem('rk_ct', cost);
            
            const name = tg.initDataUnsafe?.user?.first_name || "Пилот";
            db.ref('leaderboard/' + uid).update({ name: name, score: Math.floor(score) });
        }

        function handleTap(e) {
            const now = Date.now();
            if(now - lastTap < 300) comboCount++; else comboCount = 0;
            lastTap = now;

            let currentGain = pwr;
            if(comboCount > 10) {
                currentGain *= 2;
                document.getElementById('combo-badge').style.display = 'block';
                document.getElementById('rocket').style.filter = 'drop-shadow(0 0 15px var(--red))';
            } else {
                document.getElementById('combo-badge').style.display = 'none';
                document.getElementById('rocket').style.filter = 'none';
            }

            score += currentGain;
            
            const x = e.clientX || e.touches[0].clientX;
            const y = e.clientY || e.touches[0].clientY;
            const p = document.createElement('div');
            p.className = 'pop'; p.innerText = `+${currentGain}`;
            p.style.left = (x - 20) + 'px'; p.style.top = (y - 20) + 'px';
            p.style.color = currentGain > pwr ? 'var(--red)' : 'white';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 600);

            document.getElementById('rocket').style.transform = 'scale(0.92)';
            setTimeout(() => document.getElementById('rocket').style.transform = 'scale(1)', 50);
            
            tg.HapticFeedback.impactOccurred('light');
            updateUI();
        }

        function buyUpgrade() {
            if(score >= cost) {
                score -= cost; pwr++; cost = Math.round(cost * 1.8);
                updateUI();
                closeModal('modal-upd');
            } else {
                tg.showAlert("Недостаточно монет!");
            }
        }

        // КОЛЕСО ФОРТУНЫ
        const canvas = document.getElementById('wheel-canvas');
        const ctx = canvas.getContext('2d');
        const sectors = [
            {v: "500", c: "#ff9f0a"}, {v: "1000", c: "#0a84ff"},
            {v: "0", c: "#2c2c2e"}, {v: "5000", c: "#bf5af2"},
            {v: "100", c: "#32d74b"}, {v: "15000", c: "#ffd60a"}
        ];
        const arc = (Math.PI * 2) / sectors.length;

        function drawWheel() {
            sectors.forEach((s, i) => {
                ctx.beginPath(); ctx.fillStyle = s.c; ctx.moveTo(140, 140);
                ctx.arc(140, 140, 140, i * arc, (i + 1) * arc); ctx.fill();
                ctx.save(); ctx.translate(140, 140); ctx.rotate(i * arc + arc/2);
                ctx.fillStyle = "white"; ctx.font = "bold 16px Arial"; ctx.fillText(s.v, 70, 5); ctx.restore();
            });
        }
        drawWheel();

        function spinWheel() {
            const now = Date.now();
            if(now - lastWheel < 3600000) {
                tg.showAlert("Колесо доступно раз в час!"); return;
            }
            
            const btn = document.getElementById('spin-btn');
            btn.disabled = true;
            const deg = Math.floor(3000 + Math.random() * 3000);
            document.getElementById('wheel-container').style.transform = `rotate(${deg}deg)`;
            
            setTimeout(() => {
                const actualDeg = deg % 360;
                const idx = sectors.length - 1 - Math.floor(actualDeg / (360 / sectors.length));
                const win = parseInt(sectors[idx].v);
                score += win;
                lastWheel = Date.now();
                localStorage.setItem('rk_last_wheel', lastWheel);
                tg.showAlert(win > 0 ? `Твой выигрыш: ${win}!` : "Попробуй в следующий раз!");
                updateUI();
                btn.disabled = false;
            }, 4000);
        }

        // КЕЙСЫ (твоя логика)
        function getWinAmount() {
            const rand = Math.random() * 100;
            if (rand < 0.5) return 10000;
            if (rand < 30) return 1000;
            return 100;
        }

        document.getElementById('modal-case').onclick = (e) => {
            if(e.target.id === 'modal-case') return; // предотвращаем клики
            const track = document.getElementById('roll-track');
            if(score < 900) { tg.showAlert("Кейс стоит 900!"); return; }
            score -= 900; updateUI();
            
            document.getElementById('btn-claim').style.display = 'none';
            track.style.transition = 'none';
            track.style.transform = 'translateX(0)';
            track.innerHTML = '';
            
            const winIdx = 40;
            let finalWin = getWinAmount();
            
            for(let i = 0; i < 50; i++) {
                const v = i === winIdx ? finalWin : (Math.random() > 0.5 ? 50 : 500);
                track.innerHTML += `<div class="item" style="color:white">${v}</div>`;
            }

            setTimeout(() => {
                track.style.transition = 'transform 4s cubic-bezier(0.1, 0, 0.1, 1)';
                track.style.transform = `translateX(-${(winIdx * 100) - 130}px)`;
                setTimeout(() => {
                    score += finalWin; updateUI();
                    document.getElementById('case-title').innerText = `ВЫИГРЫШ: ${finalWin}`;
                    document.getElementById('btn-claim').style.display = 'block';
                }, 4100);
            }, 50);
        }

        // РЕЙТИНГ (Твоя логика)
        function loadTop() {
            const listDiv = document.getElementById('top-list');
            listDiv.innerHTML = "Загрузка...";
            db.ref('leaderboard').orderByChild('score').limitToLast(10).once('value').then((snap) => {
                listDiv.innerHTML = "";
                let players = [];
                snap.forEach(c => { players.push(c.val()); });
                players.reverse().forEach((p, i) => {
                    listDiv.innerHTML += `<div class="row"><span>${i+1}. ${p.name}</span><b>${p.score.toLocaleString()}</b></div>`;
                });
            });
        }

        function openModal(id) { 
            document.getElementById(id).style.display = 'flex'; 
            if(id === 'modal-top') loadTop();
        }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        document.getElementById('btn-claim').onclick = () => closeModal('modal-case');
        
        function startAudio() { if(!audioStarted && musicOn) { document.getElementById('bg-music').play().then(()=>audioStarted=true).catch(()=>{}); } }
    </script>
</body>
</html>
