<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --bg: #000; --orange: #ff9f00; --blue: #007aff; --purple: #af52de; --gray: #2c2c2e; --red: #ff3b30; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; -webkit-user-select: none; }

        /* Шапка */
        #header { padding-top: env(safe-area-inset-top); height: 110px; text-align: center; display: flex; flex-direction: column; justify-content: center; background: #000; }
        #score { font-size: 50px; font-weight: 900; color: var(--orange); text-shadow: 0 0 20px rgba(255,159,0,0.5); }
        #stats { font-size: 14px; color: #888; }

        /* Ракета */
        #game-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        #rocket { width: 180px; height: 180px; background: radial-gradient(circle, #ffb300, #ff8c00); border-radius: 50%; border: 6px solid #fff; font-size: 80px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 50px rgba(255,159,0,0.6); transition: transform 0.05s; z-index: 10; touch-action: manipulation; }
        #rocket:active { transform: scale(0.85); }

        .pop { position: absolute; font-size: 35px; font-weight: 900; color: white; pointer-events: none; animation: fly 0.6s ease-out forwards; z-index: 20; }
        @keyframes fly { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-160px); opacity: 0; } }

        /* Меню */
        #footer { background: #1c1c1e; padding: 15px 15px calc(20px + env(safe-area-inset-bottom)); border-radius: 30px 30px 0 0; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; border-top: 1px solid #333; }
        .btn { height: 52px; border: none; border-radius: 16px; font-weight: bold; font-size: 14px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; }
        
        #btn-upd { background: var(--blue); }
        #btn-case { background: var(--purple); }
        #btn-gift { background: #fff; color: #000; }
        #btn-top { background: var(--gray); }
        #btn-sets { background: #3a3a3c; grid-column: span 2; margin-top: 5px; }
        .btn:disabled { opacity: 0.3; pointer-events: none; }

        /* Модалки */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { width: 100%; max-width: 380px; background: #1c1c1e; border-radius: 25px; padding: 25px; box-sizing: border-box; text-align: center; border: 1px solid #444; }

        /* РУЛЕТКА */
        #roll-wrap { width: 100%; height: 100px; border: 2px solid #555; margin: 25px 0; overflow: hidden; position: relative; background: #000; border-radius: 15px; }
        #roll-track { display: flex; position: absolute; left: 0; height: 100%; transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); }
        .item { min-width: 100px; height: 100%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 26px; border-right: 1px solid #222; }
        
        /* СДВИНУТАЯ ЛИНИЯ УДАЧИ (ХИТБОКС) */
        #hitbox { position: absolute; left: 53%; top: 0; bottom: 0; width: 4px; background: var(--red); transform: translateX(-50%); z-index: 50; box-shadow: 0 0 20px var(--red); }
        #hitbox::before { content: '▼'; position: absolute; top: -18px; left: -8px; color: var(--red); font-size: 20px; }
        #hitbox::after { content: '▲'; position: absolute; bottom: -18px; left: -8px; color: var(--red); font-size: 20px; }

        #top-list { margin: 20px 0; max-height: 250px; overflow-y: auto; text-align: left; }
        .row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #2c2c2e; font-size: 15px; }
    </style>
</head>
<body onclick="startAudio()">

    <audio id="bg-music" loop>
        <source src="https://www.bensound.com/bensound-music/bensound-slowmotion.mp3" type="audio/mpeg">
    </audio>

    <div id="header">
        <div id="score">0</div>
        <div id="stats">За тап: <b id="val-pwr">+1</b></div>
    </div>

    <div id="game-area"><div id="rocket">🚀</div></div>

    <div id="footer">
        <button id="btn-upd" class="btn">Улучшить (50)</button>
        <button id="btn-case" class="btn">Кейс (350)</button>
        <button id="btn-gift" class="btn">🎁 Подарок</button>
        <button id="btn-top" class="btn">🏆 ТОП</button>
        <button id="btn-sets" class="btn">⚙️ НАСТРОЙКИ</button>
    </div>

    <div id="modal-case" class="modal">
        <div class="modal-box">
            <h2 id="case-title" style="margin:0; color:var(--purple);">ОТКРЫТИЕ КЕЙСА</h2>
            <div id="roll-wrap">
                <div id="hitbox"></div>
                <div id="roll-track"></div>
            </div>
            <button id="btn-claim" class="btn" style="display:none; width:100%; background:var(--blue);">ЗАБРАТЬ ВЫИГРЫШ</button>
        </div>
    </div>

    <div id="modal-top" class="modal">
        <div class="modal-box">
            <h2>🏆 Топ Пилотов</h2>
            <div id="top-list">Связь с базой...</div>
            <button onclick="closeModal('modal-top')" class="btn" style="width:100%; background:var(--gray);">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div id="modal-sets" class="modal">
        <div class="modal-box">
            <h2>Настройки</h2>
            <button id="toggle-mu" class="btn" style="width:100%; background:var(--blue); margin-bottom:15px;">МУЗЫКА: ВКЛ</button>
            <div style="color:#666; font-size:12px;">Версия: <b>1.2.0 обновление</b></div>
            <button onclick="closeModal('modal-sets')" class="btn" style="width:100%; background:var(--gray); margin-top:15px;">ЗАКРЫТЬ</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAhFyYz8tC0VZqNKQweM1VH7A9rzcLQ7L4",
            authDomain: "rockettap-22e98.firebaseapp.com",
            databaseURL: "https://rockettap-22e98-default-rtdb.firebaseio.com",
            projectId: "rockettap-22e98",
            storageBucket: "rockettap-22e98.firebasestorage.app",
            messagingSenderId: "800263373343",
            appId: "1:800263373343:web:ed6db2e822f61d8257cb2a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const tg = window.Telegram.WebApp;
        tg.expand();

        let score = Number(localStorage.getItem('tap_v121_sc')) || 0;
        let pwr = Number(localStorage.getItem('tap_v121_pw')) || 1;
        let cost = Number(localStorage.getItem('tap_v121_ct')) || 50;
        let lastGift = localStorage.getItem('tap_v121_gift') || "";
        
        const audio = document.getElementById('bg-music');
        let musicOn = true;
        let audioStarted = false;

        function save() {
            localStorage.setItem('tap_v121_sc', score);
            localStorage.setItem('tap_v121_pw', pwr);
            localStorage.setItem('tap_v121_ct', cost);
            localStorage.setItem('tap_v121_gift', lastGift);
            
            const uid = tg.initDataUnsafe?.user?.id || "player";
            const name = tg.initDataUnsafe?.user?.first_name || "Пилот";
            db.ref('leaderboard/' + uid).set({ name: name, score: Math.floor(score) });
            updateUI();
        }

        function updateUI() {
            document.getElementById('score').innerText = Math.floor(score).toLocaleString();
            document.getElementById('val-pwr').innerText = "+" + pwr;
            document.getElementById('btn-upd').innerText = `Улучшить (${cost})`;
            document.getElementById('btn-upd').disabled = score < cost;
            document.getElementById('btn-case').disabled = score < 350;

            const today = new Date().toDateString();
            const gBtn = document.getElementById('btn-gift');
            if(lastGift === today) {
                gBtn.disabled = true;
                gBtn.innerText = "Взято ✅";
            } else {
                gBtn.disabled = false;
                gBtn.innerText = "🎁 Подарок";
            }
        }

        function startAudio() {
            if(!audioStarted && musicOn) {
                audio.play().then(() => audioStarted = true).catch(() => {});
            }
        }

        document.getElementById('rocket').onclick = (e) => {
            score += pwr;
            const p = document.createElement('div');
            p.className = 'pop'; p.innerText = `+${pwr}`;
            p.style.left = e.clientX + 'px'; p.style.top = e.clientY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 600);
            tg.HapticFeedback.impactOccurred('medium');
            save();
        };

        document.getElementById('btn-upd').onclick = () => {
            if(score >= cost) {
                score -= cost; pwr++; cost = Math.round(cost * 1.7);
                save();
            }
        };

        // КЕЙС
        const rewards = [
            {v: 10000, w: 1}, {v: 5000, w: 3}, {v: 1000, w: 10}, 
            {v: 500, w: 20}, {v: 100, w: 40}, {v: 50, w: 60}
        ];

        function getReward() {
            let totalW = rewards.reduce((s, r) => s + r.w, 0);
            let rnd = Math.random() * totalW;
            for (let r of rewards) { if(rnd < r.w) return r.v; rnd -= r.w; }
            return 50;
        }

        document.getElementById('btn-case').onclick = () => {
            if(score < 350) return;
            score -= 350; save();
            
            const modal = document.getElementById('modal-case');
            const track = document.getElementById('roll-track');
            const claim = document.getElementById('btn-claim');
            modal.style.display = 'flex';
            claim.style.display = 'none';
            document.getElementById('case-title').innerText = "УДАЧИ...";
            
            track.style.transition = 'none';
            track.style.transform = 'translateX(0)';
            track.innerHTML = '';
            
            let list = [];
            for(let i=0; i<60; i++) {
                let v = getReward();
                list.push(v);
                let col = v >= 5000 ? '#ff9f00' : (v >= 1000 ? '#af52de' : '#007aff');
                track.innerHTML += `<div class="item" style="color:${col}">${v}</div>`;
            }

            setTimeout(() => {
                track.style.transition = 'transform 4s cubic-bezier(0.1, 0, 0.1, 1)';
                const itemW = 100;
                const winIdx = 50; 
                const containerW = document.getElementById('roll-wrap').offsetWidth;
                // Смещение с учетом линии на 53%
                const shift = (winIdx * itemW) + (itemW / 2) - (containerW * 0.53);
                track.style.transform = `translateX(-${shift}px)`;
                
                setTimeout(() => {
                    let win = list[winIdx];
                    score += win; save();
                    document.getElementById('case-title').innerText = `ВЫИГРЫШ: ${win}`;
                    claim.style.display = 'block';
                }, 4100);
            }, 50);
        };

        // ПОДАРОК
        document.getElementById('btn-gift').onclick = () => {
            const today = new Date().toDateString();
            if(lastGift !== today) {
                score += 2500;
                lastGift = today;
                save();
                tg.showAlert("Вы получили бонус: 2500 монет! Прилетайте завтра.");
            }
        };

        // ЛИДЕРБОРД
        document.getElementById('btn-top').onclick = () => {
            document.getElementById('modal-top').style.display = 'flex';
            const list = document.getElementById('top-list');
            list.innerHTML = "Загрузка...";
            
            db.ref('leaderboard').orderByChild('score').limitToLast(15).on('value', (snap) => {
                list.innerHTML = "";
                let players = [];
                snap.forEach(c => { players.push(c.val()); });
                players.reverse().forEach((p, i) => {
                    list.innerHTML += `<div class="row"><span>${i+1}. ${p.name}</span><b>${p.score.toLocaleString()}</b></div>`;
                });
            });
        };

        document.getElementById('btn-sets').onclick = () => document.getElementById('modal-sets').style.display = 'flex';
        document.getElementById('toggle-mu').onclick = function() {
            musicOn = !musicOn;
            if(!musicOn) audio.pause(); else audio.play();
            this.innerText = `МУЗЫКА: ${musicOn ? 'ВКЛ' : 'ВЫКЛ'}`;
            this.style.background = musicOn ? 'var(--blue)' : 'var(--red)';
        };

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        document.getElementById('btn-claim').onclick = () => closeModal('modal-case');

        updateUI();
    </script>
</body>
</html>
