<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --bg: #000; --orange: #ff9f00; --blue: #007aff; --purple: #af52de; --gray: #2c2c2e; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; -webkit-user-select: none; }

        /* Шапка */
        #header { padding-top: env(safe-area-inset-top); height: 120px; text-align: center; display: flex; flex-direction: column; justify-content: center; background: linear-gradient(to bottom, #111, #000); }
        #score { font-size: 56px; font-weight: 900; color: var(--orange); text-shadow: 0 0 20px rgba(255,159,0,0.3); }
        #stats { display: flex; justify-content: center; gap: 15px; font-size: 14px; color: #888; margin-top: 5px; }

        /* Центр (Ракета) */
        #game-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        #rocket { width: 200px; height: 200px; background: radial-gradient(circle, #ffb300, #ff8c00); border-radius: 50%; border: 6px solid #fff; font-size: 80px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 40px rgba(255,159,0,0.5); transition: transform 0.05s; }
        #rocket:active { transform: scale(0.9); }

        /* Вылетающие цифры */
        .pop { position: absolute; font-size: 32px; font-weight: 900; color: white; pointer-events: none; animation: fly 0.6s ease-out forwards; }
        @keyframes fly { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-150px); opacity: 0; } }

        /* Нижнее меню */
        #footer { background: #1c1c1e; padding: 15px 15px calc(20px + env(safe-area-inset-bottom)); border-radius: 30px 30px 0 0; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn { height: 55px; border: none; border-radius: 16px; font-weight: bold; font-size: 14px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; }
        
        #btn-upd { background: var(--blue); }
        #btn-case { background: var(--purple); }
        #btn-gift { background: #fff; color: #000; }
        #btn-top { background: var(--gray); }
        #btn-sets { background: #3a3a3c; grid-column: span 2; margin-top: 5px; }
        .btn:disabled { opacity: 0.4; }

        /* Модалки */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { width: 100%; max-width: 400px; background: #1c1c1e; border-radius: 25px; padding: 25px; box-sizing: border-box; text-align: center; }

        /* Лидерборд список */
        #top-list { margin: 20px 0; max-height: 300px; overflow-y: auto; }
        .row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #333; }

        /* Рулетка кейса */
        #roll-wrap { width: 100%; height: 70px; border: 2px solid #333; margin: 20px 0; overflow: hidden; position: relative; background: #000; border-radius: 10px; }
        #roll-track { display: flex; position: absolute; left: 0; transition: transform 3s cubic-bezier(0.1, 0, 0.1, 1); }
        .item { min-width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; border-right: 1px solid #222; }
    </style>
</head>
<body onclick="unlockAudio()">

    <audio id="music" loop>
        <source src="https://www.bensound.com/bensound-music/bensound-slowmotion.mp3" type="audio/mpeg">
    </audio>

    <div id="header">
        <div id="score">0</div>
        <div id="stats">
            <span>За тап: <b id="val-pwr">1</b></span>
            <span>Комбо: <b id="val-strk">0</b></span>
        </div>
    </div>

    <div id="game-area">
        <div id="rocket">🚀</div>
    </div>

    <div id="footer">
        <button id="btn-upd" class="btn">Улучшить (50)</button>
        <button id="btn-case" class="btn">Кейс (350)</button>
        <button id="btn-gift" class="btn">🎁 Подарок</button>
        <button id="btn-top" class="btn">🏆 ТОП</button>
        <button id="btn-sets" class="btn">⚙️ НАСТРОЙКИ</button>
    </div>

    <div id="modal-sets" class="modal">
        <div class="modal-box">
            <h2>Настройки</h2>
            <button id="toggle-audio" class="btn" style="width:100%; background:var(--blue); margin-bottom:15px;">МУЗЫКА: ВКЛ</button>
            <p style="color:#555; font-size:12px;">Версия 2.0.0 (Final Fix)</p>
            <button onclick="closeModal('modal-sets')" class="btn" style="width:100%; background:var(--gray);">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div id="modal-top" class="modal">
        <div class="modal-box">
            <h2>Лидерборд</h2>
            <div id="top-list">Загрузка...</div>
            <button onclick="closeModal('modal-top')" class="btn" style="width:100%; background:var(--gray);">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div id="modal-case" class="modal">
        <div class="modal-box">
            <h2 id="case-res">Удачи!</h2>
            <div id="roll-wrap">
                <div id="roll-track"></div>
            </div>
            <button id="case-claim" class="btn" style="display:none; width:100%; background:var(--blue);">ЗАБРАТЬ</button>
        </div>
    </div>

    <script>
        // --- КОНФИГ ---
        const firebaseConfig = {
            apiKey: "AIzaSyAhFyYz8tC0VZqNKQweM1VH7A9rzcLQ7L4",
            authDomain: "rockettap-22e98.firebaseapp.com",
            databaseURL: "https://rockettap-22e98-default-rtdb.firebaseio.com",
            projectId: "rockettap-22e98",
            storageBucket: "rockettap-22e98.firebasestorage.app",
            messagingSenderId: "800263373343",
            appId: "1:800263373343:web:ed6db2e822f61d8257cb2a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const tg = window.Telegram.WebApp;
        tg.expand();

        // --- ДАННЫЕ ---
        let score = Number(localStorage.getItem('sc_final')) || 0;
        let pwr = Number(localStorage.getItem('pw_final')) || 1;
        let cost = Number(localStorage.getItem('ct_final')) || 50;
        let lastGift = localStorage.getItem('gd_final') || "";
        
        const audio = document.getElementById('music');
        let audioMuted = false;
        let audioInit = false;

        function save() {
            localStorage.setItem('sc_final', score);
            localStorage.setItem('pw_final', pwr);
            localStorage.setItem('ct_final', cost);
            localStorage.setItem('gd_final', lastGift);
            
            const uid = tg.initDataUnsafe?.user?.id || "guest";
            const uname = tg.initDataUnsafe?.user?.first_name || "Игрок";
            db.ref('leaderboard/' + uid).set({ name: uname, score: Math.floor(score) });
            updateUI();
        }

        function updateUI() {
            document.getElementById('score').innerText = Math.floor(score).toLocaleString();
            document.getElementById('val-pwr').innerText = pwr;
            document.getElementById('btn-upd').innerText = `Улучшить (${cost})`;
            document.getElementById('btn-upd').disabled = score < cost;
            document.getElementById('btn-case').disabled = score < 350;
            
            const today = new Date().toLocaleDateString();
            const gBtn = document.getElementById('btn-gift');
            if(lastGift === today) {
                gBtn.innerText = "Взято ✅";
                gBtn.disabled = true;
            } else {
                gBtn.innerText = "🎁 Подарок";
                gBtn.disabled = false;
            }
        }

        // --- ЛОГИКА ---
        function unlockAudio() {
            if(!audioInit) {
                audio.play().catch(() => {});
                audioInit = true;
            }
        }

        document.getElementById('rocket').onclick = (e) => {
            score += pwr;
            const p = document.createElement('div');
            p.className = 'pop'; p.innerText = `+${pwr}`;
            p.style.left = e.clientX + 'px'; p.style.top = e.clientY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 600);
            tg.HapticFeedback.impactOccurred('medium');
            save();
        };

        document.getElementById('btn-upd').onclick = () => {
            if(score >= cost) {
                score -= cost; pwr++; cost = Math.round(cost * 1.8);
                save();
            }
        };

        document.getElementById('btn-gift').onclick = () => {
            const today = new Date().toLocaleDateString();
            if(lastGift !== today) {
                score += 1000; lastGift = today;
                tg.showAlert("Вы получили 1000 монет!");
                save();
            }
        };

        // Кейс
        document.getElementById('btn-case').onclick = () => {
            if(score < 350) return;
            score -= 350; save();
            const modal = document.getElementById('modal-case');
            const track = document.getElementById('roll-track');
            const claim = document.getElementById('case-claim');
            modal.style.display = 'flex';
            claim.style.display = 'none';
            document.getElementById('case-res').innerText = "Крутим...";
            
            track.style.transition = 'none';
            track.style.transform = 'translateX(0)';
            track.innerHTML = '';
            
            let items = [];
            for(let i=0; i<40; i++) {
                let r = Math.random()*100;
                let v = r > 95 ? 10000 : (r > 70 ? 700 : 100);
                items.push(v);
                track.innerHTML += `<div class="item" style="color:${v>1000?'gold':(v>100?'cyan':'#888')}">${v}</div>`;
            }

            setTimeout(() => {
                track.style.transition = 'transform 3s cubic-bezier(0.1, 0, 0.1, 1)';
                track.style.transform = `translateX(-${(35 * 70) - 150}px)`;
            }, 50);

            setTimeout(() => {
                let win = items[35];
                score += win;
                document.getElementById('case-res').innerText = `Выпало: ${win}!`;
                claim.style.display = 'block';
                save();
            }, 3200);
        };

        // Топ
        document.getElementById('btn-top').onclick = () => {
            document.getElementById('modal-top').style.display = 'flex';
            const list = document.getElementById('top-list');
            list.innerHTML = "Загрузка...";
            db.ref('leaderboard').orderByChild('score').limitToLast(10).once('value', (s) => {
                list.innerHTML = "";
                let arr = [];
                s.forEach(child => { arr.push(child.val()); });
                if(arr.length === 0) list.innerHTML = "Пока никого нет...";
                arr.reverse().forEach((p, i) => {
                    list.innerHTML += `<div class="row"><span>${i+1}. ${p.name}</span><b>${p.score}</b></div>`;
                });
            });
        };

        // Настройки
        document.getElementById('btn-sets').onclick = () => document.getElementById('modal-sets').style.display = 'flex';
        document.getElementById('toggle-audio').onclick = function() {
            audioMuted = !audioMuted;
            audio.muted = audioMuted;
            this.innerText = `МУЗЫКА: ${audioMuted ? 'ВЫКЛ' : 'ВКЛ'}`;
            this.style.background = audioMuted ? '#ff3b30' : 'var(--blue)';
        };

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        document.getElementById('case-claim').onclick = () => closeModal('modal-case');

        save();
    </script>
</body>
</html>
