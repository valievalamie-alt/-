<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --bg: #0b0b0d; --orange: #ffcf40; --blue: #0a84ff; --purple: #bf5af2; --gray: #2c2c2e; --red: #ff453a; --glass: rgba(255, 255, 255, 0.08); }
        body { background: #0b0b0d; color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; -webkit-user-select: none; }

        body::before {
            content: ""; position: fixed; inset: 0;
            background: radial-gradient(circle at top center, rgba(255, 207, 64, 0.2), transparent 70%);
            pointer-events: none; z-index: -1;
        }

        /* МЕНЮ */
        #main-menu { position: fixed; inset: 0; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle at center, #1a1a1c 0%, #000 100%); }
        .holy-title { color: #fff; text-shadow: 0 0 20px rgba(255,207,64,0.6); font-weight: 900; margin-bottom: 40px; text-transform: uppercase; font-size: 32px; letter-spacing: 2px;}

        /* ИГРА */
        #game-ui { display: none; flex-direction: column; height: 100vh; width: 100%; }
        #header { padding-top: env(safe-area-inset-top); height: 120px; text-align: center; display: flex; flex-direction: column; justify-content: center; }
        #score { font-size: 54px; font-weight: 900; color: var(--orange); text-shadow: 0 0 30px rgba(255,207,64,0.4); }
        #stats { font-size: 14px; color: #8e8e93; font-weight: 500; text-transform: uppercase; }

        #game-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        #rocket { width: 190px; height: 190px; background: radial-gradient(circle at 30% 30%, #fff, #ffcf40); border-radius: 50%; border: 8px solid rgba(255,255,255,0.4); font-size: 90px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 80px rgba(255,207,64,0.4); transition: transform 0.1s; touch-action: manipulation; }
        #rocket:active { transform: scale(0.9); }

        .pop { position: absolute; font-size: 38px; font-weight: 900; color: white; pointer-events: none; animation: fly 0.7s forwards; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        @keyframes fly { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-180px); opacity: 0; } }

        /* КНОПКИ */
        #footer { background: rgba(28, 28, 30, 0.8); backdrop-filter: blur(20px); padding: 20px 15px calc(25px + env(safe-area-inset-bottom)); border-radius: 35px 35px 0 0; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; border-top: 1px solid rgba(255,255,255,0.1); }
        .btn { height: 56px; border: none; border-radius: 18px; font-weight: 700; font-size: 14px; color: white; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; }
        .btn span { font-size: 10px; opacity: 0.7; margin-top: 2px; }
        .btn:active { transform: scale(0.96); }
        .btn:disabled { opacity: 0.3; }
        
        #btn-upd { background: var(--glass); border: 1px solid var(--blue); color: var(--blue); }
        #btn-case { background: var(--glass); border: 1px solid var(--purple); color: var(--purple); }
        #btn-friends { background: var(--glass); border: 1px solid var(--orange); color: var(--orange); }
        #btn-top { background: var(--glass); border: 1px solid #fff; color: #fff; }
        #btn-gift { background: #1c1c1e; border: 1px solid #333; }
        #btn-sets { background: #1c1c1e; border: 1px solid #333; font-size: 20px; }

        /* КОЛЕСО */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 3000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { width: 100%; max-width: 360px; background: #1c1c1e; border-radius: 30px; padding: 30px; border: 1px solid var(--orange); text-align: center; }
        
        /* Исправленная стрелка по центру */
        .wheel-pointer { 
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%); 
            width: 0; height: 0; border-left: 15px solid transparent; 
            border-right: 15px solid transparent; border-top: 30px solid var(--red); 
            z-index: 100; filter: drop-shadow(0 0 10px var(--red));
        }

        #roll-wrap { width: 100%; height: 100px; border: 1px solid #333; margin: 25px 0; overflow: hidden; position: relative; background: #000; border-radius: 15px; }
        #roll-track { display: flex; position: absolute; left: 0; height: 100%; transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); }
        .item { min-width: 100px; width: 100px; height: 100%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 26px; border-right: 1px solid #111; }
    </style>
</head>
<body onclick="startAudio()">

    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
    </audio>

    <div id="main-menu">
        <div style="font-size: 110px; filter: drop-shadow(0 0 40px rgba(255,207,64,0.8)); margin-bottom: 10px;">😇</div>
        <h1 class="holy-title">Holy Tap</h1>
        <button class="btn" style="width: 250px; height: 60px; background: linear-gradient(135deg, #ffcf40, #fff); color: black; font-size: 18px; margin-bottom: 15px;" onclick="startGame()">ИГРАТЬ</button>
        <button class="btn" style="width: 250px; height: 60px; background: rgba(255,255,255,0.1); border: 1px solid #ffcf40; color: #ffcf40; font-size: 18px;" onclick="blessAndWheel()">БЛАГОСЛОВЛЯЮ (+5000)</button>
    </div>

    <div id="game-ui">
        <div id="header">
            <div id="score">0</div>
            <div id="stats">Сила веры: <b id="val-pwr">+1</b></div>
        </div>
        <div id="game-area"><div id="rocket">😇</div></div>
        <div id="footer">
            <button id="btn-upd" class="btn">⚡ УЛУЧШИТЬ<span id="cost-upd">50</span></button>
            <button id="btn-case" class="btn">💎 КЕЙС<span>900</span></button>
            <button id="btn-friends" class="btn">👥 ДРУЗЬЯ</button>
            <button id="btn-top" class="btn">🏆 РЕЙТИНГ</button>
            <button id="btn-gift" class="btn">🎁 ПОДАРОК</button>
            <button id="btn-sets" class="btn">⚙️</button>
        </div>
    </div>

    <div id="modal-wheel" class="modal">
        <div class="modal-box">
            <h2 style="color:var(--orange); margin:0 0 20px 0;">КОЛЕСО СУДЬБЫ</h2>
            <p style="font-size: 14px; color: #888; margin-bottom: 5px;">Вращение: <b style="color:var(--orange)">1,000$</b></p>
            <div style="position: relative; width: 260px; height: 260px; margin: 15px auto;">
                <div class="wheel-pointer"></div>
                <canvas id="wheel-canvas" width="260" height="260" style="border-radius: 50%; border: 6px solid #333; transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1);"></canvas>
            </div>
            <button id="spin-btn" class="btn" style="width: 100%; background: var(--orange); color: black; margin-top: 20px; height: 50px;" onclick="spinWheel()">КРУТИТЬ (1,000$)</button>
            <button onclick="closeModal('modal-wheel')" class="btn" style="width: 100%; background: transparent; border: 1px solid #555; margin-top: 10px; height: 40px;">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div id="modal-case" class="modal"> <div class="modal-box"> <h2 id="case-title" style="color:var(--purple); margin:0;">КЕЙС ПИЛОТА</h2> <div id="roll-wrap"> <div id="roll-track"></div> </div> <button id="btn-claim" class="btn" style="display:none; width:100%; background:var(--blue); height: 50px;">ЗАБРАТЬ</button> </div> </div>
    <div id="modal-top" class="modal"> <div class="modal-box"> <h2>🏆 ТОП ВЕРУЮЩИХ</h2> <div id="top-list">Загрузка...</div> <button onclick="closeModal('modal-top')" class="btn" style="width:100%; background:var(--gray); height: 50px;">ЗАКРЫТЬ</button> </div> </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAhFyYz8tC0VZqNKQweM1VH7A9rzcLQ7L4", authDomain: "rockettap-22e98.firebaseapp.com", databaseURL: "https://rockettap-22e98-default-rtdb.firebaseio.com", projectId: "rockettap-22e98", storageBucket: "rockettap-22e98.firebasestorage.app", messagingSenderId: "800263373343", appId: "1:800263373343:web:ed6db2e822f61d8257cb2a" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const tg = window.Telegram.WebApp;
        tg.expand();

        let score = Number(localStorage.getItem('rk_sc')) || 0;
        let pwr = Number(localStorage.getItem('rk_pw')) || 1;
        let cost = Number(localStorage.getItem('rk_ct')) || 50;
        let lastBlessing = localStorage.getItem('rk_bless') || "";
        let musicOn = true;
        let audioStarted = false;

        function startGame() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('game-ui').style.display = 'flex';
        }

        // БЛАГОСЛОВЕНИЕ: Дает 5000 раз в день
        function blessAndWheel() {
            const today = new Date().toDateString();
            if(lastBlessing !== today) {
                score += 5000;
                lastBlessing = today;
                localStorage.setItem('rk_bless', today);
                save();
                tg.showAlert("Святое благословение! Начислено +5,000$!");
            }
            document.getElementById('modal-wheel').style.display = 'flex';
        }

        // КОЛЕСО (БЕЗ 2X)
        const wCanvas = document.getElementById('wheel-canvas');
        const wCtx = wCanvas.getContext('2d');
        const wSectors = [500, 0, 5000, 7777, 1500, 250]; // Заменили 2X на 7777
        const wColors = ["#ff9f0a", "#2c2c2e", "#bf5af2", "#ffcf40", "#32d74b", "#ff453a"];
        const arc = (Math.PI * 2) / wSectors.length;

        function drawWheel() {
            wSectors.forEach((s, i) => {
                wCtx.beginPath(); wCtx.fillStyle = wColors[i]; wCtx.moveTo(130, 130);
                wCtx.arc(130, 130, 130, i * arc, (i + 1) * arc); wCtx.fill();
                wCtx.save(); wCtx.translate(130, 130); wCtx.rotate(i * arc + arc/2);
                wCtx.fillStyle = "white"; wCtx.font = "bold 18px Arial"; wCtx.fillText(s, 70, 7); wCtx.restore();
            });
        }
        drawWheel();

        function spinWheel() {
            if(score < 1000) { tg.showAlert("Недостаточно средств! Нужно 1,000$."); return; }
            score -= 1000; save();

            const deg = 3600 + Math.random() * 3600;
            wCanvas.style.transform = `rotate(${deg}deg)`;
            document.getElementById('spin-btn').disabled = true;

            setTimeout(() => {
                const actualDeg = (deg % 360);
                // Математика для определения сектора при стрелке сверху (270 градусов коррекция)
                const idx = wSectors.length - 1 - Math.floor(((actualDeg + 270) % 360) / (360 / wSectors.length));
                const win = wSectors[idx];
                
                score += Number(win); 
                tg.showAlert(win > 0 ? `Божья искра! Вы выиграли ${win}$!` : "Пусто... Попробуйте еще раз.");
                
                save();
                document.getElementById('spin-btn').disabled = false;
            }, 4000);
        }

        function save() {
            localStorage.setItem('rk_sc', score); localStorage.setItem('rk_pw', pwr);
            localStorage.setItem('rk_ct', cost);
            db.ref('leaderboard/' + (tg.initDataUnsafe?.user?.id || "local")).update({ 
                name: tg.initDataUnsafe?.user?.first_name || "Апостол", 
                score: Math.floor(score) 
            });
            updateUI();
        }

        function updateUI() {
            document.getElementById('score').innerText = Math.floor(score).toLocaleString();
            document.getElementById('val-pwr').innerText = "+" + pwr;
            document.getElementById('cost-upd').innerText = cost;
        }

        function startAudio() { 
            if(!audioStarted && musicOn) { 
                const audio = document.getElementById('bg-music');
                audio.volume = 0.4;
                audio.play().then(() => audioStarted = true).catch(() => {}); 
            } 
        }

        // ТАП
        document.getElementById('rocket').onclick = (e) => {
            score += pwr;
            const p = document.createElement('div');
            p.className = 'pop'; p.innerText = `+${pwr}`;
            p.style.left = e.clientX + 'px'; p.style.top = e.clientY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 700);
            tg.HapticFeedback.impactOccurred('light');
            save();
        };

        // КЕЙС
        document.getElementById('btn-case').onclick = () => {
            if(score < 900) return;
            score -= 900; save();
            const track = document.getElementById('roll-track');
            document.getElementById('modal-case').style.display = 'flex';
            track.style.transition = 'none'; track.style.transform = 'translateX(0)';
            track.innerHTML = '';
            for(let i=0; i<50; i++) {
                let v = Math.random() > 0.9 ? 5000 : 100;
                track.innerHTML += `<div class="item">${v}</div>`;
            }
            setTimeout(() => {
                track.style.transition = 'transform 4s cubic-bezier(0.1, 0, 0.1, 1)';
                track.style.transform = 'translateX(-3500px)';
                setTimeout(() => { score += 500; save(); closeModal('modal-case'); }, 4100);
            }, 50);
        };

        document.getElementById('btn-upd').onclick = () => { if(score >= cost) { score -= cost; pwr++; cost = Math.round(cost * 1.6); save(); } };
        document.getElementById('btn-top').onclick = () => { document.getElementById('modal-top').style.display = 'flex'; };
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        updateUI();
    </script>
</body>
</html>
