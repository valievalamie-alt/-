<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #000; --orange: #ff9f00; --blue: #007aff; --purple: #8e44ad; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; user-select: none; }
        #header { padding: 30px 20px 10px; text-align: center; }
        #score { font-size: 60px; font-weight: bold; color: var(--orange); margin: 0; text-shadow: 0 0 20px rgba(255,159,0,0.3); }
        #nick { font-size: 14px; color: #888; margin-top: 5px; }
        #game { flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        #coin { width: 220px; height: 220px; background: radial-gradient(circle, #ffb300, #ff8c00); border-radius: 50%; border: 6px solid #fff; font-size: 100px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 50px rgba(255,159,0,0.4); cursor: pointer; transition: transform 0.05s; }
        #coin:active { transform: scale(0.92); }
        #menu { background: #1a1a1a; padding: 20px; border-radius: 30px 30px 0 0; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding-bottom: 40px; }
        .btn { height: 60px; border: none; border-radius: 18px; font-weight: bold; color: white; font-size: 16px; cursor: pointer; }
        #upd-btn { background: var(--blue); }
        #case-btn { background: var(--purple); }
        #top-btn { background: #333; grid-column: span 2; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 100; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #top-list { width: 100%; background: #111; border-radius: 20px; margin: 20px 0; max-height: 50vh; overflow-y: auto; }
        .row { display: flex; justify-content: space-between; padding: 18px; border-bottom: 1px solid #222; font-size: 18px; }
        .row b { color: var(--orange); }
    </style>
</head>
<body>

    <div id="header">
        <div id="score">0</div>
        <div id="nick">Загрузка...</div>
    </div>

    <div id="game">
        <div id="coin">🚀</div>
    </div>

    <div id="menu">
        <button id="upd-btn" class="btn">Upgrade • 50</button>
        <button id="case-btn" class="btn">🎁 Case (200)</button>
        <button id="top-btn" class="btn">🏆 ЛИДЕРБОРД ОНЛАЙН</button>
    </div>

    <div id="top-modal" class="modal">
        <h2 style="font-size: 28px;">Топ Игроков</h2>
        <div id="top-list"></div>
        <button onclick="document.getElementById('top-modal').style.display='none'" class="btn" style="background:#444; width:180px">Закрыть</button>
    </div>

    <script>
        // ТВОИ КЛЮЧИ FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyAhFyYz8tC0VZqNKQweM1VH7A9rzcLQ7L4",
            authDomain: "rockettap-22e98.firebaseapp.com",
            databaseURL: "https://rockettap-22e98-default-rtdb.firebaseio.com",
            projectId: "rockettap-22e98",
            storageBucket: "rockettap-22e98.firebasestorage.app",
            messagingSenderId: "800263373343",
            appId: "1:800263373343:web:ed6db2e822f61d8257cb2a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const userId = tg.initDataUnsafe?.user?.id || "guest_" + Math.floor(Math.random()*1000);
        const userNick = tg.initDataUnsafe?.user?.first_name || "Пилот";
        document.getElementById('nick').innerText = "Пилот: " + userNick;

        let score = Number(localStorage.getItem('sc_v8')) || 0;
        let pwr = Number(localStorage.getItem('pw_v8')) || 1;
        let cost = Number(localStorage.getItem('ct_v8')) || 50;

        function refresh() {
            document.getElementById('score').innerText = Math.floor(score);
            document.getElementById('upd-btn').innerText = `Up (+1) • ${cost}`;
            document.getElementById('upd-btn').style.opacity = score < cost ? "0.5" : "1";
            
            localStorage.setItem('sc_v8', score);
            localStorage.setItem('pw_v8', pwr);
            localStorage.setItem('ct_v8', cost);
            
            // Сохраняем в твою базу Realtime Database
            db.ref('users/' + userId).set({
                name: userNick,
                score: Math.floor(score)
            });
        }

        document.getElementById('coin').onclick = () => {
            score += pwr;
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            refresh();
        };

        document.getElementById('upd-btn').onclick = () => {
            if(score >= cost) {
                score -= cost;
                pwr += 1;
                cost = Math.round(cost * 1.6);
                refresh();
            }
        };

        // ЗАГРУЗКА РЕАЛЬНОГО ТОПА ИЗ БАЗЫ
        document.getElementById('top-btn').onclick = () => {
            const list = document.getElementById('top-list');
            list.innerHTML = "<div class='row'>Загрузка...</div>";
            document.getElementById('top-modal').style.display = 'flex';

            db.ref('users').orderByChild('score').limitToLast(10).once('value', (snapshot) => {
                list.innerHTML = "";
                let players = [];
                snapshot.forEach(child => { players.push(child.val()); });
                players.reverse().forEach((p, i) => {
                    const isMe = p.name === userNick ? " (Вы)" : "";
                    list.innerHTML += `<div class="row"><span>${i+1}. ${p.name}${isMe}</span><b>${p.score}</b></div>`;
                });
            });
        };

        refresh();
    </script>
</body>
</html>
