<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --bg: #0b0b0d; --orange: #ff9f0a; --holy: #ffcf40; --blue: #0a84ff; --purple: #bf5af2; --gray: #2c2c2e; --red: #ff453a; --glass: rgba(255, 255, 255, 0.08); }
        body { background: var(--bg); color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; -webkit-user-select: none; }

        /* МЕНЮ */
        #main-menu { position: fixed; inset: 0; background: radial-gradient(circle at center, #1c1c1e, #000); z-index: 3000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .menu-btn { width: 260px; height: 60px; margin: 12px; border-radius: 20px; border: 1px solid var(--holy); background: rgba(255,207,64,0.1); color: var(--holy); font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .menu-btn:disabled { opacity: 0.5; filter: grayscale(1); }

        #header { padding-top: env(safe-area-inset-top); height: 100px; text-align: center; display: flex; flex-direction: column; justify-content: center; background: linear-gradient(to bottom, rgba(255,207,64,0.1), transparent); }
        #score { font-size: 50px; font-weight: 900; color: var(--holy); text-shadow: 0 0 20px rgba(255,207,64,0.4); }
        #stats { font-size: 13px; color: #8e8e93; text-transform: uppercase; }

        #game-area { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        /* Кнопка выхода НАД нимбой */
        #btn-to-menu { background: var(--glass); border: 1px solid var(--holy); color: var(--holy); padding: 10px 30px; border-radius: 15px; font-size: 14px; margin-bottom: 20px; font-weight: bold; cursor: pointer; z-index: 10; }

        #halo { width: 190px; height: 190px; background: radial-gradient(circle at 30% 30%, #fff, var(--holy)); border-radius: 50%; border: 8px solid rgba(255,255,255,0.3); font-size: 90px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 60px rgba(255,207,64,0.5); transition: transform 0.05s; touch-action: manipulation; }
        #halo:active { transform: scale(0.92); }

        .pop { position: absolute; font-size: 38px; font-weight: 900; color: white; pointer-events: none; animation: fly 0.7s ease-out forwards; z-index: 20; }
        @keyframes fly { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-180px) scale(1.3); opacity: 0; } }

        #footer { background: rgba(28, 28, 30, 0.8); backdrop-filter: blur(20px); padding: 20px 15px calc(25px + env(safe-area-inset-bottom)); border-radius: 35px 35px 0 0; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; border-top: 1px solid rgba(255,255,255,0.1); }
        .btn { height: 56px; border: none; border-radius: 18px; font-weight: 700; color: white; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; }
        .btn span { font-size: 10px; opacity: 0.7; font-weight: 400; margin-top: 2px; }
        
        #btn-upd { background: var(--glass); border: 1px solid var(--blue); color: var(--blue); }
        #btn-case { background: var(--glass); border: 1px solid var(--purple); color: var(--purple); }
        #btn-friends { background: var(--glass); border: 1px solid var(--orange); color: var(--orange); }
        #btn-top { background: var(--glass); border: 1px solid #fff; color: #fff; }
        #btn-gift { background: #1c1c1e; border: 1px solid #333; color: var(--orange); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 4000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { width: 100%; max-width: 340px; background: #1c1c1e; border-radius: 30px; padding: 25px; border: 1px solid #333; text-align: center; }

        /* НОВОЕ КРУГЛОЕ КОЛЕСО */
        #wheel-container { position: relative; width: 250px; height: 250px; margin: 20px auto; }
        #wheel-canvas { width: 100%; height: 100%; border-radius: 50%; border: 5px solid var(--holy); transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); }
        #wheel-arrow { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid var(--red); z-index: 100; filter: drop-shadow(0 0 5px black); }

        .row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #333; font-size: 16px; }
        .row b { color: var(--holy); margin-left: 10px; }
    </style>
</head>
<body onclick="startAudio()">

    <audio id="bg-music" loop><source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_7326e6328a.mp3" type="audio/mpeg"></audio>

    <div id="main-menu">
        <h1 style="color:var(--holy); margin-bottom: 30px; text-shadow: 0 0 20px var(--holy);">HOLY TAP</h1>
        <button class="menu-btn btn-play" onclick="closeMenu()">ИГРАТЬ</button>
        <button id="menu-bless" class="menu-btn" onclick="applyBlessing()">БЛАГОСЛОВЕНИЕ</button>
        <button class="menu-btn" onclick="openWheelMenu()">🎡 КОЛЕСО ФОРТУНЫ <br><span style="font-size:10px; opacity:0.6;">(1000 очков)</span></button>
    </div>

    <div id="header">
        <div id="score">0</div>
        <div id="stats">Сила молитвы: <b id="val-pwr">+1</b></div>
    </div>

    <div id="game-area">
        <button id="btn-to-menu" onclick="openMenu()">ВЫЙТИ В МЕНЮ</button>
        <div id="halo">😇</div>
    </div>

    <div id="footer">
        <button id="btn-upd" class="btn">⚡ УЛУЧШИТЬ<span id="cost-upd">50</span></button>
        <button id="btn-case" class="btn">💎 КЕЙС<span id="cost-case">900</span></button>
        <button id="btn-friends" class="btn">👥 ДРУЗЬЯ</button>
        <button id="btn-top" class="btn">🏆 РЕЙТИНГ</button>
        <button id="btn-gift" class="btn">🎁 ПОЛУЧИТЬ ПОДАРОК</button>
        <button id="btn-sets" class="btn">⚙️</button>
    </div>

    <div id="modal-wheel" class="modal">
        <div class="modal-box">
            <h2 id="wheel-status" style="color:var(--holy); margin:0;">КРУТИ!</h2>
            <div id="wheel-container">
                <div id="wheel-arrow"></div>
                <canvas id="wheel-canvas" width="500" height="500"></canvas>
            </div>
            <button id="btn-spin-action" onclick="startSpin()" class="btn" style="width:100%; background:var(--holy); color:black; font-weight:900;">КРУТИТЬ</button>
            <button id="btn-close-wheel" onclick="closeModal('modal-wheel')" class="btn" style="width:100%; background:transparent; margin-top:10px;">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div id="modal-top" class="modal"><div class="modal-box"><h2>🏆 Топ Пилотов</h2><div id="top-list"></div><button onclick="closeModal('modal-top')" class="btn" style="width:100%; background:var(--gray);">ЗАКРЫТЬ</button></div></div>
    
    <div id="modal-friends" class="modal">
        <div class="modal-box">
            <h1>👥</h1>
            <h2>Друзья</h2>
            <p style="color:#aaa; font-size:14px;">Поделись ссылкой и получи бонус!</p>
            <button onclick="shareLink()" class="btn" style="width:100%; background:var(--orange);">ОТПРАВИТЬ ССЫЛКУ</button>
            <button onclick="closeModal('modal-friends')" class="btn" style="width:100%; background:transparent; margin-top:10px;">ЗАКРЫТЬ</button>
        </div>
    </div>

    <script>
        const db = firebase.initializeApp({ apiKey: "AIzaSyAhFyYz8tC0VZqNKQweM1VH7A9rzcLQ7L4", authDomain: "rockettap-22e98.firebaseapp.com", databaseURL: "https://rockettap-22e98-default-rtdb.firebaseio.com", projectId: "rockettap-22e98", storageBucket: "rockettap-22e98.firebasestorage.app", messagingSenderId: "800263373343", appId: "1:800263373343:web:ed6db2e822f61d8257cb2a" }).database();
        const tg = window.Telegram.WebApp;
        tg.expand();

        let score = Number(localStorage.getItem('rk_sc')) || 0;
        let pwr = Number(localStorage.getItem('rk_pw')) || 1;
        let cost = Number(localStorage.getItem('rk_ct')) || 50;
        let lastGift = localStorage.getItem('rk_gift') || "";
        let lastBless = localStorage.getItem('rk_bless') || "";
        let audioStarted = false;
        const uid = tg.initDataUnsafe?.user?.id || "player_local";

        const prizes = [100, 500, 50, 2000, 100, 5000, 50, 1000];
        const colors = ["#ffcf40", "#ff9f0a", "#2c2c2e", "#bf5af2", "#ffcf40", "#ff453a", "#2c2c2e", "#0a84ff"];

        function save() {
            localStorage.setItem('rk_sc', score); localStorage.setItem('rk_pw', pwr);
            localStorage.setItem('rk_ct', cost); localStorage.setItem('rk_gift', lastGift); localStorage.setItem('rk_bless', lastBless);
            db.ref('leaderboard/' + uid).update({ name: tg.initDataUnsafe?.user?.first_name || "Пилот", score: Math.floor(score) });
            updateUI();
        }

        function updateUI() {
            document.getElementById('score').innerText = Math.floor(score).toLocaleString('ru-RU');
            document.getElementById('val-pwr').innerText = "+" + pwr;
            document.getElementById('cost-upd').innerText = cost;
            document.getElementById('btn-upd').disabled = score < cost;
            document.getElementById('btn-case').disabled = score < 900;
            const today = new Date().toDateString();
            document.getElementById('btn-gift').innerText = (lastGift === today) ? "ВЗЯТО ✅" : "🎁 ПОЛУЧИТЬ ПОДАРОК";
            document.getElementById('btn-gift').disabled = (lastGift === today);
            document.getElementById('menu-bless').disabled = (lastBless === today);
        }

        function openMenu() { document.getElementById('main-menu').style.display = 'flex'; }
        function closeMenu() { document.getElementById('main-menu').style.display = 'none'; }

        function applyBlessing() {
            const today = new Date().toDateString();
            if(lastBless !== today) {
                score += 5000;
                lastBless = today;
                save();
                tg.showAlert("Благословение получено: +5,000!");
            }
        }

        // КОЛЕСО ФОРТУНЫ (РИСОВАНИЕ)
        function drawWheel() {
            const canvas = document.getElementById('wheel-canvas');
            const ctx = canvas.getContext('2d');
            const arc = Math.PI / (prizes.length / 2);
            ctx.clearRect(0,0,500,500);
            for(let i=0; i<prizes.length; i++) {
                ctx.beginPath(); ctx.fillStyle = colors[i];
                ctx.moveTo(250, 250); ctx.arc(250, 250, 250, i*arc, (i+1)*arc); ctx.fill();
                ctx.save(); ctx.fillStyle = "white"; ctx.translate(250, 250); ctx.rotate(i*arc + arc/2);
                ctx.font = "bold 40px sans-serif"; ctx.fillText(prizes[i], 120, 15); ctx.restore();
            }
        }

        function openWheelMenu() {
            if(score < 1000) { tg.showAlert("Нужно 1000 очков!"); return; }
            score -= 1000; save(); closeMenu();
            document.getElementById('modal-wheel').style.display = 'flex';
            drawWheel();
        }

        function startSpin() {
            const wheel = document.getElementById('wheel-canvas');
            const btn = document.getElementById('btn-spin-action');
            btn.disabled = true;
            const randomDeg = Math.floor(Math.random() * 360) + 3600;
            wheel.style.transform = `rotate(${randomDeg}px)`; // Визуально крутим
            wheel.style.transform = `rotate(${randomDeg}deg)`;
            
            setTimeout(() => {
                const actualDeg = randomDeg % 360;
                const prizeIndex = Math.floor((360 - actualDeg) / (360 / prizes.length)) % prizes.length;
                const win = prizes[prizeIndex];
                score += win;
                document.getElementById('wheel-status').innerText = `ВЫИГРЫШ: ${win}!`;
                tg.HapticFeedback.notificationOccurred('success');
                save();
                btn.innerText = "ГОТОВО";
            }, 4000);
        }

        // КЛИКЕР
        document.getElementById('halo').addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            score += pwr;
            const p = document.createElement('div'); p.className = 'pop'; p.innerText = `+${pwr}`;
            p.style.left = (e.touches[0].clientX - 20) + 'px'; p.style.top = (e.touches[0].clientY - 20) + 'px';
            document.body.appendChild(p); setTimeout(() => p.remove(), 700);
            tg.HapticFeedback.impactOccurred('light'); save();
        });

        document.getElementById('btn-upd').onclick = () => { if(score >= cost) { score -= cost; pwr++; cost = Math.round(cost * 1.6); save(); } };
        
        document.getElementById('btn-case').onclick = () => {
            if(score >= 900) {
                score -= 900; 
                let win = Math.random() > 0.8 ? 5000 : 500;
                score += win; save();
                tg.showAlert(`Кейс открыт! Выигрыш: ${win}`);
            }
        };

        document.getElementById('btn-gift').onclick = () => {
            const today = new Date().toDateString();
            if(lastGift !== today) { score += 2500; lastGift = today; save(); }
        };

        document.getElementById('btn-top').onclick = () => {
            document.getElementById('modal-top').style.display = 'flex';
            db.ref('leaderboard').orderByChild('score').limitToLast(10).once('value').then(snap => {
                const list = document.getElementById('top-list'); list.innerHTML = "";
                let ps = []; snap.forEach(c => ps.push(c.val()));
                ps.reverse().forEach((p, i) => {
                    list.innerHTML += `<div class="row"><span>${i+1}. ${p.name}</span><b>${p.score.toLocaleString()}</b></div>`;
                });
            });
        };

        document.getElementById('btn-friends').onclick = () => document.getElementById('modal-friends').style.display = 'flex';
        function shareLink() { tg.openTelegramLink(`https://t.me/share/url?url=https://t.me/YourBot&text=Стань святым таппером!`); }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function startAudio() { if(!audioStarted) { document.getElementById('bg-music').play().then(()=>audioStarted=true); } }
        
        updateUI();
    </script>
</body>
</html>
