<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Rocket Tap</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #0d0d0d;
            color: white;
            font-family: sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Распределяем элементы: верх, центр, низ */
            align-items: center;
            overflow: hidden;
            user-select: none;
        }
        #header { margin-top: 20px; text-align: center; }
        #score { font-size: 3.5rem; font-weight: bold; color: #ff9f00; margin: 0; }
        
        #coin-section { flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        #coin {
            width: 200px; height: 200px; background: orange;
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 80px;
            box-shadow: 0 0 30px rgba(255, 165, 0, 0.5);
            cursor: pointer; transition: transform 0.1s;
        }
        #coin:active { transform: scale(0.9); }

        #shop-section {
            width: 100%;
            padding: 20px;
            background: #1a1a1a;
            border-top: 2px solid #333;
            box-sizing: border-box;
            margin-bottom: 10px; /* Чтобы не прилипало к краю в ТГ */
        }
        .upgrade-btn {
            width: 100%;
            padding: 15px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
        }
        .upgrade-btn:disabled { background: #444; color: #888; }

        .tap-effect {
            position: absolute; color: white; font-weight: bold;
            font-size: 24px; pointer-events: none;
            animation: moveUp 0.8s forwards;
        }
        @keyframes moveUp { to { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>

    <div id="header">
        <div id="score">0</div>
        <div id="stats">Сила клика: <span id="pwr">1</span></div>
    </div>
    
    <div id="coin-section">
        <div id="coin">🚀</div>
    </div>

    <div id="shop-section">
        <button id="upgrade-btn" class="upgrade-btn">Загрузка...</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let score = Number(localStorage.getItem('score')) || 0;
        let pwr = Number(localStorage.getItem('pwr')) || 1;
        let cost = Number(localStorage.getItem('cost')) || 50;

        const scoreEl = document.getElementById('score');
        const pwrEl = document.getElementById('pwr');
        const btn = document.getElementById('upgrade-btn');
        const coin = document.getElementById('coin');

        function update() {
            scoreEl.innerText = Math.floor(score);
            pwrEl.innerText = pwr;
            btn.innerText = `Улучшить клик (Цена: ${cost})`;
            btn.disabled = score < cost;
            localStorage.setItem('score', score);
            localStorage.setItem('pwr', pwr);
            localStorage.setItem('cost', cost);
        }

        coin.onclick = (e) => {
            score += pwr;
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            
            const effect = document.createElement('div');
            effect.className = 'tap-effect';
            effect.innerText = '+' + pwr;
            effect.style.left = e.clientX + 'px';
            effect.style.top = e.clientY + 'px';
            document.body.appendChild(effect);
            setTimeout(() => effect.remove(), 800);
            
            update();
        };

        btn.onclick = () => {
            if (score >= cost) {
                score -= cost;
                pwr += 1;
                cost = Math.floor(cost * 1.5);
                update();
            }
        };

        update();
    </script>
</body>
</html>
