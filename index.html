<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --bg: #0b0b0d; --orange: #ff9f0a; --blue: #0a84ff; --purple: #bf5af2; --gray: #2c2c2e; --red: #ff453a; --glass: rgba(255, 255, 255, 0.08); }
        body { background: var(--bg); color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; -webkit-user-select: none; }

        /* МЕНЮ */
        #main-menu { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; background-image: radial-gradient(circle at center, #1c1c1e 0%, #000 100%); }
        .menu-logo { font-size: 100px; margin-bottom: 20px; filter: drop-shadow(0 0 20px var(--orange)); }

        /* ИГРА */
        #game-ui { display: none; height: 100vh; flex-direction: column; }
        #header { padding-top: env(safe-area-inset-top); height: 120px; text-align: center; display: flex; flex-direction: column; justify-content: center; background: linear-gradient(to bottom, rgba(255,159,10,0.1), transparent); }
        #score { font-size: 54px; font-weight: 900; color: var(--orange); text-shadow: 0 0 30px rgba(255,159,10,0.4); }
        #rank-label { font-size: 14px; color: var(--blue); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; }

        #game-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        #rocket { width: 190px; height: 190px; background: radial-gradient(circle at 30% 30%, #ffcc00, #ff9f0a); border-radius: 50%; border: 8px solid rgba(255,255,255,0.2); font-size: 85px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 60px rgba(255,159,10,0.3); transition: transform 0.05s; touch-action: manipulation; }
        #rocket:active { transform: scale(0.92); }

        /* КЕЙС (ЛЕНТА) */
        #roll-wrap { width: 100%; height: 100px; border: 1px solid #333; margin: 20px 0; overflow: hidden; position: relative; background: #000; border-radius: 15px; }
        #roll-track { display: flex; position: absolute; left: 0; height: 100%; }
        .item { min-width: 100px; width: 100px; height: 100%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 24px; border-right: 1px solid #111; }
        #hitbox { position: absolute; left: 50%; top: 0; bottom: 0; width: 3px; background: var(--red); transform: translateX(-50%); z-index: 50; box-shadow: 0 0 10px var(--red); }

        /* КОЛЕСО */
        #wheel-wrapper { position: relative; width: 280px; height: 280px; margin-bottom: 30px; }
        #wheel-container { width: 100%; height: 100%; border-radius: 50%; border: 5px solid #333; transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); overflow: hidden; }
        .wheel-line { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 4px; height: 40px; background: var(--red); z-index: 100; box-shadow: 0 0 10px var(--red); }

        #footer { background: rgba(28, 28, 30, 0.8); backdrop-filter: blur(20px); padding: 20px 15px calc(25px + env(safe-area-inset-bottom)); border-radius: 35px 35px 0 0; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; border-top: 1px solid rgba(255,255,255,0.1); }
        .btn { height: 56px; border: none; border-radius: 18px; font-weight: 700; font-size: 13px; color: white; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: transform 0.1s; background: var(--glass); }
        .btn:active { transform: scale(0.95); }
        .btn-big { width: 240px; height: 60px; font-size: 18px; background: var(--orange); color: black; margin-bottom: 15px; border-radius: 20px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 3000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { width: 100%; max-width: 340px; background: #1c1c1e; border-radius: 30px; padding: 25px; border: 1px solid #333; text-align: center; }
        
        .pop { position: absolute; font-size: 38px; font-weight: 900; color: white; pointer-events: none; animation: fly 0.6s ease-out forwards; z-index: 100; }
        @keyframes fly { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-150px); opacity: 0; } }
        .row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #2c2c2e; }
    </style>
</head>
<body onclick="startAudio()">

    <audio id="bg-music" loop><source src="https://www.bensound.com/bensound-music/bensound-slowmotion.mp3" type="audio/mpeg"></audio>

    <div id="main-menu">
        <div class="menu-logo">🚀</div>
        <h1 style="margin-bottom: 40px; letter-spacing: 2px;">ROCKET TAP</h1>
        <button class="btn btn-big" onclick="startGame()">ИГРАТЬ</button>
        <button class="btn btn-big" style="background:var(--purple); color:white" onclick="openModal('modal-wheel')">🎡 КОЛЕСО</button>
        <button class="btn btn-big" style="background:var(--gray); color:white" onclick="openModal('modal-top')">🏆 РЕЙТИНГ</button>
    </div>

    <div id="game-ui">
        <div id="header">
            <div id="score">0</div>
            <div id="rank-label">КАДЕТ</div>
        </div>

        <div id="game-area">
            <div id="rocket" onpointerdown="handleTap(event)">🚀</div>
        </div>

        <div id="footer">
            <button class="btn" onclick="openModal('modal-upd')" style="color:var(--blue)">⚡ УЛУЧШИТЬ<br><span id="cost-upd" style="font-size:10px; opacity:0.6">50</span></button>
            <button class="btn" onclick="openModal('modal-case')" style="color:var(--purple)">💎 КЕЙС<br><span style="font-size:10px; opacity:0.6">900</span></button>
            <button class="btn" onclick="location.reload()">🏠 МЕНЮ</button>
        </div>
    </div>

    <div id="modal-wheel" class="modal">
        <div id="wheel-wrapper">
            <div class="wheel-line"></div>
            <div id="wheel-container"><canvas id="wheel-canvas" width="280" height="280"></canvas></div>
        </div>
        <button id="spin-btn" class="btn btn-big" onclick="spinWheel()">КРУТИТЬ</button>
        <button class="btn" style="width:240px" onclick="closeModal('modal-wheel')">НАЗАД</button>
    </div>

    <div id="modal-case" class="modal">
        <div class="modal-box">
            <h2 id="case-title" style="color:var(--purple); margin-top:0;">КЕЙС УДАЧИ</h2>
            <div id="roll-wrap">
                <div id="hitbox"></div>
                <div id="roll-track"></div>
            </div>
            <button id="btn-claim" class="btn" style="display:none; width:100%; background:var(--blue); margin-bottom:10px">ЗАБРАТЬ</button>
            <button id="btn-open-case" class="btn" style="width:100%; background:var(--purple)" onclick="openCase()">ОТКРЫТЬ (900)</button>
            <button class="btn" style="width:100%; margin-top:10px; background:transparent" onclick="closeModal('modal-case')">ВЫЙТИ</button>
        </div>
    </div>

    <div id="modal-top" class="modal">
        <div class="modal-box">
            <h2>🏆 ТОП ПИЛОТОВ</h2>
            <div id="top-list" style="max-height: 300px; overflow-y: auto; margin-bottom: 20px;"></div>
            <button class="btn" style="width:100%" onclick="closeModal('modal-top')">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div id="modal-upd" class="modal">
        <div class="modal-box">
            <h2>⚡ УЛУЧШЕНИЕ</h2>
            <p>Хотите увеличить силу тапа на +1?</p>
            <button class="btn btn-big" style="width:100%" onclick="buyUpgrade()">КУПИТЬ</button>
            <button class="btn" style="width:100%; margin-top:10px" onclick="closeModal('modal-upd')">ОТМЕНА</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAhFyYz8tC0VZqNKQweM1VH7A9rzcLQ7L4", authDomain: "rockettap-22e98.firebaseapp.com", databaseURL: "https://rockettap-22e98-default-rtdb.firebaseio.com", projectId: "rockettap-22e98", storageBucket: "rockettap-22e98.firebasestorage.app", messagingSenderId: "800263373343", appId: "1:800263373343:web:ed6db2e822f61d8257cb2a" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const tg = window.Telegram.WebApp;
        tg.expand();

        let score = Number(localStorage.getItem('rk_sc')) || 0;
        let pwr = Number(localStorage.getItem('rk_pw')) || 1;
        let cost = Number(localStorage.getItem('rk_ct')) || 50;
        let lastWheel = Number(localStorage.getItem('rk_lw')) || 0;
        let audioStarted = false;

        const uid = tg.initDataUnsafe?.user?.id || "local_user";

        function startGame() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('game-ui').style.display = 'flex';
            updateUI();
        }

        function updateUI() {
            document.getElementById('score').innerText = Math.floor(score).toLocaleString('ru-RU');
            document.getElementById('cost-upd').innerText = cost;
            
            let rank = "КАДЕТ";
            if(score > 10000) rank = "ПИЛОТ";
            if(score > 50000) rank = "КАПИТАН";
            if(score > 200000) rank = "ЛЕГЕНДА";
            document.getElementById('rank-label').innerText = rank;

            localStorage.setItem('rk_sc', score);
            localStorage.setItem('rk_pw', pwr);
            localStorage.setItem('rk_ct', cost);
            
            db.ref('leaderboard/' + uid).update({ 
                name: tg.initDataUnsafe?.user?.first_name || "Пилот", 
                score: Math.floor(score) 
            });
        }

        function handleTap(e) {
            score += pwr;
            const x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            
            const p = document.createElement('div');
            p.className = 'pop'; p.innerText = `+${pwr}`;
            p.style.left = (x - 20) + 'px'; p.style.top = (y - 50) + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 600);
            
            tg.HapticFeedback.impactOccurred('medium');
            updateUI();
        }

        function buyUpgrade() {
            if(score >= cost) {
                score -= cost; pwr++; cost = Math.round(cost * 1.8);
                updateUI(); closeModal('modal-upd');
            } else { tg.showAlert("Мало монет!"); }
        }

        // КЕЙСЫ С НОВЫМИ ШАНСАМИ
        function getWinAmount() {
            const r = Math.random() * 100;
            if (r < 5) return Math.random() > 0.5 ? 10000 : 5000; // 5% шанс
            if (r < 35) return Math.random() > 0.5 ? 1000 : 500;   // 30% шанс (5+30=35)
            return Math.random() > 0.5 ? 100 : 50;                // 65% шанс
        }

        function openCase() {
            if(score < 900) { tg.showAlert("Нужно 900 монет!"); return; }
            score -= 900; updateUI();
            
            const track = document.getElementById('roll-track');
            const btnOpen = document.getElementById('btn-open-case');
            btnOpen.style.display = 'none';
            document.getElementById('btn-claim').style.display = 'none';
            
            track.style.transition = 'none';
            track.style.transform = 'translateX(0)';
            track.innerHTML = '';
            
            const winIdx = 35;
            const winVal = getWinAmount();
            
            for(let i = 0; i < 45; i++) {
                let v = (i === winIdx) ? winVal : (Math.random() > 0.7 ? 500 : 50);
                track.innerHTML += `<div class="item">${v}</div>`;
            }

            setTimeout(() => {
                track.style.transition = 'transform 4s cubic-bezier(0.1, 0, 0.1, 1)';
                track.style.transform = `translateX(-${(winIdx * 100) - 120}px)`;
                setTimeout(() => {
                    score += winVal; updateUI();
                    document.getElementById('case-title').innerText = `ВЫИГРЫШ: ${winVal}`;
                    document.getElementById('btn-claim').style.display = 'block';
                    btnOpen.style.display = 'block';
                    btnOpen.innerText = "ОТКРЫТЬ ЕЩЕ (900)";
                }, 4100);
            }, 50);
        }

        // КОЛЕСО ФОРТУНЫ
        const canvas = document.getElementById('wheel-canvas');
        const ctx = canvas.getContext('2d');
        const sectors = [
            {v: "100", c: "#ff9f0a"}, {v: "1000", c: "#0a84ff"},
            {v: "0", c: "#2c2c2e"}, {v: "5000", c: "#bf5af2"},
            {v: "50", c: "#32d74b"}, {v: "15000", c: "#ffd60a"}
        ];
        const arc = (Math.PI * 2) / sectors.length;

        function drawWheel() {
            sectors.forEach((s, i) => {
                ctx.beginPath(); ctx.fillStyle = s.c; ctx.moveTo(140, 140);
                ctx.arc(140, 140, 140, i * arc, (i + 1) * arc); ctx.fill();
                ctx.save(); ctx.translate(140, 140); ctx.rotate(i * arc + arc/2);
                ctx.fillStyle = "white"; ctx.font = "bold 16px Arial"; ctx.fillText(s.v, 75, 5); ctx.restore();
            });
        }
        drawWheel();

        function spinWheel() {
            const now = Date.now();
            if(now - lastWheel < 3600000) { tg.showAlert("Можно крутить раз в час!"); return; }
            
            const deg = Math.floor(3000 + Math.random() * 3000);
            document.getElementById('wheel-container').style.transform = `rotate(${deg}deg)`;
            
            setTimeout(() => {
                const actualDeg = deg % 360;
                const idx = sectors.length - 1 - Math.floor(actualDeg / (360 / sectors.length));
                const win = parseInt(sectors[idx].v);
                score += win; lastWheel = Date.now();
                localStorage.setItem('rk_lw', lastWheel);
                tg.showAlert(`Выпало: ${win}!`);
                updateUI();
            }, 4000);
        }

        function loadTop() {
            const list = document.getElementById('top-list');
            list.innerHTML = "Загрузка...";
            db.ref('leaderboard').orderByChild('score').limitToLast(10).once('value').then(snap => {
                list.innerHTML = "";
                let arr = []; snap.forEach(d => { arr.push(d.val()); });
                arr.reverse().forEach((p, i) => {
                    list.innerHTML += `<div class="row"><span>${i+1}. ${p.name}</span><b>${p.score}</b></div>`;
                });
            });
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; if(id === 'modal-top') loadTop(); }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        document.getElementById('btn-claim').onclick = () => { document.getElementById('case-title').innerText = "КЕЙС УДАЧИ"; closeModal('modal-case'); };
        function startAudio() { if(!audioStarted) { document.getElementById('bg-music').play().then(()=>audioStarted=true).catch(()=>{}); } }
    </script>
</body>
</html>
