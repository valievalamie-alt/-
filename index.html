<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --bg: #000; --orange: #ff9f00; --blue: #007aff; --purple: #8e44ad; --gray: #2c2c2e; --disabled: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        #header { padding-top: env(safe-area-inset-top); height: 110px; text-align: center; display: flex; flex-direction: column; justify-content: center; }
        #score { font-size: 52px; font-weight: 900; color: var(--orange); line-height: 1; }
        #stats-bar { display: flex; justify-content: center; gap: 20px; margin-top: 8px; font-size: 13px; color: #888; }

        #game { flex-grow: 1; position: relative; display: flex; align-items: center; justify-content: center; touch-action: manipulation; }
        #coin { width: 180px; height: 180px; background: radial-gradient(circle, #ffb300, #ff8c00); border-radius: 50%; border: 5px solid #fff; font-size: 70px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 30px rgba(255,159,0,0.4); z-index: 10; transition: transform 0.05s; -webkit-tap-highlight-color: transparent; }
        #coin:active { transform: scale(0.92); }

        .pop-num { position: absolute; font-size: 28px; font-weight: 900; color: #fff; pointer-events: none; animation: floatUp 0.7s ease-out forwards; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-120px); opacity: 0; } }

        #menu { background: #1c1c1e; padding: 15px 15px calc(20px + env(safe-area-inset-bottom)); border-radius: 28px 28px 0 0; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { height: 50px; border: none; border-radius: 14px; font-weight: bold; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; -webkit-tap-highlight-color: transparent; text-decoration: none; }
        
        #upd-btn { background: var(--blue); }
        #case-btn { background: var(--purple); }
        #daily-btn { background: #fff; color: #000; }
        #top-btn { background: var(--gray); }
        #settings-btn { background: #3a3a3c; grid-column: span 2; margin-top: 5px; }

        .btn.locked { background: var(--disabled) !important; color: #444 !important; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; }
        .modal-content { width: 88%; background: #1c1c1e; border-radius: 24px; padding: 25px; box-sizing: border-box; text-align: center; }
        
        #roulette-container { width: 100%; height: 80px; border: 1px solid #333; position: relative; overflow: hidden; background: #000; margin: 15px 0; border-radius: 8px; }
        #roulette-track { display: flex; position: absolute; left: 0; top: 0; height: 100%; }
        .case-item { min-width: 70px; height: 100%; display: flex; align-items: center; justify-content: center; font-weight: bold; border-right: 1px solid #111; font-size: 18px; }
        #roulette-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: red; z-index: 5; }

        #top-list { width: 100%; max-height: 40vh; overflow-y: auto; margin: 15px 0; }
        .row { display: flex; justify-content: space-between; padding: 12px 8px; border-bottom: 1px solid #2c2c2e; font-size: 14px; }
    </style>
</head>
<body>

    <audio id="bg-audio" loop preload="auto">
        <source src="https://www.bensound.com/bensound-music/bensound-slowmotion.mp3" type="audio/mpeg">
    </audio>

    <div id="header">
        <div id="score">0</div>
        <div id="stats-bar">
            <span>Сила: <b id="pwr-val">+1</b></span>
            <span>Серия: <b id="streak-val">0</b></span>
        </div>
    </div>

    <div id="game"><div id="coin">🚀</div></div>

    <div id="menu">
        <button id="upd-btn" class="btn">Улучшить</button>
        <button id="case-btn" class="btn">Кейс (350)</button>
        <button id="daily-btn" class="btn">🎁 Подарок</button>
        <button id="top-btn" class="btn">Лидерборд</button>
        <button id="settings-btn" class="btn">⚙️ НАСТРОЙКИ</button>
    </div>

    <div id="case-modal" class="modal">
        <div class="modal-content">
            <h3 id="case-status">Удачи!</h3>
            <div id="roulette-container">
                <div id="roulette-line"></div>
                <div id="roulette-track"></div>
            </div>
            <button id="close-case" class="btn" style="display:none; background:var(--blue); width:100%;">ЗАБРАТЬ</button>
        </div>
    </div>

    <div id="top-modal" class="modal">
        <div class="modal-content">
            <h2>Топ Игроков</h2>
            <div id="top-list">Загрузка...</div>
            <button onclick="document.getElementById('top-modal').style.display='none'" class="btn" style="background:#444; width:100%;">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h2>Настройки</h2>
            <div style="display:flex; justify-content:space-between; align-items:center; padding:15px 0; border-bottom:1px solid #333;">
                <span>Музыка</span>
                <button id="toggle-music" class="btn" style="width:120px; height:38px; background:var(--blue);">ВКЛЮЧЕНО</button>
            </div>
            <p style="font-size:10px; color:#555; margin-top:15px;">Версия: 1.6.0 (Ultimate)</p>
            <button onclick="document.getElementById('settings-modal').style.display='none'" class="btn" style="background:#444; width:100%;">ЗАКРЫТЬ</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAhFyYz8tC0VZqNKQweM1VH7A9rzcLQ7L4",
            authDomain: "rockettap-22e98.firebaseapp.com",
            databaseURL: "https://rockettap-22e98-default-rtdb.firebaseio.com",
            projectId: "rockettap-22e98",
            storageBucket: "rockettap-22e98.firebasestorage.app",
            messagingSenderId: "800263373343",
            appId: "1:800263373343:web:ed6db2e822f61d8257cb2a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const tg = window.Telegram.WebApp;
        tg.expand();

        let score = Number(localStorage.getItem('sc_v16')) || 0;
        let pwr = Number(localStorage.getItem('pw_v16')) || 1;
        let cost = Number(localStorage.getItem('ct_v16')) || 50;
        let streak = Number(localStorage.getItem('str_v16')) || 0;
        let lastDate = localStorage.getItem('ld_v16') || "";
        
        const audio = document.getElementById('bg-audio');
        let isMusicPlaying = false; 
        let audioUnlocked = false;

        function refresh() {
            document.getElementById('score').innerText = Math.floor(score).toLocaleString();
            document.getElementById('pwr-val').innerText = "+" + pwr;
            document.getElementById('streak-val').innerText = streak;
            document.getElementById('upd-btn').innerText = `Up (${cost})`;
            
            document.getElementById('upd-btn').className = score < cost ? "btn locked" : "btn";
            document.getElementById('case-btn').className = score < 350 ? "btn locked" : "btn";

            localStorage.setItem('sc_v16', score);
            localStorage.setItem('pw_v16', pwr);
            localStorage.setItem('ct_v16', cost);
            localStorage.setItem('str_v16', streak);
            localStorage.setItem('ld_v16', lastDate);
            
            const uid = tg.initDataUnsafe?.user?.id || "guest";
            const uname = tg.initDataUnsafe?.user?.first_name || "Пилот";
            db.ref('leaderboard/' + uid).set({ name: uname, score: Math.floor(score) });
        }

        // Первый тап — включаем всё
        document.getElementById('game').onclick = (e) => {
            if (!audioUnlocked) {
                audio.play().then(() => {
                    audioUnlocked = true;
                    isMusicPlaying = true;
                    document.getElementById('toggle-music').innerText = "ВКЛЮЧЕНО";
                    document.getElementById('toggle-music').style.background = "var(--blue)";
                }).catch(err => console.log("Audio waiting..."));
            }
            score += pwr;
            const pop = document.createElement('div');
            pop.className = 'pop-num';
            pop.innerText = `+${pwr}`;
            pop.style.left = e.clientX + 'px';
            pop.style.top = (e.clientY - 20) + 'px';
            document.body.appendChild(pop);
            setTimeout(() => pop.remove(), 600);
            tg.HapticFeedback.impactOccurred('light');
            refresh();
        };

        // Настройки музыки
        document.getElementById('toggle-music').onclick = function() {
            if(isMusicPlaying) {
                audio.pause();
                this.innerText = "ВЫКЛЮЧЕНО";
                this.style.background = "#ff3b30";
                isMusicPlaying = false;
            } else {
                audio.play();
                this.innerText = "ВКЛЮЧЕНО";
                this.style.background = "var(--blue)";
                isMusicPlaying = true;
            }
        };

        // КЕЙС
        const caseItems = [{v:50,c:'#888',p:70},{v:500,c:'cyan',p:20},{v:10000,c:'gold',p:10}];
        document.getElementById('case-btn').onclick = () => {
            if(score < 350) return;
            score -= 350; refresh();
            const modal = document.getElementById('case-modal');
            const track = document.getElementById('roulette-track');
            modal.style.display = 'flex';
            document.getElementById('close-case').style.display = 'none';
            document.getElementById('case-status').innerText = "Крутим...";
            track.style.transition = 'none'; track.style.transform = 'translateX(0)'; track.innerHTML = '';
            
            let pool = [];
            for(let i=0; i<40; i++) {
                let r = Math.random()*100, acc = 0, sel = caseItems[0];
                for(let it of caseItems) { acc += it.p; if(r <= acc) { sel = it; break; } }
                pool.push(sel);
                track.innerHTML += `<div class="case-item" style="color:${sel.c}">${sel.v}</div>`;
            }
            setTimeout(() => {
                track.style.transition = 'transform 3s cubic-bezier(0.1, 0, 0.1, 1)';
                track.style.transform = `translateX(-${(35 * 70) - 110}px)`;
            }, 50);
            setTimeout(() => {
                let win = pool[35].v; score += win; refresh();
                document.getElementById('case-status').innerText = "Выпало: " + win.toLocaleString();
                document.getElementById('close-case').style.display = 'block';
            }, 3200);
        };
        document.getElementById('close-case').onclick = () => document.getElementById('case-modal').style.display = 'none';

        // ТОП
        document.getElementById('top-btn').onclick = () => {
            const list = document.getElementById('top-list');
            list.innerHTML = "Загрузка...";
            document.getElementById('top-modal').style.display = 'flex';
            db.ref('leaderboard').orderByChild('score').limitToLast(10).once('value', (s) => {
                list.innerHTML = "";
                let arr = []; s.forEach(x => arr.push(x.val()));
                arr.reverse().forEach((p, i) => {
                    list.innerHTML += `<div class="row"><span>${i+1}. ${p.name}</span><b>${p.score.toLocaleString()}</b></div>`;
                });
            });
        };

        // ПОДАРОК
        document.getElementById('daily-btn').onclick = () => {
            const today = new Date().toLocaleDateString();
            if (lastDate === today) return;
            const yes = new Date(); yes.setDate(yes.getDate()-1);
            streak = (lastDate === yes.toLocaleDateString()) ? streak + 1 : 1;
            score += streak * 500; lastDate = today; refresh();
            tg.showAlert(`Подарок: +${streak * 500} тапов!`);
        };

        document.getElementById('settings-btn').onclick = () => document.getElementById('settings-modal').style.display = 'flex';
        document.getElementById('upd-btn').onclick = () => { if(score >= cost) { score -= cost; pwr++; cost = Math.round(cost * 1.7); refresh(); } };

        refresh();
    </script>
</body>
</html>
