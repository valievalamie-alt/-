<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --bg: #000; --orange: #ff9f00; --blue: #007aff; --purple: #af52de; --gray: #2c2c2e; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; -webkit-user-select: none; }

        #header { padding-top: env(safe-area-inset-top); height: 120px; text-align: center; display: flex; flex-direction: column; justify-content: center; }
        #score { font-size: 56px; font-weight: 900; color: var(--orange); }
        #stats { display: flex; justify-content: center; gap: 15px; font-size: 14px; color: #888; }

        #game-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        #rocket { width: 190px; height: 190px; background: radial-gradient(circle, #ffb300, #ff8c00); border-radius: 50%; border: 6px solid #fff; font-size: 80px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 40px rgba(255,159,0,0.5); transition: transform 0.05s; z-index: 5; }
        #rocket:active { transform: scale(0.9); }

        .pop { position: absolute; font-size: 32px; font-weight: 900; color: white; pointer-events: none; animation: fly 0.6s ease-out forwards; z-index: 10; }
        @keyframes fly { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-150px); opacity: 0; } }

        #footer { background: #1c1c1e; padding: 15px 15px calc(20px + env(safe-area-inset-bottom)); border-radius: 30px 30px 0 0; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn { height: 55px; border: none; border-radius: 16px; font-weight: bold; font-size: 14px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; text-decoration: none; }
        
        #btn-upd { background: var(--blue); }
        #btn-case { background: var(--purple); }
        #btn-gift { background: #fff; color: #000; }
        #btn-top { background: var(--gray); }
        #btn-sets { background: #3a3a3c; grid-column: span 2; margin-top: 5px; }
        .btn:disabled { opacity: 0.3; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { width: 100%; max-width: 400px; background: #1c1c1e; border-radius: 25px; padding: 25px; box-sizing: border-box; text-align: center; position: relative; }

        /* Улучшенная рулетка со стрелкой */
        #roll-wrap { width: 100%; height: 80px; border: 2px solid #333; margin: 25px 0; overflow: hidden; position: relative; background: #000; border-radius: 12px; }
        #roll-track { display: flex; position: absolute; left: 0; top: 0; height: 100%; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); }
        .item { min-width: 80px; height: 100%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; border-right: 1px solid #222; }
        
        /* СТРЕЛКА (Pointer) */
        #pointer { position: absolute; left: 50%; top: 0; bottom: 0; width: 4px; background: #ff3b30; transform: translateX(-50%); z-index: 10; box-shadow: 0 0 10px rgba(255,59,48,0.5); }
        #pointer::before { content: '▼'; position: absolute; top: -12px; left: -6px; color: #ff3b30; font-size: 16px; }
        #pointer::after { content: '▲'; position: absolute; bottom: -12px; left: -6px; color: #ff3b30; font-size: 16px; }

        #top-list { margin: 20px 0; max-height: 250px; overflow-y: auto; }
        .row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #333; font-size: 15px; }
    </style>
</head>
<body onclick="startAudio()">

    <audio id="music" loop preload="auto">
        <source src="https://www.bensound.com/bensound-music/bensound-slowmotion.mp3" type="audio/mpeg">
    </audio>

    <div id="header">
        <div id="score">0</div>
        <div id="stats">
            <span>Сила: <b id="val-pwr">1</b></span>
            <span>Серия: <b id="val-strk">0</b></span>
        </div>
    </div>

    <div id="game-area">
        <div id="rocket">🚀</div>
    </div>

    <div id="footer">
        <button id="btn-upd" class="btn">Улучшить (50)</button>
        <button id="btn-case" class="btn">Кейс (350)</button>
        <button id="btn-gift" class="btn">🎁 Подарок</button>
        <button id="btn-top" class="btn">🏆 ТОП</button>
        <button id="btn-sets" class="btn">⚙️ НАСТРОЙКИ</button>
    </div>

    <div id="modal-case" class="modal">
        <div class="modal-box">
            <h2 id="case-res" style="margin-bottom: 10px;">Открытие...</h2>
            <div id="roll-wrap">
                <div id="pointer"></div>
                <div id="roll-track"></div>
            </div>
            <button id="case-claim" class="btn" style="display:none; width:100%; background:var(--blue);">ЗАБРАТЬ ПРИЗ</button>
        </div>
    </div>

    <div id="modal-top" class="modal">
        <div class="modal-box">
            <h2>Лидерборд</h2>
            <div id="top-list">Загрузка...</div>
            <button onclick="closeModal('modal-top')" class="btn" style="width:100%; background:var(--gray);">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div id="modal-sets" class="modal">
        <div class="modal-box">
            <h2>Настройки</h2>
            <button id="toggle-audio" class="btn" style="width:100%; background:var(--blue); margin-top:15px;">МУЗЫКА: ВКЛ</button>
            <p style="color:#555; font-size:11px; margin-top:20px;">Версия 2.1.0 (Pointer Update)</p>
            <button onclick="closeModal('modal-sets')" class="btn" style="width:100%; background:var(--gray); margin-top:10px;">ЗАКРЫТЬ</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAhFyYz8tC0VZqNKQweM1VH7A9rzcLQ7L4",
            authDomain: "rockettap-22e98.firebaseapp.com",
            databaseURL: "https://rockettap-22e98-default-rtdb.firebaseio.com",
            projectId: "rockettap-22e98",
            storageBucket: "rockettap-22e98.firebasestorage.app",
            messagingSenderId: "800263373343",
            appId: "1:800263373343:web:ed6db2e822f61d8257cb2a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const tg = window.Telegram.WebApp;
        tg.expand();

        let score = Number(localStorage.getItem('sc_v21')) || 0;
        let pwr = Number(localStorage.getItem('pw_v21')) || 1;
        let cost = Number(localStorage.getItem('ct_v21')) || 50;
        let lastGift = localStorage.getItem('gd_v21') || "";
        
        const audio = document.getElementById('music');
        let audioOn = true;
        let audioStarted = false;

        function save() {
            localStorage.setItem('sc_v21', score);
            localStorage.setItem('pw_v21', pwr);
            localStorage.setItem('ct_v21', cost);
            localStorage.setItem('gd_v21', lastGift);
            
            const uid = tg.initDataUnsafe?.user?.id || "player_" + Math.floor(Math.random()*1000);
            const uname = tg.initDataUnsafe?.user?.first_name || "Пилот";
            db.ref('leaderboard/' + uid).set({ name: uname, score: Math.floor(score) });
            updateUI();
        }

        function updateUI() {
            document.getElementById('score').innerText = Math.floor(score).toLocaleString();
            document.getElementById('val-pwr').innerText = "+" + pwr;
            document.getElementById('btn-upd').innerText = `Улучшить (${cost})`;
            document.getElementById('btn-upd').disabled = score < cost;
            document.getElementById('btn-case').disabled = score < 350;
            
            const today = new Date().toLocaleDateString();
            document.getElementById('btn-gift').disabled = (lastGift === today);
            document.getElementById('btn-gift').innerText = (lastGift === today) ? "Взято ✅" : "🎁 Подарок";
        }

        function startAudio() {
            if(!audioStarted && audioOn) {
                audio.play().then(() => { audioStarted = true; }).catch(() => {});
            }
        }

        document.getElementById('rocket').onclick = (e) => {
            score += pwr;
            const p = document.createElement('div');
            p.className = 'pop'; p.innerText = `+${pwr}`;
            p.style.left = e.clientX + 'px'; p.style.top = e.clientY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 600);
            tg.HapticFeedback.impactOccurred('medium');
            save();
        };

        document.getElementById('btn-upd').onclick = () => {
            if(score >= cost) {
                score -= cost; pwr++; cost = Math.round(cost * 1.8);
                save();
            }
        };

        // КЕЙС ЛОГИКА
        document.getElementById('btn-case').onclick = () => {
            if(score < 350) return;
            score -= 350; save();
            const modal = document.getElementById('modal-case');
            const track = document.getElementById('roll-track');
            const claim = document.getElementById('case-claim');
            modal.style.display = 'flex';
            claim.style.display = 'none';
            document.getElementById('case-res').innerText = "Испытай удачу...";
            
            track.style.transition = 'none';
            track.style.transform = 'translateX(0)';
            track.innerHTML = '';
            
            let prizes = [];
            for(let i=0; i<50; i++) {
                let r = Math.random()*100;
                let val = r > 98 ? 15000 : (r > 80 ? 1000 : (r > 50 ? 500 : 50));
                prizes.push(val);
                let color = val >= 10000 ? 'gold' : (val >= 1000 ? '#af52de' : '#007aff');
                track.innerHTML += `<div class="item" style="color:${color}">${val}</div>`;
            }

            setTimeout(() => {
                track.style.transition = 'transform 4s cubic-bezier(0.15, 0, 0.15, 1)';
                // Центрируем на 45-м элементе (индекс 44)
                // Ширина айтема 80px. Центр контейнера 50%.
                const targetIdx = 44;
                const offset = (targetIdx * 80) - (document.getElementById('roll-wrap').offsetWidth / 2) + 40;
                track.style.transform = `translateX(-${offset}px)`;
            }, 50);

            setTimeout(() => {
                let win = prizes[44];
                score += win;
                document.getElementById('case-res').innerText = `ВЫИГРЫШ: ${win}!`;
                claim.style.display = 'block';
                save();
            }, 4100);
        };

        document.getElementById('btn-gift').onclick = () => {
            const today = new Date().toLocaleDateString();
            if(lastGift !== today) {
                score += 1500; lastGift = today;
                tg.showAlert("Вы получили бонус 1500 монет!");
                save();
            }
        };

        document.getElementById('btn-top').onclick = () => {
            document.getElementById('modal-top').style.display = 'flex';
            const list = document.getElementById('top-list');
            list.innerHTML = "Загрузка...";
            db.ref('leaderboard').orderByChild('score').limitToLast(15).once('value', (s) => {
                list.innerHTML = "";
                let arr = [];
                s.forEach(c => { arr.push(c.val()); });
                arr.reverse().forEach((p, i) => {
                    list.innerHTML += `<div class="row"><span>${i+1}. ${p.name}</span><b>${p.score.toLocaleString()}</b></div>`;
                });
            });
        };

        document.getElementById('btn-sets').onclick = () => document.getElementById('modal-sets').style.display = 'flex';
        document.getElementById('toggle-audio').onclick = function() {
            audioOn = !audioOn;
            if(!audioOn) audio.pause(); else audio.play();
            this.innerText = `МУЗЫКА: ${audioOn ? 'ВКЛ' : 'ВЫКЛ'}`;
            this.style.background = audioOn ? 'var(--blue)' : '#ff3b30';
        };

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        document.getElementById('case-claim').onclick = () => closeModal('modal-case');

        updateUI();
    </script>
</body>
</html>
