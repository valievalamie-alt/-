<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --bg: #0b0b0d; --orange: #ff9f0a; --holy: #ffcf40; --blue: #0a84ff; --purple: #bf5af2; --gray: #2c2c2e; --red: #ff453a; --glass: rgba(255, 255, 255, 0.08); }
        body { background: var(--bg); color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; -webkit-user-select: none; }

        /* МЕНЮ */
        #main-menu { position: fixed; inset: 0; background: radial-gradient(circle at center, #1c1c1e, #000); z-index: 3000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .menu-btn { width: 260px; height: 60px; margin: 12px; border-radius: 20px; border: 1px solid var(--holy); background: rgba(255,207,64,0.1); color: var(--holy); font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .menu-btn:disabled { opacity: 0.3; filter: grayscale(1); }

        #header { padding-top: env(safe-area-inset-top); height: 110px; text-align: center; z-index: 5; }
        #score { font-size: 54px; font-weight: 900; color: var(--holy); text-shadow: 0 0 30px rgba(255,207,64,0.4); }

        /* КЛИКЕР И ПЛАВНЫЕ ЦИФРЫ */
        #game-area { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        #halo { width: 190px; height: 190px; background: radial-gradient(circle at 30% 30%, #fff, var(--holy)); border-radius: 50%; font-size: 90px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 60px rgba(255,207,64,0.5); transition: transform 0.05s; z-index: 2; }
        #halo:active { transform: scale(0.92); }

        .pop { position: absolute; font-size: 38px; font-weight: 900; color: white; pointer-events: none; z-index: 10; animation: floatOut 0.8s ease-out forwards; }
        @keyframes floatOut {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-150px) scale(1.2); opacity: 0; }
        }

        /* КРУГЛОЕ КОЛЕСО ФОРТУНЫ */
        #wheel-container { position: relative; width: 280px; height: 280px; margin-bottom: 20px; border: 8px solid #333; border-radius: 50%; overflow: hidden; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); background: #222; }
        #wheel-pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid var(--red); z-index: 100; }
        .sector { position: absolute; width: 50%; height: 50%; transform-origin: 100% 100%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; }

        /* ОСТАЛЬНОЕ */
        #footer { background: rgba(28, 28, 30, 0.8); backdrop-filter: blur(20px); padding: 20px 15px calc(25px + env(safe-area-inset-bottom)); display: grid; grid-template-columns: 1fr 1fr; gap: 12px; border-radius: 35px 35px 0 0; }
        .btn { height: 56px; border-radius: 18px; border: none; font-weight: 700; color: white; cursor: pointer; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 4000; flex-direction: column; align-items: center; justify-content: center; }
        .modal-box { width: 90%; max-width: 360px; background: #1c1c1e; border-radius: 30px; padding: 25px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #333; }
        #top-list { max-height: 300px; overflow-y: auto; margin: 15px 0; }
    </style>
</head>
<body onclick="startAudio()">

    <div id="main-menu">
        <h1 style="color:var(--holy);">HOLY TAP</h1>
        <button class="menu-btn" style="background:var(--holy); color:black;" onclick="closeMenu()">ИГРАТЬ</button>
        <button id="menu-bless" class="menu-btn" onclick="applyBlessing()">БЛАГОСЛОВЕНИЕ (+5000)</button>
        <button id="menu-wheel-btn" class="menu-btn" onclick="openWheelModal()">КОЛЕСО ФОРТУНЫ (1000)</button>
    </div>

    <div id="header">
        <div id="score">0</div>
        <div id="stats">Сила молитвы: <b id="val-pwr">+1</b></div>
    </div>

    <div id="game-area">
        <button onclick="openMenu()" style="background:var(--glass); border:1px solid #444; color:white; padding:8px 15px; border-radius:10px; margin-bottom:20px;">МЕНЮ</button>
        <div id="halo">😇</div>
    </div>

    <div id="footer">
        <button id="btn-upd" class="btn" style="background:var(--glass); border:1px solid var(--blue); color:var(--blue);">⚡ УЛУЧШИТЬ <span id="cost-upd">50</span></button>
        <button id="btn-case" class="btn" onclick="openCase()" style="background:var(--glass); border:1px solid var(--purple); color:var(--purple);">💎 КЕЙС <span>900</span></button>
        <button onclick="openModal('modal-friends')" class="btn" style="background:var(--glass); border:1px solid var(--orange); color:var(--orange);">👥 ДРУЗЬЯ</button>
        <button id="btn-top" class="btn" style="background:var(--glass); border:1px solid #fff;">🏆 РЕЙТИНГ</button>
    </div>

    <div id="modal-wheel" class="modal">
        <div class="modal-box">
            <div id="wheel-pointer"></div>
            <div id="wheel-container"></div>
            <h2 id="wheel-res">КРУТИТЕ!</h2>
            <button id="wheel-spin-btn" class="menu-btn" style="width:100%; margin:10px 0;" onclick="spinWheel()">КРУТИТЬ (1000)</button>
            <button onclick="closeModal('modal-wheel')" class="btn" style="width:100%; background:var(--gray);">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div id="modal-top" class="modal">
        <div class="modal-box">
            <h2>🏆 Топ Святых</h2>
            <div id="top-list">Загрузка...</div>
            <button onclick="closeModal('modal-top')" class="btn" style="width:100%; background:var(--gray);">ЗАКРЫТЬ</button>
        </div>
    </div>

    <script>
        // Инициализация Firebase (твои ключи)
        const firebaseConfig = { apiKey: "AIzaSyAhFyYz8tC0VZqNKQweM1VH7A9rzcLQ7L4", authDomain: "rockettap-22e98.firebaseapp.com", databaseURL: "https://rockettap-22e98-default-rtdb.firebaseio.com", projectId: "rockettap-22e98", storageBucket: "rockettap-22e98.firebasestorage.app", messagingSenderId: "800263373343", appId: "1:800263373343:web:ed6db2e822f61d8257cb2a" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const tg = window.Telegram.WebApp;
        tg.expand();

        let score = Number(localStorage.getItem('rk_sc')) || 0;
        let pwr = Number(localStorage.getItem('rk_pw')) || 1;
        let cost = Number(localStorage.getItem('rk_ct')) || 50;
        let lastBless = localStorage.getItem('rk_bless') || "";
        const uid = tg.initDataUnsafe?.user?.id || "local_user";

        // Генерация секторов колеса
        const prizes = [50, 100, 500, 1000, 5000, 200, 50, 1000];
        const wheel = document.getElementById('wheel-container');
        prizes.forEach((p, i) => {
            const s = document.createElement('div');
            s.className = 'sector';
            s.style.transform = `rotate(${i * 45}deg) skewY(-45deg)`;
            s.style.background = i % 2 === 0 ? '#333' : '#444';
            s.innerHTML = `<span style="transform: skewY(45deg) rotate(22.5deg); margin: 20px 0 0 20px;">${p}</span>`;
            wheel.appendChild(s);
        });

        function save() {
            localStorage.setItem('rk_sc', score);
            localStorage.setItem('rk_pw', pwr);
            localStorage.setItem('rk_ct', cost);
            localStorage.setItem('rk_bless', lastBless);
            db.ref('leaderboard/' + uid).update({ name: tg.initDataUnsafe?.user?.first_name || "Святой", score: Math.floor(score) });
            updateUI();
        }

        function updateUI() {
            document.getElementById('score').innerText = Math.floor(score).toLocaleString('ru-RU');
            document.getElementById('val-pwr').innerText = "+" + pwr;
            document.getElementById('cost-upd').innerText = cost;
            document.getElementById('btn-upd').disabled = score < cost;
            document.getElementById('menu-bless').disabled = (lastBless === new Date().toDateString());
        }

        // ПЛАВНЫЙ КЛИК
        function handleTap(e) {
            let x = e.touches ? e.touches[0].clientX : e.clientX;
            let y = e.touches ? e.touches[0].clientY : e.clientY;
            score += pwr;
            const p = document.createElement('div');
            p.className = 'pop'; p.innerText = `+${pwr}`;
            p.style.left = (x - 20) + 'px'; p.style.top = (y - 50) + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 800);
            tg.HapticFeedback.impactOccurred('light');
            save();
        }
        document.getElementById('halo').addEventListener('touchstart', (e) => { e.preventDefault(); handleTap(e); });

        // БЛАГОСЛОВЕНИЕ
        function applyBlessing() {
            const today = new Date().toDateString();
            if(lastBless !== today) {
                score += 5000;
                lastBless = today;
                save();
                tg.showAlert("Вы получили благословение небес! +5000");
            }
        }

        // КОЛЕСО ФОРТУНЫ
        let isSpinning = false;
        function openWheelModal() { closeMenu(); openModal('modal-wheel'); }
        function spinWheel() {
            if(isSpinning || score < 1000) return;
            score -= 1000;
            isSpinning = true;
            document.getElementById('wheel-spin-btn').disabled = true;
            const randDeg = Math.floor(3000 + Math.random() * 3000);
            wheel.style.transform = `rotate(${randDeg}deg)`;
            
            setTimeout(() => {
                isSpinning = false;
                const actualDeg = randDeg % 360;
                const prizeIdx = Math.floor(((360 - actualDeg + 22.5) % 360) / 45);
                const win = prizes[prizeIdx];
                score += win;
                document.getElementById('wheel-res').innerText = `ВЫИГРЫШ: ${win}!`;
                document.getElementById('wheel-spin-btn').disabled = false;
                save();
                tg.HapticFeedback.notificationOccurred('success');
            }, 4000);
        }

        // РЕЙТИНГ
        document.getElementById('btn-top').onclick = () => {
            openModal('modal-top');
            db.ref('leaderboard').orderByChild('score').limitToLast(10).once('value').then(snap => {
                const list = document.getElementById('top-list');
                list.innerHTML = "";
                let players = [];
                snap.forEach(child => { players.push(child.val()); });
                players.reverse().forEach((p, i) => {
                    list.innerHTML += `<div class="row"><span>${i+1}. ${p.name}</span><b>${p.score.toLocaleString()}</b></div>`;
                });
            });
        };

        function openMenu() { document.getElementById('main-menu').style.display = 'flex'; }
        function closeMenu() { document.getElementById('main-menu').style.display = 'none'; }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function startAudio() {} // Можно добавить музыку
        
        updateUI();
    </script>
</body>
</html>
