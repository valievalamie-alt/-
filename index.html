<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --bg: #000; --orange: #ff9f00; --blue: #007aff; --purple: #8e44ad; --gray: #2c2c2e; --disabled: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        #header { padding-top: env(safe-area-inset-top); height: 110px; text-align: center; display: flex; flex-direction: column; justify-content: center; }
        #score { font-size: 52px; font-weight: 900; color: var(--orange); font-variant-numeric: tabular-nums; line-height: 1; }
        #stats-bar { display: flex; justify-content: center; gap: 20px; margin-top: 8px; font-size: 13px; font-weight: bold; color: #888; }
        .stat-item b { color: #fff; }

        #game { flex-grow: 1; position: relative; display: flex; align-items: center; justify-content: center; touch-action: manipulation; }
        #coin { width: 200px; height: 200px; background: radial-gradient(circle, #ffb300, #ff8c00); border-radius: 50%; border: 5px solid #fff; font-size: 80px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 35px rgba(255,159,0,0.3); z-index: 10; transition: transform 0.05s; -webkit-tap-highlight-color: transparent; }
        #coin:active { transform: scale(0.95); }

        .pop-num { position: absolute; font-size: 28px; font-weight: 900; color: #fff; pointer-events: none; z-index: 999; animation: floatUp 0.7s ease-out forwards; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-120px); opacity: 0; } }

        #menu { background: #1c1c1e; padding: 15px 15px calc(20px + env(safe-area-inset-bottom)); border-radius: 28px 28px 0 0; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { height: 50px; border: none; border-radius: 14px; font-weight: bold; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; color: white; -webkit-tap-highlight-color: transparent; }
        
        .btn.locked { background: var(--disabled) !important; color: #444 !important; }
        .btn.active-gift { background: #fff !important; color: #000 !important; }
        .btn.taken-gift { background: var(--disabled) !important; color: #444 !important; }

        #upd-btn { background: var(--blue); }
        #case-btn { background: var(--purple); }
        #daily-btn { background: #fff; color: #000; }
        #top-btn { background: var(--gray); }
        #settings-btn { background: #3a3a3c; grid-column: span 2; margin-top: 5px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; }
        .modal-content { width: 85%; background: #1c1c1e; border-radius: 20px; padding: 25px; box-sizing: border-box; text-align: center; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #333; }

        #top-list { width: 100%; max-height: 40vh; overflow-y: auto; margin-top: 10px; }
        .row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #333; font-size: 14px; }
    </style>
</head>
<body>

    <audio id="bg-audio" loop preload="auto" crossorigin="anonymous">
        <source src="https://files.freemusicarchive.org/storage-freemusicarchive-org/music/no_curator/Ketsa/Raising_Frequecy/Ketsa_-_08_-_Raising_Frequency.mp3" type="audio/mpeg">
    </audio>

    <div id="header">
        <div id="score">0</div>
        <div id="stats-bar">
            <div class="stat-item">Тап: <b id="pwr-val">+1</b></div>
            <div class="stat-item">Серия: <b id="streak-val">0</b></div>
        </div>
    </div>

    <div id="game">
        <div id="coin">🚀</div>
    </div>

    <div id="menu">
        <button id="upd-btn" class="btn">Улучшить</button>
        <button id="case-btn" class="btn">Кейс 350</button>
        <button id="daily-btn" class="btn">Подарок</button>
        <button id="top-btn" class="btn">Топ</button>
        <button id="settings-btn" class="btn">⚙️ НАСТРОЙКИ</button>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h2 style="margin: 0 0 20px 0;">Настройки</h2>
            <div class="setting-row">
                <span>Музыка</span>
                <button id="toggle-music" class="btn" style="width:80px; height:35px; background:var(--blue);">ВКЛ</button>
            </div>
            <button onclick="document.getElementById('settings-modal').style.display='none'" class="btn" style="background:#444; width:100%; margin-top:25px;">ЗАКРЫТЬ</button>
        </div>
    </div>

    <script>
        // ... Конфиг Firebase такой же ...
        const firebaseConfig = {
            apiKey: "AIzaSyAhFyYz8tC0VZqNKQweM1VH7A9rzcLQ7L4",
            authDomain: "rockettap-22e98.firebaseapp.com",
            databaseURL: "https://rockettap-22e98-default-rtdb.firebaseio.com",
            projectId: "rockettap-22e98",
            storageBucket: "rockettap-22e98.firebasestorage.app",
            messagingSenderId: "800263373343",
            appId: "1:800263373343:web:ed6db2e822f61d8257cb2a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const tg = window.Telegram.WebApp;
        const audio = document.getElementById('bg-audio');
        let musicOn = false;

        const userId = tg.initDataUnsafe?.user?.id || "guest";
        let score = Number(localStorage.getItem('sc_v40')) || 0;
        let pwr = Number(localStorage.getItem('pw_v40')) || 1;
        let cost = Number(localStorage.getItem('ct_v40')) || 50;
        let streak = Number(localStorage.getItem('str_v40')) || 0;
        let lastDate = localStorage.getItem('ld_v40') || "";

        function refresh() {
            document.getElementById('score').innerText = Math.floor(score).toLocaleString();
            document.getElementById('pwr-val').innerText = "+" + pwr;
            document.getElementById('streak-val').innerText = streak;
            document.getElementById('upd-btn').className = score < cost ? "btn locked" : "btn";
            document.getElementById('upd-btn').innerText = `Up (${cost})`;
            document.getElementById('case-btn').className = score < 350 ? "btn locked" : "btn";
            localStorage.setItem('sc_v40', score);
            localStorage.setItem('pw_v40', pwr);
            localStorage.setItem('ct_v40', cost);
            localStorage.setItem('str_v40', streak);
            localStorage.setItem('ld_v40', lastDate);
            db.ref('users/' + userId).set({ name: tg.initDataUnsafe?.user?.first_name || "Пилот", score: Math.floor(score) });
        }

        // ВКЛЮЧЕНИЕ МУЗЫКИ
        document.getElementById('toggle-music').onclick = function() {
            if(!musicOn) {
                audio.play().then(() => {
                    this.innerText = "ВЫКЛ";
                    this.style.background = "#ff3b30";
                    musicOn = true;
                }).catch(e => {
                    tg.showAlert("Сначала тапни по ракете, а потом включай!");
                });
            } else {
                audio.pause();
                this.innerText = "ВКЛ";
                this.style.background = "var(--blue)";
                musicOn = false;
            }
        };

        document.getElementById('game').onclick = (e) => {
            // ФИКС ДЛЯ APPLE: Активируем аудио-контекст при первом тапе
            if (audio.paused && !musicOn) {
                audio.play().then(() => { audio.pause(); }).catch(err => {});
            }

            score += pwr;
            const pop = document.createElement('div');
            pop.className = 'pop-num';
            pop.innerText = `+${pwr}`;
            pop.style.left = e.clientX + 'px';
            pop.style.top = (e.clientY - 20) + 'px';
            document.body.appendChild(pop);
            setTimeout(() => pop.remove(), 600);
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            refresh();
        };

        document.getElementById('settings-btn').onclick = () => document.getElementById('settings-modal').style.display = 'flex';
        document.getElementById('upd-btn').onclick = () => { if(score >= cost) { score -= cost; pwr++; cost = Math.round(cost * 1.7); refresh(); } };

        refresh();
    </script>
</body>
</html>
