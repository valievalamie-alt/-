<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0b0b0b;
            --card: #1a1a1a;
            --orange: #ff9f00;
            --blue: #007aff;
            --purple: #8e44ad;
        }
        body {
            background: var(--bg); color: white; font-family: sans-serif;
            margin: 0; padding: 0; display: flex; flex-direction: column;
            height: 100vh; overflow: hidden; user-select: none;
        }
        #header { padding: 20px; text-align: center; }
        #score { font-size: 55px; font-weight: bold; color: var(--orange); margin: 0; }
        #nick { font-size: 16px; color: #888; margin-top: 5px; }

        #game { flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        #coin {
            width: 200px; height: 200px; background: radial-gradient(circle, #ffb300, #ff8c00);
            border-radius: 50%; border: 6px solid #fff; font-size: 90px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 40px rgba(255,159,0,0.4); cursor: pointer; transition: 0.05s;
        }
        #coin:active { transform: scale(0.92); }

        #menu {
            background: var(--card); padding: 20px; border-radius: 25px 25px 0 0;
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
        }
        .btn {
            height: 55px; border: none; border-radius: 15px; font-weight: bold;
            color: white; font-size: 16px; cursor: pointer;
        }
        .full { grid-column: span 2; }
        #upd-btn { background: var(--blue); }
        #case-btn { background: var(--purple); }
        #top-btn { background: #333; }

        /* Окна (Лидерборд и Кейс) */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 100; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px; box-sizing: border-box;
        }
        #top-list { width: 100%; background: #222; border-radius: 15px; margin: 20px 0; }
        .row { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #333; }
        
        #case-reel-box { width: 100%; height: 80px; background: #111; overflow: hidden; position: relative; border-radius: 10px; border: 2px solid #444; }
        #reel { display: flex; position: absolute; left: 0; transition: 3s cubic-bezier(0.1, 0, 0.1, 1); }
        .item { min-width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; font-size: 30px; }
        
        .tap-eff { position: absolute; color: white; font-weight: bold; font-size: 30px; pointer-events: none; animation: fly 0.6s forwards; }
        @keyframes fly { to { transform: translateY(-100px); opacity: 0; } }
    </style>
</head>
<body>

    <div id="header">
        <div id="score">0</div>
        <div id="nick">Пилот: ...</div>
    </div>

    <div id="game">
        <div id="coin">🚀</div>
    </div>

    <div id="menu">
        <button id="upd-btn" class="btn">Upgrade (+1) • 50</button>
        <button id="case-btn" class="btn">🎁 Case (200)</button>
        <button id="top-btn" class="btn full">🏆 ТОП ЛИДЕРОВ</button>
    </div>

    <div id="top-modal" class="modal">
        <h2>Лидерборд</h2>
        <div id="top-list"></div>
        <button onclick="closeModals()" class="btn" style="background:#555; width:150px">Назад</button>
    </div>

    <div id="case-modal" class="modal">
        <h2 id="case-status">Распаковка...</h2>
        <div id="case-reel-box">
            <div id="reel"></div>
        </div>
        <div id="win-msg" style="margin: 20px; font-size: 20px; font-weight: bold; color: orange;"></div>
        <button id="close-case" onclick="closeModals()" class="btn" style="background:#555; width:150px; display:none">Назад</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let userNick = tg.initDataUnsafe?.user?.first_name || "Пилот";
        document.getElementById('nick').innerText = "Пилот: " + userNick;

        let score = Number(localStorage.getItem('s_v6')) || 0;
        let pwr = Number(localStorage.getItem('p_v6')) || 1;
        let cost = Number(localStorage.getItem('c_v6')) || 50;

        function refresh() {
            document.getElementById('score').innerText = Math.floor(score);
            document.getElementById('upd-btn').innerText = `Upgrade (+1) • ${cost}`;
            document.getElementById('upd-btn').disabled = score < cost;
            document.getElementById('case-btn').disabled = score < 200;
            
            localStorage.setItem('s_v6', score);
            localStorage.setItem('p_v6', pwr);
            localStorage.setItem('c_v6', cost);
        }

        document.getElementById('coin').onclick = (e) => {
            score += pwr;
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            
            let t = document.createElement('div');
            t.className = 'tap-eff';
            t.innerText = '+' + pwr;
            t.style.left = e.clientX + 'px';
            t.style.top = e.clientY + 'px';
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 600);
            refresh();
        };

        document.getElementById('upd-btn').onclick = () => {
            if(score >= cost) {
                score -= cost;
                pwr += 1;
                cost = Math.round(cost * 1.6);
                refresh();
            }
        };

        document.getElementById('top-btn').onclick = () => {
            const list = document.getElementById('top-list');
            list.innerHTML = `<div class="row" style="color:orange"><span>1. ${userNick} (Вы)</span><span>${Math.floor(score)}</span></div>`;
            document.getElementById('top-modal').style.display = 'flex';
        };

        const loot = ['🚀', '💰', '💎', '🔥', '🔋', '⭐'];
        document.getElementById('case-btn').onclick = () => {
            if(score < 200) return;
            score -= 200;
            refresh();
            
            const modal = document.getElementById('case-modal');
            const reel = document.getElementById('reel');
            const win = document.getElementById('win-msg');
            const close = document.getElementById('close-case');

            modal.style.display = 'flex';
            win.innerText = "";
            close.style.display = 'none';
            reel.style.transition = 'none';
            reel.style.left = '0px';

            let items = '';
            for(let i=0; i<40; i++) items += `<div class="item">${loot[i % loot.length]}</div>`;
            reel.innerHTML = items;

            setTimeout(() => {
                reel.style.transition = 'left 3s cubic-bezier(0.1, 0, 0.1, 1)';
                reel.style.left = '-2800px';
            }, 50);

            setTimeout(() => {
                const prize = Math.random();
                if(prize > 0.9) { pwr += 10; win.innerText = "JACKPOT! +10 КЛИК"; }
                else if(prize > 0.5) { score += 1000; win.innerText = "БОНУС! +1000 ОЧКОВ"; }
                else { pwr += 2; win.innerText = "ПРИЗ! +2 КЛИК"; }
                close.style.display = 'block';
                refresh();
            }, 3200);
        };

        function closeModals() {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        }

        refresh();
    </script>
</body>
</html>
