<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Rocket Tap</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: #000; color: #fff; font-family: sans-serif;
            text-align: center; margin: 0; padding: 0;
            height: 100vh; display: flex; flex-direction: column;
        }
        #ui { padding: 20px; }
        #score { font-size: 50px; font-weight: bold; color: orange; margin: 0; }
        #user { font-size: 14px; color: #888; }
        
        #game { flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        #coin {
            width: 150px; height: 150px; background: orange;
            border-radius: 50%; font-size: 60px; display: flex;
            align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(255,165,0,0.5);
            border: 5px solid #fff; cursor: pointer;
        }
        #coin:active { transform: scale(0.9); }

        #menu { padding: 20px; background: #111; display: flex; gap: 10px; }
        .btn {
            flex: 1; padding: 15px; border: none; border-radius: 10px;
            font-weight: bold; cursor: pointer; color: #fff;
        }
        #upd-btn { background: #007bff; }
        #top-btn { background: #444; }
        .btn:disabled { background: #222; color: #555; }

        /* Окно ТОП */
        #top-ui {
            display: none; position: fixed; top: 0; left: 0; width: 100%;
            height: 100%; background: #000; z-index: 99;
            flex-direction: column; padding: 20px; box-sizing: border-box;
        }
        .row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #222; }
        .me { color: orange; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="user">Пилот: ...</div>
        <div id="score">0</div>
    </div>

    <div id="game">
        <div id="coin">🚀</div>
    </div>

    <div id="menu">
        <button id="upd-btn" class="btn">Апгрейд</button>
        <button id="top-btn" class="btn">ТОП</button>
    </div>

    <div id="top-ui">
        <h2>Лидеры</h2>
        <div id="list"></div>
        <button onclick="document.getElementById('top-ui').style.display='none'" style="margin-top:20px; padding: 15px;">Назад</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let name = tg.initDataUnsafe?.user?.first_name || "Пилот";
        document.getElementById('user').innerText = "Пилот: " + name;

        let score = Number(localStorage.getItem('sc_v3')) || 0;
        let pwr = Number(localStorage.getItem('pw_v3')) || 1;
        let cost = Number(localStorage.getItem('ct_v3')) || 50;

        function refresh() {
            document.getElementById('score').innerText = score;
            document.getElementById('upd-btn').innerText = "+" + pwr + " (Цена: " + cost + ")";
            document.getElementById('upd-btn').disabled = score < cost;
            localStorage.setItem('sc_v3', score);
            localStorage.setItem('pw_v3', pwr);
            localStorage.setItem('ct_v3', cost);
        }

        document.getElementById('coin').onclick = () => {
            score += pwr;
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            refresh();
        };

        document.getElementById('upd-btn').onclick = () => {
            if(score >= cost) {
                score -= cost;
                pwr += 1;
                cost = Math.round(cost * 1.5);
                refresh();
            }
        };

        document.getElementById('top-btn').onclick = () => {
            const list = document.getElementById('list');
            list.innerHTML = "";
            let data = [{n:"VIP_Tapper",s:9999}, {n:name,s:score,me:true}, {n:"Bot1",s:100}, {n:"Bot2",s:50}];
            data.sort((a,b) => b.s - a.s);
            data.forEach((x, i) => {
                list.innerHTML += `<div class="row ${x.me?'me':''}"><span>${i+1}. ${x.n}</span><span>${x.s}</span></div>`;
            });
            document.getElementById('top-ui').style.display = 'flex';
        };

        refresh();
    </script>
</body>
</html>
